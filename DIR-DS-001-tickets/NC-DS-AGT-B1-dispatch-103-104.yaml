  lei: 'R21 — Em caso de QUALQUER dúvida: PARAR e retornar ao T0.'
  nao_fazer:
  - NÃO assumir que um arquivo existe sem verificar
  - NÃO improvisar API ou estrutura não documentada
  - NÃO continuar se a mudança necessária toca um @LOCK
  - NÃO escolher entre dois caminhos sem confirmação do T0
  como_retornar: "Parar. Escrever:\n  (1) O que foi feito até agora\n  (2) Qual é\
    \ a dúvida exata\n  (3) Quais são as opções que você vê\nAguardar decisão do T0.\
    \ Não prosseguir sem resposta.\n"
