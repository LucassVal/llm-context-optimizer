# NC-CFG-FR-001-multi-agent-policies.yaml
# Gerado: 2026-04-30 | NC-DS-174
# Merge de: COURIER-001 + ENGINEER-001 + GUARDIAN-001
# SSOT para políticas de agentes T2/T3/TG

agents:
  courier:
    role: "courier"
    tier: "T2"
    description: "Agente de tarefas simples e bracal. Usa Qwen 1.5b iGPU."
    backend:
      provider: "ollama"
      model: "qwen2.5-coder:1.5b-instruct"
      base_url: "http://localhost:11435"
      keep_alive: -1
    circuit_breaker:
      max_calls: 15
      window_sec: 60
      max_identical: 4
      cooldown_sec: 90
    token_budget:
      max_tokens_per_task: 1024
      max_tokens_session: 8192
      warn_at_percent: 80
    allowed_tools:
      - "neocortex_memory"
      - "neocortex_akl"
      - "neocortex_ledger"
      - "neocortex_health"
      - "neocortex_notification"
    forbidden_actions:
      - "agent.spawn"
      - "agent.stop"
      - "lobe.delete"
      - "lobe.deactivate"
      - "config.set"
      - "config.reload"
      - "cb.reset"
      - "akl.export"
      - "ledger.write"
      - "session.end"
    allowed_lobes:
      read: ["NC-LBE-CC-*", "NC-LBE-FR-ARCHITECTURE-001", "machine_memory"]
      write: ["machine_memory"]
    isolation:
      can_delegate_to: []
      reports_to: "T0"
      heartbeat_interval_sec: 30

  engineer:
    role: "engineer"
    tier: "T2"
    description: "Agente tecnico medio. Usa Qwen 3b iGPU."
    backend:
      provider: "ollama"
      model: "qwen2.5-coder:3b-instruct"
      base_url: "http://localhost:11435"
      keep_alive: -1
    circuit_breaker:
      max_calls: 20
      window_sec: 60
      max_identical: 5
      cooldown_sec: 120
    token_budget:
      max_tokens_per_task: 2048
      max_tokens_session: 16384
      warn_at_percent: 75
    allowed_tools:
      - "neocortex_memory"
      - "neocortex_akl"
      - "neocortex_ledger"
      - "neocortex_orchestration"
      - "neocortex_health"
      - "neocortex_notification"
      - "neocortex_benchmark"
    forbidden_actions:
      - "agent.spawn"
      - "agent.stop"
      - "lobe.delete"
      - "lobe.deactivate"
      - "config.set"
      - "config.reload"
      - "cb.reset"
      - "ledger.write"
    allowed_lobes:
      read: ["NC-LBE-*"]
      write: ["machine_memory", "NC-LBE-FR-DEVELOPMENT-001"]
    isolation:
      can_delegate_to: ["courier"]
      reports_to: "T0"
      heartbeat_interval_sec: 45

  guardian:
    role: "guardian"
    tier: "T1"
    description: "Agente de supervisao e seguranca. Monitora outros agentes."
    backend:
      provider: "litellm"
      model: "deepseek/deepseek-v4-flash"
      base_url: "http://localhost:4000"
      fallback:
        provider: "ollama"
        model: "qwen2.5-coder:3b-instruct"
        base_url: "http://localhost:11435"
    circuit_breaker:
      max_calls: 30
      window_sec: 60
      max_identical: 8
      cooldown_sec: 60
    token_budget:
      max_tokens_per_task: 4096
      max_tokens_session: 32768
      warn_at_percent: 70
    allowed_tools:
      - "neocortex_security"
      - "neocortex_memory"
      - "neocortex_akl"
      - "neocortex_ledger"
      - "neocortex_orchestration"
      - "neocortex_health"
      - "neocortex_notification"
      - "neocortex_governance"
    forbidden_actions:
      - "agent.spawn"
      - "lobe.delete"
      - "config.reload"
    allowed_lobes:
      read: ["NC-LBE-*"]
      write: ["NC-LBE-FR-SECURITY-001"]
    isolation:
      can_delegate_to: []
      reports_to: "T0"
      heartbeat_interval_sec: 20
      monitors: ["courier", "engineer"]
