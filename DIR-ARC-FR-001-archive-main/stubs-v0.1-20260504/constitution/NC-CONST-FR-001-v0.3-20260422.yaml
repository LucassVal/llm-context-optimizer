article_3_rules:
  existing_rules:
    R01: "Inventário de Ativos de IA"
    R02: "Política Formalizada"
    R03: "Estrutura de Diretórios"
    R04: "Nomenclatura NC-"
    R07: "Privilégio Mínimo (PoLP)"
    R08: "Atomic Locks"
    R09: "Zonas de Escrita"
    R10: "Trilha de Auditoria"
    R12: "Handoffs Formais"
    R13: "Checkpoints"
    R18: "Ciclo de Vida Tickets"
    R19: "Rotina 4 Ciclos"
    R20: "Revisão e Arquivo"
    R21: "Zero Suposições"

  new_rules_v0_3:
    R22: "Integração entre Sistemas"
      description: "Sistemas memory, state e ledger devem estar integrados e sincronizados"
      compliance: "Automático via handoffs e checkpoints"
    
    R23: "Automação de Compliance"
      description: "Processos de compliance devem ser automatizados e contínuos"
      compliance: "Auditoria automática a cada ciclo"
    
    R24: "Processo de Evolução Constitucional"
      description: "Evolução constitucional deve seguir processo formal com pre-check e aprovação"
      compliance: "cf.pre_check obrigatório para emendas"
    
    R25: "Normas para Handoffs entre Tiers"
      description: "Handoffs entre tiers devem documentar contexto, estado e expectativas"
      compliance: "Handoff files obrigatórios para transferências T0→T1"
    
    R26: "Políticas de Backup/Restore"
      description: "Sistemas críticos devem ter políticas de backup e restore definidas"
      compliance: "Checkpoints regulares e savepoints para rollback"
    
    R27: "Monitoramento de Integridade"
      description: "Integridade do sistema deve ser monitorada continuamente"
      compliance: "Health checks regulares e alertas automáticos"
    
    R28: "Gestão de Dependências"
      description: "Dependências entre sistemas devem ser mapeadas e gerenciadas"
      compliance: "Mapa de dependências atualizado"
    
    R29: "Auditoria Contínua"
      description: "Auditoria deve ocorrer de forma contínua e proativa"
      compliance: "Logs de auditoria em tempo real"
    
    R30: "Resiliência do Sistema"
      description: "Sistema deve ser resiliente a falhas e se recuperar automaticamente"
      compliance: "Mecanismos de fallback e recovery"

