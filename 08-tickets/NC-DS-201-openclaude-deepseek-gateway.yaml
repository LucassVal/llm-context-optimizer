  agent: antigravity
  status: ABANDONED  # OpenClaude era, pre-standardization, no longer relevant
  priority: MEDIUM
entry_state:
  conditions:
  - MCP server :8765 está ativo
  - Python 3.12+ disponível
  - API key DeepSeek v4-Pro configurada
  validations:
  - Gateway NC-SVC-FR-102 deve rejeitar modelos != deepseek-v4-pro
  - Profile do Antigravity deve apontar para localhost:4001
  - 'Circuito completo: Antigravity → Gateway :4001 → DeepSeek API'
goal:
  what: Proxy local que intercepta chamadas do Antigravity para DeepSeek e força deepseek-v4-pro,
    bloqueando qualquer fallback para Flash.
  why: Antigravity estava consumindo tokens no modelo Flash quando v4-Pro caía por
    rate limit. Gateway garante 0% de vazamento.
  how:
  - Servidor HTTP puro (stdlib) :4001, sem dependências externas
  - Endpoint /v1/chat/completions API OpenAI-compatible
  - Hardcode model=deepseek-v4-pro, rejeita HTTP 403 qualquer outro
  - Log de auditoria por requisição (tokens, modelo requisitado)
  - CORS habilitado para tools NeoCortex
