[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*
addopts = --verbose --tb=short --disable-warnings
markers =
    unit: Testes unitários com mocks
    integration: Testes de integração com banco real
    slow: Testes lentos (requer recursos)
    rag: Testes específicos para RAGVectorEngine