tasks:
  - id: T1
    title: "Classificador de complexidade — route.call com tier dinâmico"
    priority: P1
    approach: |
      Heurística simples no NC-SUPER-005:
      - Ações conhecidas de baixa complexidade (ollama.list, ollama.pull, workers.status, health, ping) → tier LOCAL
      - Prompt < 100 chars → LOCAL
      - Prompt > 500 chars OU contém "analyze|audit|refactor|implement" → CLOUD (DeepSeek)
      - Default → LOCAL (economizar por padrão)
    effort: "15min"

  - id: T2
    title: "Ollama fallback — se DeepSeek API falhar, chama Ollama automaticamente"
    priority: P1
    approach: "No DeepSeekBackend.generate(): se API falhar (timeout, 502, 429), tentar Ollama como fallback. Já temos NC-LLM-FR-002 implementado."
    effort: "15min"

  - id: T3
    title: "Métrica de custo no KPI — Cloud vs Local split"
    priority: P2
    approach: "NC-SUPER-001 governance kpi.report: adicionar campo cloud_vs_local com contagem de chamadas. KPI restaurado em NC-DS-271."

acceptance_criteria:
