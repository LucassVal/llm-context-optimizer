context:
  gap: "G09"
  origin: "NC-DS-045 INT-003 status '?' — nunca executado. Launchers MC e Pixel não automatizados."
  problem: |
    Para iniciar o stack completo (MCP + MC + NeoCortex registration) é preciso
    executar múltiplos processos manualmente. Não existe script único de orquestração
    de startup. Também falta webhook endpoint no sub_server para receber comandos do MC.

task:
  description: |
    PARTE A — Launcher:
    Criar 01_neocortex_framework/scripts/NC-SCR-FR-106-launcher.py:
    1. Verificar se Mission Control (:3000) está online → Test-NetConnection equivalente
    2. Se offline: subprocess.Popen(['pnpm', 'dev'], cwd=MC_DIR) em thread separada
    3. Aguardar até MC online (max 30s, poll a cada 2s)
    4. Chamar NC-SCR-FR-103-mc-startup-hook.py como subprocess (não blocking)
    5. Log de cada passo via logger
    6. --dry-run flag: apenas reportar o que faria, sem executar

    Caminho MC: DIR-RES-CC-001-claude-leak-workzone/external-refs/mission-control/

    PARTE B — Webhook endpoint (em NC-TOOL-FR-037-hooks.py ou novo tool):
    7. Adicionar action 'webhook.receive' em NC-TOOL-FR-037-hooks.py:
       - Recebe payload do MC via HTTP POST (action, data)
       - Roteia para HookRegistry.emit(action, data)
       - Retorna {status: 'ok', event_id: uuid}
    8. Documentar endpoint: POST /mcp/tool/neocortex_hooks {action: 'webhook.receive', ...}

  acceptance_criteria:
    - "python NC-SCR-FR-106-launcher.py --dry-run executa sem erro"
    - "Launcher inicia MC se offline"
    - "NC-SCR-FR-103 é chamado após MC estar online"
    - "NC-TOOL-FR-037 tem action webhook.receive funcional"

write_zone:
  - "01_neocortex_framework/scripts/NC-SCR-FR-106-launcher.py"
  - "01_neocortex_framework/neocortex/mcp/tools/NC-TOOL-FR-037-hooks.py"
  - "DIR-DS-002-audit-logs/"

atomic_locks_proibidos:
  - "01_neocortex_framework/neocortex/mcp/server.py"
  - "01_neocortex_framework/neocortex/mcp/sub_server.py"
  - "start_neocortex_mcp.ps1"
  - "antigravity_neocortex_config.json"

entry_state: "Startup manual — sem launcher unificado, sem webhook MC→NeoCortex"
exit_state: "NC-SCR-FR-106 sobe stack completo. Webhook funcional."
