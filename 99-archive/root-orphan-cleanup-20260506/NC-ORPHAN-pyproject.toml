[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[project]
name = "neocortex"
version = "4.2.0"
requires-python = ">=3.10"
dependencies = [
    "fastmcp>=1.2.0",
    "httpx",
    "pyyaml",
    "ruamel.yaml",
    "anthropic",
]

[tool.ruff]
line-length = 120
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "C4", "W", "SIM", "UP", "RUF", "N", "PLC", "PLE"]
ignore = ["E402", "N999"]

[tool.pyright]
pythonVersion = "3.12"
include = ["01_neocortex_framework"]
exclude = ["**/__pycache__", "**/node_modules", "98-research", "01_neocortex_framework/DIR-ARC-FR-001-archive-main"]
reportMissingImports = true
typeCheckingMode = "basic"
