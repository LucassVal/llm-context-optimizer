design_decisions:
  - "SQLite WAL mode: permite leituras concorrentes durante writes — essencial para multi-agente"
  - "Singleton por db_path: mesma instância reutilizada em toda a sessão Python"
  - "Path resolver via .git marker: garante DB sempre na raiz do projeto independente de onde o script é importado"
  - "Rollback é MANUAL por design: WAL fornece o mapa, não desfaz automaticamente — evita side effects inesperados"
  - "prune_old_entries() integrado no serviço (não script separado) — resolve TTL-002 sem nova dependência"

