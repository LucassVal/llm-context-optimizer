task:
  description: |
    Criar NC-TOOL-FR-021-memory.py com register_tool(mcp) e ações:

    # Lobes (gestão de memória modular)
    lobe.list_active      → lista lobes disponíveis e status (ativo/inativo)
    lobe.get_content      → retorna conteúdo de lobe específico
    lobe.activate         → ativa lobe pelo nome
    lobe.deactivate       → desativa lobe
    lobe.search           → busca texto dentro de lobes (FTS suportado)
    lobe.list_all         → lista todos os lobes com metadados
    lobe.get_checkpoint_tree → extrai árvore de checkpoints de um lobe

    # Cortex (memória central)
    cortex.get_full       → conteúdo completo do cortex com metadados
    cortex.get_section    → retorna seção específica do cortex
    cortex.get_aliases    → retorna todos os aliases definidos
    cortex.get_workflows  → retorna workflows definidos no cortex
    cortex.validate_alias → valida se alias está correto

    # Manifest (índices leves)
    manifest.generate     → gera manifesto para lobe ou cortex
    manifest.update       → atualiza metadados de manifesto existente
    manifest.query        → filtra manifestos por tags/domain/entities
    manifest.list         → lista todos os manifestos
    manifest.generate_all → gera manifestos para todos os lobes

    Absorve: NC-TOOL-FR-003-lobes.py + NC-TOOL-FR-004-cortex.py + NC-TOOL-FR-010-lobes-management.py
            + NC-TOOL-FR-013-manifest.py + NC-TOOL-FR-007-init.py (parcial)
    ATENÇÃO: Esta é a tool mais rica. Se exceder 4000 tokens por fase → criar ticket FR-021b
              para as ações de manifest e ir com lobes+cortex neste.
    Padrão: seguir estrutura de NC-TOOL-FR-029-health.py

