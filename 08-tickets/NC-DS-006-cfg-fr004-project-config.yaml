task:
  description: "Criar NC-CFG-FR-004-project-config.py — configuração por projeto/workspace.\n\
    \nObjetivo: permitir que cada projeto/workspace tenha configurações próprias que\
    \ sobrescrevem\no neocortex_config.yaml global (sem modificá-lo).\n\nInterface\
    \ obrigatória:\n  class ProjectConfig:\n      def __init__(self, project_root:\
    \ Path | str) -> None\n      def load(self) -> dict                    # carrega\
    \ .neocortex/project.yaml se existir\n      def save(self, data: dict) -> None\
    \        # persiste em .neocortex/project.yaml\n      def get(self, key: str,\
    \ default=None)     # leitura com fallback para global config\n      def set(self,\
    \ key: str, value) -> None    # escreve e persiste imediatamente\n      def merge_with_global(self)\
    \ -> dict       # retorna dict merged: global + project (project wins)\n     \
    \ def reset(self) -> None                   # apaga .neocortex/project.yaml\n\n\
    Arquivo de persistência: {project_root}/.neocortex/project.yaml\nFormat YAML —\
    \ usar ruamel.yaml com fallback para PyYAML com fallback para json.\n\nTambém\
    \ criar NC-CFG-FR-004-project-config-schema.yaml no mesmo diretório:\n  Esquema\
    \ de campos válidos com tipos e defaults para validação.\n\nSTEP-0 antes de escrever:\n\
    \  python -c \"import ruamel; print('ruamel OK')\" || echo \"usar PyYAML\"\n \
    \ python -c \"import yaml; print('yaml OK')\"\n\nMínimo: 120 linhas para NC-CFG-FR-004-project-config.py\n"
  entry_state:
    files_exist:
    - 01_neocortex_framework/neocortex/core/config/
    files_must_not_exist:
