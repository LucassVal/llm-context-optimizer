environment:
  python: "C:\\Program Files\\Python312\\python.exe"
  project_root: "C:\\Users\\Lucas Valério\\Desktop\\TURBOQUANT_V42"
  wal_service: "01_neocortex_framework/neocortex/core/services/NC-SVC-FR-016-wal-service.py"
  wal_db: "DIR-DS-003-wal/neocortex_wal.db"

  # Os 3 scripts alvo estão em:
  #   01_neocortex_framework/scripts/<nome>.py
  # WAL service está em:
  #   01_neocortex_framework/neocortex/core/services/NC-SVC-FR-016-wal-service.py
  # De dentro de scripts/, parents[1] = 01_neocortex_framework/
  import_pattern: |
    import importlib.util
    from pathlib import Path

    _wal_path = Path(__file__).resolve().parents[1] / "neocortex/core/services/NC-SVC-FR-016-wal-service.py"
    _spec = importlib.util.spec_from_file_location("wal_service", _wal_path)
    _mod = importlib.util.module_from_spec(_spec)
    _spec.loader.exec_module(_mod)
    WALService = _mod.WALService

  usage_example: |
    from datetime import datetime
    wal = WALService()
    session_id = f"ciclo3-{datetime.now().strftime('%Y%m%dT%H%M%S')}"

    with wal.transaction(session_id, "NC-SCR-FR-066") as txn:
        before = txn.before_write(caminho_do_arquivo)
        # ... lógica existente de escrita ...
        txn.after_write(caminho_do_arquivo, before)

    # Verificar que funcionou:
    # python NC-SVC-FR-016-wal-service.py stats

