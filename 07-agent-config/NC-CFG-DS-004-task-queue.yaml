# @UBL @UBL @CFG-DS | LEXICO: #AGENT #CONFIG
queue_version: "2.0"
created_at: "2026-04-12T17:40:00"
doc: "Sistema de fila central para N workers paralelos. Ver NC-SEC-FR-002 para entry locks."

# ============================================================
# DISPATCH PROTOCOL (individual — 1 agent = 1 task, sem fila compartilhada)
# ============================================================
# 1. Worker lê fila → acha 1º task com status: AVAILABLE
# 2. Worker escreve claimed_by: {port} + claimed_at: {iso_timestamp}
# 3. Worker aguarda 5 segundos → re-lê → se claimed_by ainda é seu → executa
# 4. Se outro worker tomou → pula para próximo AVAILABLE
# 5. claimed_at + 300s sem ACTIVE → claim expirado → volta para AVAILABLE
# ============================================================
claim_timeout_seconds: 300

# ============================================================
# AUTO-APPROVE (via NC-SCR-FR-005)
# ============================================================
auto_approve:
  enabled: true
  script: "01_neocortex_framework/scripts/NC-SCR-FR-005-auto-approve.py"
  approve_if_all_pass:
    - barriers_passed_includes: ["B1", "B2", "B3", "B4"]
    - locks_violated_is_empty: true
    - overall_equals: "SUCCESS"
    - lines_added_gt: 5
  escalate_to_t0_if:
    - overall_equals: "ESCALATED"
    - locks_violated_not_empty: true
    - lines_added_lt: 5  # suspeito — muito pouco entregue

# ============================================================
# PROGRESSIVE LOCK GATES (Surgical Patches)
# ============================================================
# @LOCKS nunca são removidos diretamente por workers.
# Quando um ticket é aprovado e seu deliverable é prerequisito
# para modificar um @LOCK, ele cria um NC-PATCH-{id}-{target}.diff
# em DIR-DS-004-patches/ para T0 aplicar manualmente.
#
# Cadeia de dependências:
#   NC-DS-011 (logging service) APPROVED
#     ↓ unlocks_patch: server.py:import-logging
#   NC-DS-014 (11 plugins) APPROVED
#     ↓ unlocks_patch: NC-LBE-CC-001:competitive-section
#   NC-DS-020 (cache) APPROVED
#     ↓ unlocks_patch: server.py:import-cache
#   NC-DS-022 (metrics) APPROVED
#     ↓ unlocks_patch: server.py:import-metrics
# ============================================================
progressive_lock_gates:
  patch_dir: "DIR-DS-004-patches/"
  patch_naming: "NC-PATCH-{ticket_id}-{target_basename}.diff"
  apply_by: "antigravity-t0"  # NUNCA por worker
  gates:
    - gate_id: GATE-001
      prerequisite_ticket: NC-DS-011
      unlocks_target: "neocortex/mcp/server.py"
      scope: "import NC-SVC-FR-001-logging-service (1 linha)"
      status: PATCH_READY   # logging service aprovado → patch gerado
      patch_file: "DIR-DS-004-patches/NC-PATCH-NC-DS-011-server.diff"

    - gate_id: GATE-002
      prerequisite_ticket: NC-DS-020
      unlocks_target: "neocortex/mcp/server.py"
      scope: "import NC-SVC-FR-004-cache-service (1 linha)"
      status: PENDING        # aguardando NC-DS-020 approval

    - gate_id: GATE-003
      prerequisite_ticket: NC-DS-022
      unlocks_target: "neocortex/mcp/server.py"
      scope: "import NC-SVC-FR-006-metrics-collector (1 linha)"
      status: PENDING

    - gate_id: GATE-004
      prerequisite_ticket: NC-DS-018
      unlocks_target: "neocortex/mcp/sub_server.py"
      scope: "register /health route (NC-SVC-FR-002)"
      status: PENDING

    - gate_id: GATE-005
      prerequisite_ticket: NC-DS-019
      unlocks_target: "neocortex/mcp/server.py"
      scope: "register SavePointService no startup"
      status: PENDING

