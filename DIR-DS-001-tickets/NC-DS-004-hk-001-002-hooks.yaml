task:
  description: |
    PARTE 1 — Criar NC-HK-FR-001-hook-registry.py
    
    Implementar HookRegistry: sistema de hooks síncronos e assíncronos para extensão dos serviços.
    
    Interface obrigatória:
      class HookRegistry:
          def register(self, event: str, fn: Callable, priority: int = 0) -> None
          def unregister(self, event: str, fn: Callable) -> None
          def trigger(self, event: str, *args, **kwargs) -> list
          async def trigger_async(self, event: str, *args, **kwargs) -> list
          def list_hooks(self, event: str = None) -> dict
    
    Eventos pré-definidos (constantes):
      HOOK_BEFORE_TOOL_CALL   = "before_tool_call"
      HOOK_AFTER_TOOL_CALL    = "after_tool_call"
      HOOK_ON_ERROR           = "on_error"
      HOOK_ON_SESSION_START   = "on_session_start"
      HOOK_ON_SESSION_END     = "on_session_end"
      HOOK_ON_CHECKPOINT      = "on_checkpoint"
    
    PARTE 2 — Criar NC-HK-FR-002-simple-hook.py
    
    Implementar hooks pré-registrados úteis (plug-and-play):
      LoggingHook    → log estruturado de cada tool_call
      TimingHook     → mede latência de cada tool_call
      RateLimitHook  → bloqueia agente se exceder N calls/min
      AuditHook      → escreve linha em audit-log YAML por chamada
    
    Cada hook deve ser registrável com:
      registry = HookRegistry()
      registry.register(HOOK_BEFORE_TOOL_CALL, LoggingHook().on_before)
    
    Arquivos a criar:
      - 01_neocortex_framework/neocortex/core/hooks/NC-HK-FR-001-hook-registry.py
      - 01_neocortex_framework/neocortex/core/hooks/NC-HK-FR-002-simple-hook.py
      - 01_neocortex_framework/neocortex/core/hooks/__init__.py (exportar HookRegistry + hooks)
    
    STEP-0 obrigatório antes de escrever:
      python -c "import asyncio; print('asyncio OK')"
      python -c "from typing import Callable; print('typing OK')"

  entry_state:
