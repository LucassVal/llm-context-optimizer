    CF (lei suprema): NC-WF-001
    Leis Complementares: NC-GOV-FR-002 a NC-GOV-FR-005
    Leis Ordinárias: NC-NAM-FR-001, NC-CFG-FR-002
    Decretos/Regulamentos: Lobes (.mdc) por domínio
    Jurisprudência: Regression buffer + handoffs REJECTED
  
  3 Poderes como camadas MCP:
    Legislativo: neocortex_tickets + neocortex_governance (T0 somente)
    Executivo: neocortex_orchestration + neocortex_picoclaw + neocortex_task
    Judiciário: neocortex_handoff.validate + neocortex_governance.compliance + AuditHook
  
  Expansão de agentes para PicoClaw:
    T0: autoridade plena
    T1 (OpenCode/PicoClaw): autoridade delegada com handoff obrigatório
    T2 (Qwen): autoridade restrita ao escopo do dispatch
    T3 (Pixel Agents): somente leitura

