task:
  description: |
    Criar NC-TOOL-FR-037-hooks.py — MCP tool que expõe o HookRegistry como ferramenta chamável.

    Ações a implementar:
      hook.register   → registra fn em um evento (event, fn_path, priority=0)
                        como fn_path não é serializável via MCP, registrar hooks pré-fabricados
                        por nome: "logging", "timing", "ratelimit", "audit"
      hook.unregister → remove hook de um evento por nome
      hook.trigger    → trigera manualmente um evento (event, payload=dict)
      hook.list       → lista todos os eventos e hooks registrados
      hook.stats      → retorna estatísticas de timing por tool (via TimingHook)

    Importação dos hooks (R09 — usar importlib.util):
      Importar HookRegistry de neocortex/core/hooks/NC-HK-FR-001-hook-registry.py
      Importar hooks de neocortex/core/hooks/NC-HK-FR-002-simple-hook.py

    Singleton: o HookRegistry deve ser um singleton — usar _registry global no módulo.
    Na inicialização, registrar LoggingHook e TimingHook automaticamente.

    Padrão: seguir EXATAMENTE estrutura de NC-TOOL-FR-029-health.py
    Mínimo: 100 linhas

