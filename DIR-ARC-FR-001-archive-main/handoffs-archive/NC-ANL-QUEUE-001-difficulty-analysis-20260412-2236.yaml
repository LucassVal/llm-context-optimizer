    description: "Timestamps de claimed_at muito antigos (horas) em tasks ativas"
    examples:
      - "NC-DS-016: claimed_at 19:28, completed_at 18:34 (inconsistente)"
    impact: "Dificulta monitoramento de health check de workers."

  - issue: "lack_of_cleanup_mechanism"
    description: "Sem processo automático para expirar claims antigos"
    current_timeout: "300s (5 minutos) configurado mas não implementado"
