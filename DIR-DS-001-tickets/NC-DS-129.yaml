task: "Implementar sistema de intenção prospectiva com campo defer_until em tickets\
  \ para agendamento inteligente.\n\nObjetivos:\n1. Estender schema de tickets YAML\
  \ com campos:\n   - defer_until: timestamp ISO para execução futura\n   - trigger_conditions:\
  \ condições para execução automática\n   - priority_boost: aumento de prioridade\
  \ após deferimento\n   - recurrence: padrão de recorrência (daily, weekly, etc.)\n\
  \n2. Criar NC-SVC-FR-025-prospective-scheduler.py que:\n   - Monitora tickets com\
  \ defer_until\n   - Reclassifica automaticamente quando condições são atendidas\n\
  \   - Notifica via ChannelNotifier\n   - Integra com KairosService para agendamento\n\
  \n3. Criar ferramenta MCP NC-TOOL-FR-047-prospective.py com ações:\n   - prospective.defer:\
  \ adiar ticket com condições\n   - prospective.list: listar tickets adiados\n  \
  \ - prospective.trigger: disparar execução manual\n   - prospective.cancel: cancelar\
  \ adiamento\n\n4. Implementar validações:\n   - Não permitir defer_until no passado\n\
  \   - Validar condições sintaticamente\n   - Limitar recorrência a padrões suportados\n\
  \   - Integrar com Regression Buffer para aprendizado\n"
