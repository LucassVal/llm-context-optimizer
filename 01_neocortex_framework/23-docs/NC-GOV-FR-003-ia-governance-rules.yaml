  # 🟦 CATEGORIA 7: EVOLUÇÃO CONSTITUCIONAL v0.3
  constitutional_evolution_v0_3:
    description: "Novas regras para evolução constitucional, automação e integração"
    rules:
      - id: "R25"
        name: "Integração entre Sistemas"
        description: "Sistemas memory, state e ledger devem estar integrados e sincronizados"
        severity: "high"
        enforcement_mechanism: "Checkpoints automáticos e handoffs coordenados"
