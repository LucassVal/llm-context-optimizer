# ╔══════════════════════════════════════════════════════════╗
# ║  PIPELINE DE VERIFICAÇÃO — TODA TAREFA EXECUTA ISTO    ║
# ╚══════════════════════════════════════════════════════════╝

execution_pipeline:
  description: >
    Padrao obrigatorio para TODA tarefa de implementacao. Nenhuma tarefa
    e concluida sem este pipeline completo. Aplicavel a TODOS os tickets.
    Verificadores variam por TIPO de arquivo modificado.

  environment_verified:
    python: "3.12.10 OK"
    ruff: "0.15.10 OK"
    mypy: "1.20.2 OK"
    pytest: "9.0.3 OK"
    bandit: "1.9.4 OK"

  # ─── MATRIZ DE VERIFICADORES POR TIPO DE ARQUIVO ───
  verification_matrix:
    description: >
      REGRA PADRAO — todo arquivo criado/modificado DEVE passar pelo
      verificador correspondente ao seu tipo. Esta matriz e LEI (R51 FAIL-FAST).
    
    py_files:
      extensions: [".py"]
      pipeline:
        - { step: "ruff check --fix", rule: R51, engine: "ruff 0.15.10", gate: "FAIL se != 'All checks passed!'" }
        - { step: "ruff format", rule: R51, engine: "ruff 0.15.10", gate: "FAIL se arquivo alterado" }
        - { step: "ruff check", rule: R51, engine: "ruff 0.15.10", gate: "FAIL se errors > 0" }
        - { step: "mypy --ignore-missing-imports", rule: R51, engine: "mypy 1.20.2", gate: "FAIL se errors > 0" }
        - { step: "py_compile", rule: R09, engine: "python 3.12", gate: "FAIL se SyntaxError" }
        - { step: "bandit -q", rule: R114, engine: "bandit 1.9.4", gate: "FAIL se HIGH severity" }
        - { step: "grep 'print(' ", rule: R11, engine: "rg", gate: "FAIL se encontrado (usar logger)" }
        - { step: "grep -iE 'api_key|token|password|secret'", rule: R114, engine: "rg", gate: "FAIL se encontrado" }
    
    yaml_files:
      extensions: [".yaml", ".yml"]
      pipeline:
        - { step: "yaml.safe_load()", rule: R112, engine: "FR-158 YAMLValidator", gate: "FAIL se YAML invalido" }
        - { step: "yaml.sanitize", rule: R112, engine: "#GOV governance MCP", gate: "FAIL se erros estruturais" }
        - { step: "naming NC- check", rule: R01, engine: "regex", gate: "FAIL se nao conforme NC-<TIPO>-<SIGLA>-<NUM>" }
        - { step: "secret scan", rule: R114, engine: "FR-158 SecretScanner", gate: "FAIL se token/senha exposta" }
    
    mdc_files:
      extensions: [".mdc"]
      pipeline:
        - { step: "frontmatter YAML validate", rule: R113, engine: "FR-158 MDCValidator", gate: "FAIL se cabecalho invalido" }
        - { step: "NC-READ-HASH present", rule: R113, engine: "regex", gate: "FAIL se ausente (dedup quebrado)" }
        - { step: "naming NC- check", rule: R01, engine: "regex", gate: "FAIL se nao conforme" }
        - { step: "secret scan", rule: R114, engine: "FR-158 SecretScanner", gate: "FAIL se token/senha exposta" }
    
    md_files:
      extensions: [".md"]
      pipeline:
        - { step: "naming NC- check", rule: R01, engine: "regex", gate: "FAIL se nao conforme" }
        - { step: "secret scan", rule: R114, engine: "FR-158 SecretScanner", gate: "FAIL se token/senha exposta" }
    
    json_files:
      extensions: [".json"]
      pipeline:
        - { step: "json.loads() parse", rule: R112, engine: "python json", gate: "FAIL se JSON invalido" }
        - { step: "naming NC- check", rule: R01, engine: "regex", gate: "FAIL se nao conforme" }
    
    ps1_files:
      extensions: [".ps1"]
      pipeline:
        - { step: "Parser::ParseFile() syntax", rule: R51, engine: "PowerShell AST", gate: "FAIL se erros sintaxe" }
        - { step: "naming NC- check", rule: R01, engine: "regex", gate: "FAIL se nao conforme" }
    
    all_files:
      extensions: ["*"]
      pipeline:
        - { step: "@LOCKS check", rule: R04, engine: "LockGuard", gate: "FAIL se arquivo em atomic locks" }
        - { step: "Write Zone check", rule: R06, engine: "PolicyLoader", gate: "FAIL se zona incorreta" }
        - { step: "@SSOT update", rule: R02, engine: "NC-NAM-FR-001", gate: "FAIL se arquivo novo nao registrado" }
        - { step: "Handoff YAML", rule: R12, engine: "Pipeline STEP 4", gate: "FAIL se handoff nao gerado" }
        - { step: "3W check (What/Why/Where)", rule: R42, engine: "FR-151 ThreeWEngine", gate: "FAIL se ausente" }
        - { step: "KISS check (<2500 chars)", rule: R53, engine: "manual", gate: "WARN se > 2500" }
        - { step: "SSOT Header", rule: R117, engine: "FR-163 SSOT Reporter", gate: "WARN se ausente" }

  # ─── PASSO 0: VERIFICAR AMBIENTE (R21) ───
  step_0_verify:
    - { action: "python --version", rule: R21, gate: "FAIL se != 3.12.x" }
    - { action: "python -m ruff --version", rule: R21, gate: "FAIL se nao instalado" }
    - { action: "python -m mypy --version", rule: R21, gate: "FAIL se nao instalado" }
    - { action: "Test-Path <ARQUIVO_ALVO>", rule: R21, gate: "FAIL se arquivo nao existe" }

  # ─── ORDEM DE EXECUCAO POR TAREFA ───
  per_task_sequence:
    - "STEP 0: Verificar ambiente + arquivo alvo (R21)"
    - "STEP 1: Verificadores por tipo de arquivo conforme MATRIZ acima"
    - "STEP 2: @LOCKS + Write Zone + @SSOT (governanca)"
    - "STEP 3: Handoff YAML (R12)"
    - "STEP 4: 3W + KISS + SSOT Header (R42 + R53 + R117)"

  # ─── MOTORES DE VERIFICACAO DISPONIVEIS ───
  available_engines:
    python_lint: ["ruff 0.15.10", "mypy 1.20.2", "bandit 1.9.4"]
    yaml_validate: ["FR-158 YAMLValidator", "#GOV yaml.sanitize", "FR-148 SubmissionPipeline"]
    mdc_validate: ["FR-158 MDCValidator", "FR-149 FullSystemAudit"]
    secret_scan: ["FR-158 SecretScanner", "#GOV secret.scan"]
    dead_code: ["FR-158 DeadCodeScanner", "#GOV deadcode.scan"]
    integrity_full: ["FR-149 FullSystemAudit", "#GOV integrity.full"]
    governance: ["#GOV compliance.report", "#GOV audit.full", "#GOV submit"]

  # ─── AUDIT.FULL NOS CICLOS 2, 3, 4 ───
  audit_full_cycles:
    description: >
      O audit.full (FR-149) DEVE ser executado em TODO ciclo.
      Agora com 19 secoes incluindo verificacao multi-formato
      (.json, .md, .ps1, .jsonl, .bat, .sh).

    ciclo_2_durante_sessao:
      trigger: "Apos cada task concluida + handoff gerado"
      sections: [ssot, lobes, semantic, federative, rules, tools, hooks, ddd, calendar_ulq, performance, data_quality, token_cache, techniques, orphans, mordacas, scripts, ciclo2, yaml_validate, mdc_header, secret_scan, dead_code, formats]
      engine: "NC-CORE-FR-149-full-system-audit.py"
      gate: "WARN se score < 70%"

    ciclo_3_fim_sessao:
      trigger: "Ao final de cada sessao (CICLO 3)"
      sections: ["todas as 19 secoes"]
      engine: "NC-CORE-FR-149-full-system-audit.py"
      gate: "FAIL se score < 60% — BLOQUEAR encerramento ate corrigir"

    ciclo_4_limpeza_semanal:
      trigger: "A cada 5-7 dias (CICLO 4)"
      sections: ["todas as 19 secoes + relatorio em JSON"]
      engine: "NC-CORE-FR-149-full-system-audit.py"
      output: "DIR-DS-002-audit-logs/audit-full-weekly-{date}.json"
      gate: "FAIL se score < 50% — BLOQUEAR semanal ate corrigir"

