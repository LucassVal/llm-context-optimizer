ticket_id: "NC-DS-101"
status: "OPEN"
priority: "HIGH"
title: "Smoke test automatizado das 38 tools MCP — NC-SCR-FR-101-tools-smoke-test.py"
created_at: "2026-04-16T11:00:00-03:00"
created_by: "T0-Claude-Code"
agent: "AGENTE-A"
sprint: "FASE-1-MCP-MC"

context:
  gap: "G04"
  origin: "Nenhum script verifica se todas as NC-TOOL-FR-* carregam sem ImportError"
  problem: |
    Regressões silenciosas: uma tool pode quebrar sem que ninguém saiba até o
    servidor tentar carregá-la em produção. Precisamos de um script de smoke test
    que valide todas as tools antes de qualquer deploy/sessão.

task:
  description: |
    Criar 01_neocortex_framework/scripts/NC-SCR-FR-101-tools-smoke-test.py:

    1. Descobrir todos os NC-TOOL-FR-*.py em neocortex/mcp/tools/ via glob
    2. Para cada tool:
       a. py_compile — verificar sintaxe
       b. importlib.util.spec_from_file_location + exec_module em contexto isolado
          (adicionar neocortex ao sys.path para resolver relative imports)
       c. Verificar presença de register_tool() function
       d. Registrar: OK / FAIL_SYNTAX / FAIL_IMPORT / FAIL_NO_REGISTER
    3. Output: tabela com status por tool + resumo final
    4. Exit code 0 se todas OK, exit code 1 se qualquer FAIL
    5. Suportar flag --json para output machine-readable
    6. Registrar resultado via NC-SVC-FR-016-wal-service (WAL log)
    7. Salvar relatório em reports/smoke-test-YYYYMMDD.json

    Nota sobre relative imports: tools usam `from ...core.xxx import yyy`
    — resolver adicionando o package root ao sys.path e usando
    importlib com package='neocortex.mcp.tools'

  acceptance_criteria:
    - "Script executa sem erro: python NC-SCR-FR-101-tools-smoke-test.py"
    - "Reporta OK/FAIL para cada uma das 38+ tools"
    - "Exit code 1 se qualquer FAIL"
    - "Flag --json funciona"
    - "Relatório salvo em reports/"

write_zone:
  - "01_neocortex_framework/scripts/"
  - "reports/"
  - "DIR-DS-002-audit-logs/"

atomic_locks_proibidos:
  - "01_neocortex_framework/neocortex/mcp/server.py"
  - "01_neocortex_framework/neocortex/mcp/sub_server.py"

entry_state: "Sem smoke test — tools carregam somente no runtime do server"
exit_state: "Script NC-SCR-FR-101 valida todas as tools, exit 0 = tudo OK"
integrity_hash: "NC-DS-101-v1.0-20260416"

