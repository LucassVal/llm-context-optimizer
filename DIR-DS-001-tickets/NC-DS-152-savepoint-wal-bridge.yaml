# ─── CONTEXTO ──────────────────────────────────────────────────────────────
context: |
  NC-SVC-FR-016 (WALService) e NC-SVC-FR-003 (SavePointStub) existem mas não estão
  conectados entre si. Quando um SavePoint é criado, ele NÃO é registrado no WAL.
  Objetivo: criar um script de wiring que conecte os dois:
    - Ao criar um savepoint → WALService registra entrada (severity: NORMAL)
    - Ao restaurar um savepoint → WALService registra entrada (severity: HIGH)
    - Ao listar savepoints → retorna lista do WAL filtrada por type=savepoint
  Criar também um script de teste que valida o fluxo completo.

