# NC-DS-250 — MCP Resources: Implementar resources/list, resources/read, resources/templates/list, resources/subscribe
# WHAT: Expor dados de Lobes, KG e manifest como MCP Resources com URIs canônicas
# WHY: MCP clients (OpenCode, Claude Code, VS Code Copilot) esperam Resources como fonte de contexto passiva e read-only
# WHERE: 01_neocortex_framework/neocortex/mcp/resources.py (novo módulo)

ticket_id: NC-DS-250
title: "MCP Resources — Expor Lobes, KG e Manifest como Resources (resources/list, resources/read, resources/templates/list, resources/subscribe)"
status: DONE
priority: LOW
assignee: opencode
created: "2026-05-04"
implementation_note: "T0-implemented 2026-05-04: 5 resources added inline to server.py lines 451-526 (LEXICO, Lobe Manifest, Boot Manifest, Active Locks, Lobe by ID template). Uses @server.resource() decorator pattern. resources.py not created — inline implementation chosen for FastMCP compatibility."
description: |
  GAP IDENTIFICADO: O servidor MCP atual (server.py) registra apenas Tools via FastMCP. 
  O protocolo MCP define Resources como primitiva de servidor que expõe dados passivos e 
  read-only com URIs canônicas. Sem Resources, clients como OpenCode não conseguem 
  discovery automático dos dados de contexto do NeoCortex (lobes, KG, manifest).

  ESCOPO:
  1. Implementar resources/list — retorna todos os Resources diretos disponíveis:
     - neocortex://lobes/manifest → NC-MAN-LOBE-001.csv parseado como JSON
     - neocortex://kg/schema → schema atual do Knowledge Graph
     - neocortex://boot/status → estado atual do @BOOT (NC-BOOT-FR-001)
     - neocortex://locks/active → lista de @LOCKS ativos
     - neocortex://zones/active → Write Zones ativas
     - neocortex://ssot/summary → resumo do @SSOT

  2. Implementar resources/templates/list — Resources parametrizados:
     - neocortex://lobes/{lobe_id} → conteúdo de um lobe específico
     - neocortex://kg/entity/{entity_id} → entidade KG específica
     - neocortex://tickets/{ticket_id} → ticket específico por ID
     - neocortex://audit/{log_id} → log de auditoria específico

  3. Implementar resources/read — retorna o conteúdo do Resource com MIME type:
     - application/json para dados estruturados
     - text/markdown para conteúdo .mdc
     - text/yaml para tickets e manifests

  4. Implementar resources/subscribe — permite clients monitorar mudanças:
     - Wirear hooks do NeoCortex (HK-001, HK-002) → disparar notifications/resources/updated
     - Subscribe em lobes (quando @POPULATE roda)
     - Subscribe em KG (quando entidades são adicionadas/removidas)
     - Subscribe em locks (quando @LOCKS muda)

  PADRÃO DE REFERÊNCIA: NC-LBE-INT-006-mcp-specification.mdc §2.1 (Server Features — Resources).
  FastMCP SDK suporta `@mcp.resource("uri://path")` nativamente.

  IMPACTO: Habilita progressive discovery para clients MCP. Sem Resources, o NeoCortex 
  é um servidor "cego" — clients precisam conhecer tools por documentação externa.

context:
  - "Reference: 02_memory_lobes/02_integrations/NC-LBE-INT-006-mcp-specification.mdc §2.1 (Resources), §1.4 (Server Primitives: Resources)"
  - "Gap found by structural audit 2026-05-04 — NeoCortex MCP server expõe apenas Tools, zero Resources"
  - "See NC-MAN-LOBE-001.csv for lobe IDs to map as Resources"
  - "FastMCP: @mcp.resource('uri://path') decorator — Python SDK Tier 1"
  - "MCP Spec §20.2 (Implicações para NeoCortex): Resources não implementado"

task: |
  1. Criar 01_neocortex_framework/neocortex/mcp/resources.py (~300 linhas)
     a. Implementar resource_registry: dict[str, ResourceDefinition] com URI → handler
     b. Registrar Resources diretos: lobes/manifest, kg/schema, boot/status, locks/active, zones/active, ssot/summary
     c. Registrar Resource templates com URI templates e parâmetros: lobes/{id}, kg/entity/{id}, tickets/{id}, audit/{id}
     d. Implementar read_handler(uri: str) → tuple[content, mime_type]
     e. Wirear com LEXICO para resolver paths de lobes e KG
     f. Usar logger = logging.getLogger(__name__) — NUNCA print()

  2. Integrar em server.py (via @mcp.resource ou register_resource)
     a. Importar resource_registry de resources.py
     b. Registrar todos os Resources no servidor FastMCP
     c. NÃO modificar sub_server.py (R04 — @LOCKS)

  3. Implementar subscribe mechanism
     a. Criar subscription_registry: dict[str, set[str]] (URI → client_ids)
     b. Wirear hooks (NC-HK-FR-001) → quando lobe/KG/lock muda → notifications/resources/updated
     c. Implementar resources/subscribe handler (adiciona client à subscription list)

  4. VALIDAÇÃO: ruff + mypy + py_compile + bandit em resources.py
     Testar com MCP Inspector: resources/list, resources/read, resources/templates/list

write_zone: "PROD → 01_neocortex_framework/neocortex/mcp/resources.py"
