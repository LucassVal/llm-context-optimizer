task: "**PROBLEMA**: O script NC‑SCR‑FR‑061‑engineer‑documentacao.py apresentava erro\
  \ de encoding Unicode (caracteres \U0001F6A8✅\U0001F3E5 e acentos) no output do\
  \ console em ambiente Windows, causando exibição incorreta e potencial falha em\
  \ pipelines de auditoria.\n\n**SOLUÇÃO APLICADA**:\n1. **Configuração de encoding\
  \ UTF‑8 para stdout/stderr no Windows**:\n   - Adicionado bloco `if sys.platform\
  \ == \"win32\":` que substitui `sys.stdout` e `sys.stderr` por wrappers `io.TextIOWrapper`\
  \ com encoding UTF‑8.\n   - Remove tentativa falha de usar `sys.stdout.reconfigure`\
  \ (atributo desconhecido no runtime).\n2. **Correção de anotação de tipo**:\n  \
  \ - Alterado `exclude_dirs: Set[str] = None` para `exclude_dirs: Optional[Set[str]]\
  \ = None` (resolvendo erro de tipo no LSP).\n3. **Validação**:\n   - Script agora\
  \ executa sem erros de Unicode, exibindo corretamente acentos e emojis.\n   - Exit\
  \ code 0 mantido, geração do PROJECT_MAP.md preservada.\n\n**IMPACTO**: Garantia\
  \ de que ferramentas de auditoria e documentação (Engineer Agent) funcionem corretamente\
  \ em ambientes Windows, assegurando conformidade com SSOT e legibilidade dos logs.\n\
  \n**EVIDÊNCIAS**: Handoff correspondente em `DIR-DS-002-audit-logs/NC-DS-063-handoff-20260414T121130.yaml`."
