three_w:
  who: "11 arquivos com sqlite3.connect() sem WAL + 2 arquivos com DuckDB file lock"
  what: |
    PROBLEMA 1 — DuckDB file lock (bloqueio total multi-usuário):
      metrics_store.py e NC-INFRA-FR-001-metrics-store.py abrem DuckDB em modo exclusivo
      → processo 2 cai para read_only → processo 3 cai para :memory: (perde dados).
      DuckDB não suporta múltiplos escritores em arquivo. Solução: remover persistência DuckDB.

    PROBLEMA 2 — SQLite sem WAL (leitores bloqueiam escritores e vice-versa):
      11 sqlite3.connect() em produção sem PRAGMA journal_mode=WAL.
      Mode padrão DELETE: um writer bloqueia TODOS os readers (e vice-versa).
      Com WAL: múltiplos readers simultâneos + 1 writer sem bloqueio mútuo.

    PROBLEMA 3 — Duplicação R50:
      metrics_store.py e NC-INFRA-FR-001-metrics-store.py são o mesmo código (DRY violado).

    SOLUÇÃO:
      SQLite WAL = backend persistente universal (multi-user nativo).
      DuckDB = SOMENTE analytics task-scoped (open → query → close por tarefa).
      Arquivar metrics_store.py (duplicata), manter NC-INFRA-FR-001 como canônico.
  why: |
    Mission Control (NC-LBE-INT-004) já usa SQLite WAL como padrão.
    NC-LBE-CC-005 (SessionMate) documenta que MetricsCollector é a base.
    Multi-agente (Claude Code + OpenCode + DeepSeek simultâneos) exige multi-write.
    DuckDB file lock quebra silenciosamente — fallback :memory: perde métricas sem log claro.

rca:
  symptom: "DuckDB cai para :memory: em multi-processo. SQLite bloqueia em acesso concorrente."
  why_1: "DuckDB foi escolhido como backend preferido sem considerar cenário multi-processo"
  why_2: "DuckDB file lock é exclusivo por design — não suporta múltiplos escritores em arquivo"
  why_3: "SQLite sem WAL usa journal DELETE que bloqueia readers durante writes"
  why_4: "Nenhuma auditoria verificou todos os sqlite3.connect() do sistema por WAL"
  why_5: "O padrão WAL foi implementado no WAL service (NC-SVC-FR-016) mas não propagado"
  root_cause: "Padrão WAL não foi estabelecido como obrigatório no framework — cada módulo escolheu independentemente"
  corrective_action: |
    1. Remover DuckDB file persistence de metrics_store — DuckDB só :memory: para analytics
    2. Adicionar PRAGMA journal_mode=WAL + synchronous=NORMAL em todos os 11 connect()
    3. Arquivar metrics_store.py (duplicata) em 99-archive/
    4. Criar wrapper WALConnect() para padronizar futuros usos
  preventive_action: |
    Adicionar ao CICLO-0: grep 'sqlite3.connect' sem 'journal_mode=WAL' → deve ser 0.
    Adicionar ao ruff/lint: regra custom que detecta sqlite3.connect() sem WAL pragma.
    Documentar em CLAUDE.md: 'SQLite WAL é o padrão. DuckDB apenas task-scoped :memory:'

