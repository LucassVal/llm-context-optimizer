# ============================================================================
# RESUMO EXECUTIVO PARA T0
# ============================================================================

executive_summary: |
  O protocolo atual de lock file (PASSO 2A/B/C) não está prevenindo race conditions
  com 10 workers simultâneos. Observamos múltiplos workers sobrescrevendo o
  queue.lock, stale claims poluindo a fila, e falta de atomicidade real na
  operação de claim. A escalabilidade está comprometida.

# ============================================================================
# PROBLEMAS DETECTADOS (com evidências)
# ============================================================================

issues_detected:
  - issue: "lock_file_race_condition"
    description: "Múltiplos workers criam queue.lock simultaneamente sem verificar timestamp de 60s"
    evidence:
      - "queue.lock criado por worker-44949-f87cfd (19:54:34.750) sobrescrito por worker-8512-f87cfd (22:54:01.495) sem intervalo de 60s"
      - "Observei pelo menos 3 workers diferentes competindo pelo lock em <5s"
    impact: "Lock não garante exclusividade; workers operam com visão inconsistente da fila."

  - issue: "stale_claims_in_available_tasks"
    description: "Tasks com status: AVAILABLE mas claimed_by não null"
    examples:
      - "NC-DS-017: AVAILABLE, claimed_by: worker-1776022151-2196eb"
      - "NC-DS-019: AVAILABLE, claimed_by: 2026-04-12T18:40:02.624"
      - "NC-DS-021 a NC-DS-025: similares (5 tasks)"
    count: 7
    root_cause: "Limpeza inadequada após task DONE; ou workers crashando sem cleanup."
    impact: "Confusão no algoritmo de busca por AVAILABLE; workers podem pular tasks realmente disponíveis."

  - issue: "insufficient_wait_time_for_10_workers"
    description: "Espera de 5s após claim é insuficiente para 10 workers concorrentes"
    calculation: "10 workers × leitura/escrita ~2s cada = janela de colisão alta"
    impact: "Múltiplos workers podem ler a mesma versão da fila e tentar claim idêntico."

  - issue: "non_atomic_yaml_operation"
    description: "Sequência ler→modificar→escrever YAML não é atômica, mesmo com lock file"
    scenario: "Worker A adquire lock, lê YAML, worker B adquire lock antes de A escrever (lock liberado muito cedo)"
    impact: "Dois workers podem acreditar que têm o mesmo claim."

  - issue: "inconsistent_timestamps_and_health_check"
    description: "claimed_at muito antigo em tasks ativas, sem monitoramento"
    example: "NC-DS-016: claimed_at 19:28:23.777, completed_at 18:34:46 (inconsistente), status ACTIVE"
    impact: "Impossível detectar workers travados ou zombies."

# ============================================================================
# SUGESTÕES TÉCNICAS PARA 10 WORKERS SIMULTÂNEOS
# ============================================================================

technical_recommendations:
  - priority: "CRITICAL"
    title: "Implementar lock atômico com backoff exponencial"
    implementation: |
      PASSO 2A revisado:
        1. Tentar criar queue.lock com conteúdo exclusivo (PID/timestamp)
        2. Se já existe: ler timestamp, calcular idade
        3. Se idade > 60s: sobrescrever (lock abandonado)
        4. Se idade ≤ 60s: esperar backoff exponencial (3s, 6s, 12s, 24s, 48s)
        5. Após 5 tentativas: BLOQUEADO, reportar ao T0
    benefit: "Reduz contenção, dá chance a outros workers."

  - priority: "HIGH"
    title: "Cleanup automático diário/por script"
    implementation: "Script NC-SCR-FR-008-cleanup-queue.py que:
      - Remove claimed_by de tasks AVAILABLE
      - Reverte CLAIMED >300s para AVAILABLE
      - Corrige timestamps inconsistentes
      - Gera report para T0"
    benefit: "Mantém fila limpa e consistente."

  - priority: "HIGH"
    title: "Atomicidade via rename ou SQLite"
    implementation: |
      Opção A: Escrever YAML em arquivo temporário, depois rename atômico
      Opção B: Migrar para SQLite (roadmap MCP-WQUEUE) com transações ACID
    benefit: "Elimina race conditions completamente."

  - priority: "MEDIUM"
    title: "Health check de workers"
    implementation: "Monitor que verifica claimed_at vs tempo atual:
      - Se claimed_at > 300s e status CLAIMED/ACTIVE: alerta T0
      - Se worker não atualizar heartbeat (active-zones): expira claim"
    benefit: "Detecção precoce de workers travados."

  - priority: "LOW"
    title: "Melhor logging e auditoria"
    implementation: "Registrar todas as transições de status em log estruturado (JSONL)"
    benefit: "Debugging de concorrência e análise de performance."

