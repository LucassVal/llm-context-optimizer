# ─────────────────────────────────────────────────────────────────
# PROTOCOLO CONSERVADOR OBRIGATÓRIO (prevenir quebra de cascata)
# ─────────────────────────────────────────────────────────────────
protocol_conservador:
  step_0_verificacao_obrigatoria: |
    Antes de renomear QUALQUER arquivo:
    1. grep -r "from neocortex.core import" neocortex/mcp/server.py   → deve retornar VAZIO
    2. grep -r "from neocortex.core import" neocortex/mcp/sub_server.py → deve retornar VAZIO
    3. grep -rn "from .{OLD_MODULE}" neocortex/ para o arquivo alvo
    4. grep -rn "from neocortex.core.{OLD_MODULE}" . --include="*.py"
    SE qualquer resultado mencionar server.py ou sub_server.py → PARAR e retornar ESCALATED ao T0.

  step_1_rename_com_alias: |
    Estratégia segura (NÃO rename direto):
    (a) Criar arquivo NC-CORE-FR-NNN-{name}.py com o conteúdo original
    (b) Manter arquivo OLD com redirecionamento (alias shim):
        # {old_name}.py — ALIAS SHIM (deprecado → NC-CORE-FR-NNN)
        # Mantido por compatibilidade com importers existentes
        from neocortex.core.NC_CORE_FR_NNN_{mod} import *  # noqa: F401,F403
        __all__ = [...]  # re-exportar todos os símbolos públicos
    (c) Adicionar comentário deprecation warning no shim
    ATENÇÃO: o nome NC-CORE-FR-NNN-{name}.py tem hífens → importar via importlib (R09)
    Os shimms {old_name}.py sem hífens podem ser importados normalmente.

  step_2_atualizar_imports_diretos: |
    Para cada arquivo que importa OLD_MODULE diretamente:
    grep -rn "from neocortex.core.{old_stem}" . --include="*.py"
    grep -rn "from .{old_stem}" neocortex/core/ --include="*.py"
    Atualizar APENAS se não for server.py/sub_server.py (@LOCK).
    NÃO atualizar server.py e sub_server.py.

  step_3_validacao_por_arquivo: |
    Para cada arquivo NC-CORE-FR-NNN criado:
    (a) python -m py_compile {arquivo}
    (b) python -m ruff check {arquivo} --select F,E9
    (c) print() → PROIBIDO, usar logger
    Falhou? → NÃO prosseguir. Registrar em handoff como FAILED.

  step_4_teste_importacao: |
    python -c "
    import sys; sys.path.insert(0, '01_neocortex_framework')
    import importlib.util, pathlib
    spec = importlib.util.spec_from_file_location('test', '{path_to_new_file}')
    mod = importlib.util.module_from_spec(spec)
    spec.loader.exec_module(mod)
    print('OK:', dir(mod))
    "
    SE falhar → registrar detalhes no handoff.

  step_5_validar_shim: |
    Verificar que o shim {old_name}.py importa e re-exporta corretamente:
    python -c "from neocortex.core.{old_stem} import *; print('shim OK')"

  step_6_lock_check_final: |
    git diff --name-only HEAD | grep -E "server\.py|sub_server\.py"
    → deve retornar VAZIO. Se não estiver vazio → CRÍTICO: reverter imediatamente.

strategy_for_high_importer_files: |
  Para arquivos com importers >= 5 (file_utils=13, ledger_service=12, lobe_service=10, etc.):
  - OBRIGATÓRIO criar shim de compatibilidade (step_1b acima)
  - NÃO remover o arquivo antigo — apenas adicionar o comentário DEPRECATED
  - O shim deve re-exportar __all__ completo
  - Testar AMBOS o arquivo novo e o shim

batch_size: |
  Processar em lotes de 4 arquivos, validando cada lote antes de prosseguir.
  Lote 1: arquivos com importers <= 2 (mais seguros)
  Lote 2: arquivos com importers 3-5
  Lote 3: arquivos com importers >= 6 (mais críticos)

