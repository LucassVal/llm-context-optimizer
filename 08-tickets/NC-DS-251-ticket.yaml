# WHAT: Expor SOPs, handoff templates e audit workflows como Prompts MCP parametrizados
# WHY: Prompts são templates de instrução controlados pelo usuário — sem eles, não há "melhores práticas" expostas via protocolo
# WHERE: 01_neocortex_framework/neocortex/mcp/prompts.py (novo módulo)

ticket_id: NC-DS-251
title: "MCP Prompts — Expor SOPs, Handoff Templates e Audit Workflows como Prompts (prompts/list, prompts/get)"
status: DONE
priority: P0
assignee: opencode
created: "2026-05-04"
description: |
  GAP IDENTIFICADO: O servidor MCP não expõe Prompts. O protocolo MCP define Prompts 
  como templates de instrução pré-construídos e parametrizados que o USUÁRIO (não o modelo) 
  controla. Sem Prompts, o NeoCortex perde a capacidade de guiar usuários em workflows 
  complexos e perde alignment com a spec oficial.

  ESCOPO:
  1. Implementar prompts/list — retorna todos os Prompts disponíveis:
     - "nc-audit" → Executa auditoria 3 camadas (compile + runtime + operational)
     - "nc-handoff" → Gera handoff YAML para conclusão de ticket
     - "nc-boot-sync" → Sincroniza @BOOT e regenera artifact_catalog.json
     - "nc-validate" → Pipeline R6 completo para validação de arquivos
     - "nc-lint" → Verificação rápida (ruff + mypy)
     - "nc-remediate" → Corrige automaticamente erros de lint/validate
     - "nc-governance-audit" → Auditoria completa de governance compliance
     - "nc-populate-lobes" → Popula/atualiza lobes via @POPULATE
     - "nc-archive" → Move obsoletos para DIR-ARC-FR-001-archive-main/
     - "nc-ticket-create" → Template para criação de novos tickets NC-DS

  2. Implementar prompts/get — retorna o prompt completo com argumentos preenchidos:
     - Cada prompt define argumentos tipados (ticket_id, file_path, level, etc.)
     - Prompt retornado inclui system prompt + user message template
     - Suporta argumentos obrigatórios e opcionais com defaults

  3. Mapeamento SOP → Prompt:
     - Cada SOP documentada em DIR-DOC-FR-001-docs-main/ vira um Prompt
     - Handoff templates (NC-DS-HANDOFF-TEMPLATE.yaml) viram base para prompts/get
     - Audit workflows (nc-audit skill) viram prompt com parâmetros de escopo

  PADRÃO DE REFERÊNCIA: NC-LBE-INT-006-mcp-specification.mdc §2.1 (Prompts), §2.2 (Multi-Server Orchestration — prompt "plan-vacation" example).
  FastMCP SDK suporta `@mcp.prompt()` decorator nativamente.

  IMPACTO: Usuários de clients MCP (OpenCode, Claude Desktop) podem invocar workflows 
  NeoCortex sem memorizar comandos. Alinhamento total com spec oficial.

