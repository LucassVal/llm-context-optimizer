# 3. CICLOS DE VIDA E ROTINAS
# ─────────────────────────────────────────────────────────────────────────────
lifecycle_cycles:
  daily_cycles:
    name: "4 Ciclos Diários"
    reference: "NC-CYC-FR-001-4-cycle-validation.md"
    cycles:
      cycle_1:
        name: "Início de Sessão"
        purpose: "Carregar contexto do catálogo semântico e estabelecer baseline"
        checklist_key: "Catálogo <24h, bootup lido, YAMLs de governança validados"
      
      cycle_2:
        name: "Durante a Sessão"
        purpose: "Referenciar artefatos durante tarefas e garantir conformidade"
        checklist_key: "Artefato consultado no catálogo, zona de escrita permitida, SSOT atualizado"
      
      cycle_3:
        name: "Fim de Dia/Sessão"
        purpose: "Atualizar catálogo semântico e consolidar ganhos de contexto"
        checklist_key: "Catálogo atualizado, bootup sincronizado, YAMLs sanitizados"
      
      cycle_4:
        name: "Limpeza Semanal"
        purpose: "Manter baseline limpa e preparar ambiente para próxima semana"
        checklist_key: "Tickets órfãos auditados, auditoria de governança, conformidade NC- 100%"
        governance_audit: "NC-SCR-FR-080-governance-auditor.py --execute"

  ticket_lifecycle:
    name: "Ciclo de Vida de Tickets"
    reference: "NC-GOV-FR-002-ticket-lifecycle.yaml"
    stages:
      creation:
        name: "Criação"
        purpose: "Identificar necessidade e criar ticket YAML"
        validation: "NC-SCR-FR-006-ticket-validator.py"
      
      opening:
        name: "Abertura"
        purpose: "Colocar ticket em estado pronto para execução"
        actions: "add_to_queue, assign_to_agent"
      
      verification:
        name: "Verificação"
        purpose: "Validar pré-condições antes de executar"
        checks: "files_exist, files_must_not_exist, active_locks"
      
      execution:
        name: "Execução"
        purpose: "Executar tarefa com Mentor Mode (STEP 0)"
        validation: "mentor_step_0(), hooks PreToolUse"
      
      closing:
        name: "Fechamento"
        purpose: "Gerar handoff, atualizar roadmap, arquivar"
        artifacts: "handoff YAML, %DONE no roadmap, changelog SSOT"

