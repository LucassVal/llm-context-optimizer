ticket_id: NC-DS-150
title: "Smoke Test das 40 Tools MCP — Validação end-to-end via JSON-RPC"
status: OPEN
priority: CRITICAL
roadmap_ref: NC-DS-101
created_at: "2026-04-20T20:25:00-03:00"
created_by: T0-Antigravity
assigned_to: OpenCode-Agent-1

# ─── CONTEXTO ──────────────────────────────────────────────────────────────
context: |
  O MCP Server (server.py) expõe 40+ tools NC-TOOL-FR-000 a NC-TOOL-FR-043.
  Nenhum smoke test automatizado valida se todas respondem sem erro.
  Objetivo: criar script que chama cada tool via subprocess (stdin/stdout JSON-RPC)
  e reporta: PASS / FAIL / TIMEOUT para cada uma.

# ─── STEP 0 OBRIGATÓRIO (antes de qualquer ação) ────────────────────────────
step_0:
  - "Ler NC-SEC-FR-001-atomic-locks.yaml PRIMEIRO"
  - "Ler DIR-DS-001-tickets/NC-DS-HANDOFF-TEMPLATE.yaml — este é o seu handoff de saída"
  - "python --version → verificar se Python está disponível"
  - "python -c 'import json, subprocess, sys' → confirmar módulos stdlib disponíveis"
  - "Listar neocortex/mcp/tools/ para ver as tools existentes"
  - "cat neocortex/mcp/server.py | grep 'register_tool\\|TOOL_MODULE_MAP' | head -50 → mapear as 40 tools"

# ─── ATOMIC LOCKS ───────────────────────────────────────────────────────────
atomic_locks_inviolaveis:
  - "neocortex/mcp/server.py → NUNCA modificar"
  - "neocortex/mcp/sub_server.py → NUNCA modificar"
  - "DIR-DOC-FR-001-docs-main/NC-NAM-FR-001-naming-convention.md → apenas ADICIONAR"

# ─── TAREFA ─────────────────────────────────────────────────────────────────
task: |
  Criar script NC-TEST-FR-150-smoke-test-40-tools.py em 05_examples/
  O script deve:
  1. Importar o mapa de tools do server.py (via importlib — R09)
     OU reconstruir a lista via glob de neocortex/mcp/tools/*.py
  2. Para cada tool: enviar um MCP JSON-RPC "tools/list" request básico
     (modo seguro: NÃO invocar tools que modificam estado — apenas listar)
  3. Registrar: tool_name, status (PASS/FAIL/SKIP), error_msg, latency_ms
  4. Gerar relatório JSON: 05_examples/NC-RPT-150-smoke-test-results.json
  5. Imprimir resumo: X/40 PASS, Y FAIL, Z SKIP

implementation_notes: |
  - NÃO iniciar o servidor MCP real — apenas validar que cada módulo importa sem erro
  - Para cada arquivo em neocortex/mcp/tools/*.py:
      a. python -m py_compile <arquivo> → PASS/FAIL
      b. importlib.util.spec_from_file_location + exec_module → tenta importar
      c. hasattr(mod, 'register_tool') → verifica se tem register_tool
  - NUNCA usar print() — usar logger = logging.getLogger(__name__)
  - Usar get_config() para caminhos (R10)
  - Usar importlib.util para módulos com hífens (R09)

# ─── REGRAS CRÍTICAS ────────────────────────────────────────────────────────
regras:
  R09: "NUNCA 'import NC-TOOL-FR-XXX'. Usar: importlib.util.spec_from_file_location()"
  R10: "NUNCA hardcode paths. Usar get_config() ou Path(__file__).parent"
  R11: "NUNCA print(). Usar logger = logging.getLogger(__name__)"
  R21: "VERIFICAR ambiente antes de afirmar. Se dúvida → PARAR e retornar ESCALATED"
  LOCK: "server.py e sub_server.py são IMUTÁVEIS"

# ─── VALIDAÇÕES OBRIGATÓRIAS ANTES DO HANDOFF ────────────────────────────────
pre_handoff_checklist:
  - "python -m py_compile 05_examples/NC-TEST-FR-150-smoke-test-40-tools.py → PASS"
  - "python -m ruff check 05_examples/NC-TEST-FR-150-smoke-test-40-tools.py --select F,E9 → 0 erros"
  - "grep -n 'print(' 05_examples/NC-TEST-FR-150-smoke-test-40-tools.py → VAZIO"
  - "python 05_examples/NC-TEST-FR-150-smoke-test-40-tools.py → gera NC-RPT-150"
  - "Verificar: NC-RPT-150-smoke-test-results.json existe e tem campo 'results'"
  - "git diff --name-only HEAD | grep -E 'server\\.py|sub_server\\.py' → VAZIO"

# ─── ENTREGÁVEIS ────────────────────────────────────────────────────────────
deliverables:
  - "05_examples/NC-TEST-FR-150-smoke-test-40-tools.py"
  - "05_examples/NC-RPT-150-smoke-test-results.json (gerado ao rodar o script)"
  - "DIR-DS-002-audit-logs/NC-DS-150-handoff-{YYYYMMDDTHHMMSS}.yaml"

handoff_dest: "DIR-DS-002-audit-logs/NC-DS-150-handoff-{YYYYMMDDTHHMMSS}.yaml"
handoff_template: "DIR-DS-001-tickets/NC-DS-HANDOFF-TEMPLATE.yaml"
write_zone: "TEST → 05_examples/"

escalation_triggers:
  - "Se importar qualquer tool causar crash do Python"
  - "Se server.py ou sub_server.py precisarem ser tocados"
  - "Se menos de 20/40 tools passarem no import check"
