    Criar NC-TOOL-FR-022-session.py com register_tool(mcp) e ações:

    checkpoint.get_current   → retorna checkpoint ativo da sessão
    checkpoint.set_current   → define novo checkpoint com ID e descrição
    checkpoint.complete_task → marca tarefa como concluída no checkpoint
    checkpoint.list_history  → histórico de checkpoints da sessão
    regression.check         → verifica se erro atual é similar a regressão conhecida
