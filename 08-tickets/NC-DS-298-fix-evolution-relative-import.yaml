  why_1: "O arquivo NC-SUPER-016 usa imports relativos (from . import X)"
  why_2: "O MCP carrega tools via importlib.util.spec_from_file_location() como módulo standalone"
  why_3: "Módulo standalone não tem __package__ definido — imports relativos falham"
  why_4: "O padrão correto do NeoCortex (R09) é usar importlib.util.spec_from_file_location() para deps"
  why_5: "NC-SUPER-016 foi criado antes ou sem seguir R09 — usa imports relativos proibidos"
  root_cause: "Imports relativos em arquivo carregado como standalone — viola R09"
  corrective_action: |
    Substituir todos os imports relativos em NC-SUPER-016 por:
    importlib.util.spec_from_file_location('modulo', Path(__file__).parent / 'NC-DEP-XXX.py')
    OU converter para imports absolutos se o package está no PYTHONPATH.
  preventive_action: |
    Adicionar ao CICLO-0: grep 'from \.' em todos os NC-SUPER-*.py — detectar violações R09.
    Adicionar ao CI/lint: 'ruff check --select TID252' para relative imports.

