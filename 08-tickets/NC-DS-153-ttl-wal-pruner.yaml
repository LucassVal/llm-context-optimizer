task: "1. Criar scripts/NC-SCR-FR-148-wal-ttl-pruner.py\n   Script de manutenção autônomo:\n\
  \     - Aceita argumento CLI: --days N (padrão 30)\n     - Carrega WALService via\
  \ importlib\n     - Chama wal.prune(days=N) → obtém count de entradas removidas\n\
  \     - Carrega TTLManager via importlib\n     - Registra execução no TTLManager:\
  \ key=\"wal.prune\", last_run=datetime.now()\n     - Salva relatório JSON em DIR-DS-002-audit-logs/NC-RPT-153-wal-prune-{DATE}.json\n\
  \     - Logger INFO: \"WAL pruned: {count} entries removed (>{N} days)\"\n     -\
  \ Exit 0 em sucesso, Exit 1 em erro\n\n2. Criar 05_examples/NC-TEST-153-ttl-wal-prune.py\n\
  \   Teste de integração:\n     - Executa NC-SCR-FR-148 via subprocess\n     - Verifica\
  \ exit code = 0\n     - Verifica que NC-RPT-153-*.json foi criado\n     - Verifica\
  \ que JSON tem campos: entries_removed, days_threshold, timestamp\n     - Imprime\
  \ PASS/FAIL para cada check\n"
