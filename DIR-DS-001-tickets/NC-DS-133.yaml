task: |
  Implementar KG-002: sistema para popular Knowledge Graph a partir de múltiplas fontes de dados.
  
  Objetivos:
  1. Criar NC-SVC-FR-026-knowledge-graph-builder.py que:
     - Extrai entidades e relações de lobes de memória (.mdc)
     - Processa artefatos do catálogo semântico
     - Integra com LexicoService para normalização semântica
     - Constrói grafo de conhecimento com propriedades
  
  2. Fontes de dados a processar:
     - Todos os lobes em 02_memory_lobes/
     - Artefatos do catálogo (NC-NAM-FR-001)
     - Tickets e handoffs (DIR-DS-001-tickets/, DIR-DS-002-audit-logs/)
     - Logs do sistema e métricas
  
  3. Criar ferramenta MCP NC-TOOL-FR-050-knowledge-graph.py com ações:
     - kg.populate: disparar população do KG
     - kg.query: consultar grafo com Cypher-like syntax
     - kg.visualize: gerar visualização do grafo
     - kg.stats: mostrar estatísticas do KG
  
  4. Implementar features:
     - Incremental updates (apenas novos/alterados)
     - Deduplicação de entidades
     - Inferência de relações implícitas
     - Export para formatos padrão (RDF, Neo4j)

