context:
  gap: "G08"
  origin: "HookRegistry existe (NC-HK-FR-001) mas não tem hook que alimenta o MC activity feed"
  problem: |
    O Mission Control tem um activity feed SSE mas o NeoCortex não emite eventos para ele.
    NC-HK-FR-001-hook-registry.py tem a infraestrutura de hooks mas não há nenhum hook
    que chame o MC adapter. O MC fica "mudo" — sem feed em tempo real de tool calls.

task:
  description: |
    1. Ler NC-HK-FR-001-hook-registry.py — entender interface: register_hook(), emit()
    2. Ler NC-HK-FR-002-simple-hook.py — usar como template de implementação
    3. Ler NC-ADP-FR-001-mission-control.py — entender método report(event_type, data)
    4. Criar neocortex/core/hooks/NC-HK-FR-003-mission-control-hook.py:
       - Classe MissionControlHook que implementa interface de hook
       - on_tool_call(tool_name, args) → adapter.report('tool_call', {tool, args_summary})
       - on_tool_result(tool_name, result, duration_ms) → adapter.report('tool_result', {...})
       - on_error(tool_name, error) → adapter.report('tool_error', {...})
       - Todas as chamadas ao adapter são Fire-and-Forget (thread daemon)
       - Se adapter offline: logger.debug, não bloquear
    5. Registrar o hook no HookRegistry via função de auto-registro
    6. Carregar NC-ADP-FR-001 via importlib.util (R09)
    7. Atualizar NC-GOV-FR-004-fr-artifacts-registry.yaml com NC-HK-FR-003
    8. py_compile + ruff check → 0 erros

  acceptance_criteria:
    - "NC-HK-FR-003 implementa interface de hook correta"
    - "Tool call emite evento para MC adapter"
    - "Adapter offline não crasha o hook"
    - "Carrega adapter via importlib (R09)"
    - "Ruff: 0 erros, 0 print()"

