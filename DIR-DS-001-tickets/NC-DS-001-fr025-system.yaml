task:
  description: |
    Criar NC-TOOL-FR-025-system.py com register_tool(mcp) e as seguintes ações:

    config.get          → retorna config atual (neocortex_config.yaml) via get_config()
    config.reload       → recarrega config sem reiniciar servidor
    config.diff         → compara config atual vs config_dev (diferenças entre ambientes)
    system.diagnostics  → coleta: versão Python, PYTHONPATH, memory usage, uptime servidor
    system.env_check    → verifica variáveis de ambiente obrigatórias (PYTHONUTF8, PYTHONPATH)
    pulse.status        → retorna schedules ativos no pulse_scheduler
    pulse.schedule_custom → adiciona schedule customizado ao pulse
    pulse.force         → força execução imediata de uma task do pulse (pruning, consolidation)

    Absorve: NC-TOOL-FR-005-config.py + NC-TOOL-FR-011-pulse.py
    Padrão: seguir EXATAMENTE a estrutura de NC-TOOL-FR-029-health.py

  entry_state:
    files_exist:
      - "neocortex/mcp/tools/NC-TOOL-FR-005-config.py"
      - "neocortex/mcp/tools/NC-TOOL-FR-011-pulse.py"
    files_must_not_exist:
      - "neocortex/mcp/tools/NC-TOOL-FR-025-system.py"

  exit_state:
    files_created:
      - "neocortex/mcp/tools/NC-TOOL-FR-025-system.py"
    files_modified:
    files_deleted: []
    ssot_updated: true
    compiles_ok: true
    roadmap_done: FR-025

