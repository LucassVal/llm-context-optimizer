# ─── TAREFA ─────────────────────────────────────────────────────────────────
task: |
  PARTE 1 — Executar Governance Auditor e analisar resultado:
    1. python scripts/NC-SCR-FR-080-governance-auditor.py → capturar saída completa
    2. Identificar as 10 principais violações que bloqueiam compliance >80%
    3. Para cada violação CORRIGÍVEL (não requer tocar @LOCK):
       - Corrigir diretamente (se for simples: naming, yaml syntax, etc.)
    4. Re-executar auditor e verificar se compliance subiu

  PARTE 2 — SSOT Cross-Audit:
    Criar script 05_examples/NC-TEST-154-ssot-cross-audit.py que:
      a. Lê todas as entradas da tabela SSOT em NC-NAM-FR-001-naming-convention.md
      b. Para cada arquivo referenciado: verifica se existe em disco
      c. Lista: MISSING (no SSOT mas não no disco), UNLISTED (no disco mas não no SSOT)
      d. Gera relatório JSON: 05_examples/NC-RPT-154-ssot-cross-audit.json
         com campos: total_ssot, total_disk, missing, unlisted, compliance_pct

  EXCEÇÃO: NÃO corrigir entradas que requerem modificar @LOCK files.
  EXCEÇÃO: NC-CORE-FR-101..124 já foram adicionados ao SSOT no NC-DS-123 — NÃO duplicar.

