# NC-CFG-GUARDIAN-001 — Agent Policy: guardian (Qwen 3b ou DeepSeek)
# Gerado: 2026-04-19 | AGENT-001

agent:
  role: "guardian"
  tier: "T1"
  description: "Agente de supervisão e segurança. Monitora outros agentes."

  backend:
    provider: "litellm"
    model: "deepseek/deepseek-chat"
    base_url: "http://localhost:4000"
    fallback:
      provider: "ollama"
      model: "qwen2.5-coder:3b-instruct"
      base_url: "http://localhost:11435"

  circuit_breaker:
    max_calls: 30
    window_sec: 60
    max_identical: 8
    cooldown_sec: 60

  token_budget:
    max_tokens_per_task: 4096
    max_tokens_session: 32768
    warn_at_percent: 70

  allowed_tools:
    - "neocortex_security"       # TODOS — incluindo cb.reset, lock.check
    - "neocortex_memory"
    - "neocortex_akl"
    - "neocortex_ledger"
    - "neocortex_orchestration"  # agent.heartbeat, agent.list
    - "neocortex_health"
    - "neocortex_notification"
    - "neocortex_governance"     # audit.replay, violation.log

  forbidden_actions:
    - "agent.spawn"              # Apenas T0 spawna
    - "lobe.delete"
    - "config.reload"            # Guardian não recarrega config

  allowed_lobes:
    read:  ["NC-LBE-*"]              # Leitura total
    write: ["NC-LBE-FR-SECURITY-001"] # Só lobe de segurança

  isolation:
    can_delegate_to: []
    reports_to: "T0"
    heartbeat_interval_sec: 20
    monitors: ["courier", "engineer"]   # Guardian monitora T2
