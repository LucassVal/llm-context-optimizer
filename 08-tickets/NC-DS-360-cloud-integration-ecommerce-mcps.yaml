ticket_id: "NC-DS-360"
title: "Cloud Integration for E-Commerce MCPs (Mercado Livre & Shopee)"
status: DONE
completed_at: "2026-05-18"
priority: P1
effort: 2h
owner: T0
category: integration
created_at: "2026-05-18"
roadmap_ref: CICLO_7
depends_on: []

three_w:
  who: "Firebase Cloud Functions Gateway + cloud_proxy.py + Shopee/ML APIs"
  what: |
    Implementar os servidores MCP Mercado Livre (newerton) e Shopee (PedroGuilhermeSilv)
    no gateway central do Firebase Cloud Functions. A integração da Shopee utilizará o Google
    Secret Manager para persistir com segurança o SHOPEE_APP_ID e SHOPEE_SECRET.
    Mapeamento de ferramentas dedicadas:
    - `mercado_livre_search_products(query)`
    - `shopee_search_products(keyword, category_id, sort_by)`
    - `shopee_search_categories(keyword)`
  why: |
    O ecossistema e-commerce é dinâmico e consome APIs externas. Rodar esses servidores
    localmente expõe chaves secretas (Shopee), exige instalação de dependências pesadas
    (Node.js/Poetry) e aumenta o footprint local. Ao migrar para o Firebase, centralizamos a
    infraestrutura e segurança das chaves na nuvem, expondo as tools via nosso transporte
    unificado `cloud_proxy`.

rca:
  symptom: "Ausência de ferramentas de consulta de e-commerce e risco de chaves expostas localmente"
  why_1: "Os lobes USR-007 e USR-008 mapeiam os MCPs apenas para rodar em stdio local"
  why_2: "O Shopee MCP exige credenciais de Afiliado (App ID e Secret) que não devem ser hardcoded"
  why_3: "Não há um repositório centralizado ou padrão seguro local para rodar múltiplos runtimes (Python/Poetry + Node/NPX) em paralelo sem degradar performance"
  root_cause: "Arquitetura anterior priorizava stdio local; a migração para a nuvem exige offloading de ferramentas baseadas em web APIs para o Firebase Cloud Functions."

kiss:
  approach: |
    Em vez de subir múltiplos microsserviços ou stubs de proxy local, estender o arquivo de rotas
    do Firebase Cloud Functions (`functions/main.py`) registrando as ferramentas individualmente.
    As ferramentas farão requisições HTTP diretas para as APIs respectivas usando a lógica DDD de
    cada MCP, aproveitando chaves seguras providas por variáveis de ambiente ou Secret Manager.
  lines_changed: 80
  risk: "Baixo. As novas rotas de integração não impactam as 21 super-tools de governança e infraestrutura já operantes."
  no_new_files: false

