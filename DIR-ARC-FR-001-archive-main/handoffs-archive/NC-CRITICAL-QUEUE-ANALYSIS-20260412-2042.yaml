# ============================================================
# SYSTEMIC ROOT CAUSES
# ============================================================
root_causes:
  - cause: "NON-ATOMIC CLAIM PROTOCOL"
    description: |
      Current "atomic-ish via timestamp" is not atomic. Multiple workers can:
      1. Read status:AVAILABLE simultaneously
      2. All attempt to write claimed_by
      3. Only last writer wins, others see CLAIMED but think they succeeded
      4. Result: corrupted state, wasted cycles

  - cause: "MISSING TRANSACTIONAL INTEGRITY"
    description: |
      Read-modify-write operations on YAML are not transactional.
      File locking (queue.lock) is implemented but:
      - Lock acquisition and release not atomic
      - No lock timeout handling in all workers
      - Lock file can be deleted by other processes

  - cause: "INCONSISTENT STATE PROPAGATION"
    description: |
      When a ticket completes (DONE), multiple fields must update atomically:
      status→DONE, completed_at→timestamp, claimed_by→null
      Current system updates these separately → intermediate inconsistent states

  - cause: "MISSING CLEANUP MECHANISMS"
    description: |
      No cron job or watchdog to:
      - Reset expired claims (>300s)
      - Fix status/completed_at mismatches
      - Remove zombie locks
      - Reconcile handoff vs queue state

