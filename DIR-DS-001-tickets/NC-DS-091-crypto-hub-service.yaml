  problem: |
    security_service.py.encrypt_sensitive() usa method: "simulated_aes256" —
    é um stub que só loga. Nenhuma criptografia real existe no projeto.
    config_validation.py detecta segredos em plain text mas não os encripta.
    NC-UTL-FR-002-hash-utils.py tem SHA-256/HMAC mas não criptografia simétrica.
    Fragmentação: 4 arquivos de segurança sem ponto de entrada único.
  gap: |
    encrypt_sensitive = stub (confirmado: "method: simulated_aes256")
    Sem gestão de chave mestra
    Sem criptografia real de API keys em config

  key_decision: "NEOCORTEX_MASTER_KEY via variável de ambiente (opção 1 aprovada)"

task:
  description: |
    Criar NC-SVC-FR-017-crypto-hub.py em:
      01_neocortex_framework/neocortex/core/services/

    O serviço deve:

    1. Carregamento de chave
       - Lê NEOCORTEX_MASTER_KEY do ambiente (os.environ)
       - Se ausente: emite warning + usa modo "hash-only" (sem encrypt/decrypt)
       - Deriva chave Fernet via PBKDF2HMAC(SHA256, salt=project_id, iterations=100_000)
       - Nunca imprime/loga a chave derivada

    2. encrypt(plaintext: str) -> str
       - Retorna token Fernet: base64url(version + ts + iv + ciphertext + hmac)
       - WAL-logged: registra operação SEM o plaintext/ciphertext (só file_path + sha256(ciphertext))

    3. decrypt(token: str) -> str
       - Valida HMAC antes de decriptar
       - WAL-logged: registra attempt + outcome (success/fail)

    4. rotate_key(new_master_key: str) -> RotateResult
       - Re-encripta todos os tokens registrados com nova chave
       - WAL-logged como session única

    5. scan_config(config_path: str | Path) -> ScanResult
       - Detecta valores marcados com tag !secret no YAML
       - Retorna lista de campos que precisam ser encriptados

    6. CLI:
       NEOCORTEX_MASTER_KEY=xxx python NC-SVC-FR-017-crypto-hub.py encrypt "valor"
       NEOCORTEX_MASTER_KEY=xxx python NC-SVC-FR-017-crypto-hub.py decrypt "token"
       NEOCORTEX_MASTER_KEY=xxx python NC-SVC-FR-017-crypto-hub.py scan-config <path>
       NEOCORTEX_MASTER_KEY=xxx python NC-SVC-FR-017-crypto-hub.py rotate-key

    Dependência: cryptography (Fernet) — adicionar ao requirements.txt
    Linha a adicionar: cryptography>=42.0.0  # AES-128-CBC + HMAC via Fernet

    Integração WAL: via import_pattern idêntico ao NC-DS-089 (parents[2])

  integration_note: |
    NÃO modificar security_service.py ainda — isso é escopo do NC-DS-093.
    Este ticket cria APENAS o serviço isolado e testa via CLI.

  verification: |
    pip install cryptography>=42.0.0
    python -m py_compile NC-SVC-FR-017-crypto-hub.py && echo OK
    NEOCORTEX_MASTER_KEY=test123 python NC-SVC-FR-017-crypto-hub.py encrypt "api-key-teste"
    # → deve retornar token base64
    NEOCORTEX_MASTER_KEY=test123 python NC-SVC-FR-017-crypto-hub.py decrypt "<token>"
    # → deve retornar "api-key-teste"

  instrucoes_handoff: |
    Salvar em: DIR-DS-002-audit-logs/NC-DS-091-handoff-YYYYMMDDTHHMMSS.yaml

  checklist_r20:
