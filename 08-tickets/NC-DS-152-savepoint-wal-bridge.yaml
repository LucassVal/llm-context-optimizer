task: "1. Criar NC-SVC-FR-025-savepoint-wal-bridge.py em neocortex/core/services/\n\
  \   Classe SavePointWALBridge:\n     def create_savepoint(self, name: str, data:\
  \ dict) → dict:\n         # Chama SavePointService.create(name, data)\n        \
  \ # Registra no WALService: type=\"savepoint.create\", severity=\"NORMAL\"\n   \
  \      # Retorna {ok: True, name: name, wal_entry_id: str}\n\n     def restore_savepoint(self,\
  \ name: str) → dict:\n         # Chama SavePointService.restore(name)\n        \
  \ # Registra no WALService: type=\"savepoint.restore\", severity=\"HIGH\"\n    \
  \     # Retorna {ok: True, name: name}\n\n     def list_savepoints(self) → list:\n\
  \         # Retorna list de savepoints do WAL filtrados por type=savepoint.*\n\n\
  2. Criar 05_examples/NC-TEST-152-savepoint-wal-integration.py\n   Script de teste:\n\
  \     - Cria bridge\n     - Cria savepoint \"test-sp-001\" com data={test: True}\n\
  \     - Verifica que WAL tem a entrada\n     - Restaura savepoint\n     - Verifica\
  \ que WAL tem entrada de restore\n     - Lista savepoints e verifica que test-sp-001\
  \ aparece\n     - Imprime PASS/FAIL para cada check\n"
