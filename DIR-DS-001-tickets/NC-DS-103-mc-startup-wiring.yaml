context:
  gap: "G06"
  origin: "NC-ADP-FR-001-mission-control.py existe mas não é chamado no startup do server"
  problem: |
    O Mission Control não sabe que o NeoCortex está rodando porque o adapter
    nunca é ativado.     server.py é @LOCKS — não podemos editar diretamente.
    A solução é um script de inicialização externo que roda junto com o server.

task:
  description: |
    Criar 01_neocortex_framework/scripts/NC-SCR-FR-103-mc-startup-hook.py:

    1. Carregar NC-ADP-FR-001-mission-control.py via importlib.util (R09)
    2. Instanciar MissionControlAdapter com config padrão (localhost:3000)
    3. Chamar adapter.register() — registrar NeoCortex no Mission Control
    4. Iniciar heartbeat loop em threading.Thread(daemon=True):
       - A cada 30s: adapter.heartbeat()
       - Se MC offline: logger.warning, não crashar
    5. Registrar startup no WAL via NC-SVC-FR-016
    6. Script deve rodar em background: python NC-SCR-FR-103-mc-startup-hook.py &
    7. Suportar graceful shutdown via signal.SIGTERM
    8. Atualizar start_neocortex_mcp.ps1 (se necessário) para chamar este script
        como processo separado APÓS o server — ATENÇÃO: start_neocortex_mcp.ps1 é @LOCKS

    IMPORTANTE: Não modificar start_neocortex_mcp.ps1 diretamente.
    Criar NC-SCR-FR-103b-start-with-mc.ps1 como wrapper que chama ambos.

  acceptance_criteria:
    - "python NC-SCR-FR-103-mc-startup-hook.py roda sem erro"
    - "MC em localhost:3000 recebe register() ao iniciar"
    - "Heartbeat thread ativa, log a cada 30s"
    - "Se MC offline: não crasha, apenas loga warning"
    - "start_neocortex_mcp.ps1 INTOCADO"

