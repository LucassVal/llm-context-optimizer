research_context: |
  Mission Control é uma plataforma open-source de orquestração de agentes IA.
  GitHub: https://github.com/builderz-labs/mission-control
  Repositório clonado localmente em:
    DIR-RES-CC-001-claude-leak-workzone\external-refs\mission-control\

  FUNCIONALIDADES CONFIRMADAS:
  - Kanban Board: 6 colunas (inbox→assigned→in progress→review→quality review→done)
  - Agent Management: descobre agentes em ~/.agents/, ~/.codex/, ~/.claude/agents/
  - Agent SOUL system: bidirectional workspace sync
  - Memory Knowledge Graph: filesystem-backed + relationship graph
  - Skills Hub: instala skills de ClawdHub, skills.sh com scanner de segurança
  - Cost Tracking: p50/p95/p99 latência por modelo via Recharts
  - Security Audit: postura 0-100, detecção secrets, MCP tool auditing, trust scores
  - Agent Eval Framework: output evals, trace evals, component evals, drift detection
  - Natural Language Recurring Tasks: "every 9am" → cron
  - Claude Code Integration: lê ~/.claude/projects/ diretamente
  - Framework Adapters: OpenClaw, CrewAI, LangGraph, AutoGen, Claude SDK, generic fallback
  - Activity Feed: WebSocket/SSE real-time
  - Webhooks: HMAC-SHA256, exponential backoff, circuit breaker
  - Multi-tenant: workspace isolation via /api/super/*
  - Porta padrão: :3000

  INTEGRAÇÃO COM NEOCORTEX (contexto T0):
  - Generic adapter registra agentes DeepSeek/OpenCode
  - MCP tool call auditing ↔ AuditHook (NC-HK-FR-002) já implementado
  - Porta MCP :8765 (NeoCortex) + porta Mission Control :3000
  - DDD: Mission Control = Adaptador Primário (porta de entrada de comandos)
  - neocortex_visual_server.py: processo único que sobe core + Mission Control (:3000)

