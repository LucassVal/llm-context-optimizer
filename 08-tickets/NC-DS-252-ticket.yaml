# WHY: Porta 8765 atualmente sem auth — qualquer client pode chamar tools sem autorização
# WHERE: 01_neocortex_framework/neocortex/mcp/auth.py (novo módulo) + modificações em server.py

ticket_id: NC-DS-252
title: "MCP Authorization — Implementar OAuth 2.1 Flow para Streamable HTTP (:8765) — 401+WWW-Authenticate, PRM, AS Discovery, DCR, Token Validation"
status: DONE
priority: LOW
assignee: opencode
created: "2026-05-04"
description: |
  GAP CRÍTICO DE SEGURANÇA: O servidor MCP expõe Streamable HTTP na porta 8765 SEM 
  QUALQUER AUTENTICAÇÃO. Qualquer cliente na rede pode invocar tools, ler Resources, 
  e disparar Prompts sem autorização. A spec MCP define OAuth 2.1 como padrão para 
  servidores remotos (NC-LBE-INT-006 §12).

  ESCOPO COMPLETO (6 passos do OAuth 2.1 MCP):

  1. INITIAL HANDSHAKE (401 + WWW-Authenticate):
     - Requisições sem token → 401 Unauthorized
     - Header: WWW-Authenticate: Bearer realm="mcp", resource_metadata="https://localhost:8765/.well-known/oauth-protected-resource"
     - Manter compatibilidade: stdio transport NÃO requer auth

  2. PROTECTED RESOURCE METADATA (PRM) DISCOVERY (RFC 9728):
     - Endpoint: GET /.well-known/oauth-protected-resource
     - Retorna: resource URL, authorization_servers[], scopes_supported[]
     - Scopes: mcp:tools, mcp:resources, mcp:prompts, mcp:admin

  3. AUTHORIZATION SERVER DISCOVERY (RFC 8414):
     - Endpoint: GET /.well-known/oauth-authorization-server
     - Retorna: issuer, authorization_endpoint, token_endpoint, registration_endpoint
     - Suportar modo DEV (localhost, HTTP) e PROD (HTTPS com certificados)

  4. DYNAMIC CLIENT REGISTRATION (DCR, RFC 7591):
     - Endpoint: POST /oauth/register
     - Aceitar: client_name, redirect_uris, grant_types
     - Retornar: client_id, client_secret (opaco, crypto-random)
     - Rate-limit DCR para prevenir abuse

  5. USER AUTHORIZATION + TOKEN EXCHANGE:
     - Endpoint: GET /oauth/authorize → formulário de consentimento T0
     - Endpoint: POST /oauth/token → exchange auth_code + PKCE → access_token + refresh_token
     - Suportar PKCE (S256) obrigatório
     - Access tokens: curta duração (15 min), refresh tokens: longa duração (24h)

  6. TOKEN VALIDATION + AUTHENTICATED REQUESTS:
     - Middleware que valida Authorization: Bearer <token> em TODAS as rotas
     - Validação JWT: aud claim, exp, iat, scope
     - Usar biblioteca padrão (PyJWT + cryptography) — NUNCA implementar validação do zero
     - Token introspection endpoint: POST /oauth/introspect (RFC 7662)

  SEGURANÇA (NC-LBE-INT-006 §13):
  - NUNCA logar tokens ou credenciais
  - Session ID NUNCA usado para autenticação
  - Scopes mínimos por padrão (least privilege)
  - Bloquear IPs privados em metadados OAuth (anti-SSRF)
  - Enforce HTTPS em produção
  - CSRF protection no fluxo de autorização (state parameter)

  IMPACTO: Sem isso, o NeoCortex NÃO PODE ser exposto como servidor remoto seguro. 
  É pré-requisito para qualquer uso em produção.

