    description: "Protocolo de claim baseado em timestamp com espera de 5s pode não escalar com 9 workers"
    impact: "Múltiplos workers podem tentar claim simultâneo, causando perda de tempo com retries."
    evidence: "Vários workers com IDs diferentes visíveis na fila."

