# ─── TAREFAS ──────────────────────────────────────────────────────────
tasks:

  - id: T1
    title: "Varredura: validar cada domain.path do NC-ULQ-TAG-INDEX contra filesystem"
    priority: P0
    write_zone: "SCRIPTS → 01_neocortex_framework/32-scripts/ (script de varredura)"
    approach: |
      Script PowerShell ou Python que:
      1. Lê NC-ULQ-TAG-INDEX.json
      2. Para cada domain.path → Test-Path → True/False
      3. Produz tabela: domain | path_declarado | existe | status
    expected_domains_to_verify:
      - "governance → 02_memory_lobes/06_governance/"
      - "memory → 02_memory_lobes/"
      - "orchestration → 01_neocortex_framework/neocortex/"
      - "llm_routing → 01_neocortex_framework/neocortex/mcp/tools/"
      - "docs → 01_neocortex_framework/DIR-DOC-FR-001-docs-main/"
      - "config → DIR-DS-000-agent-config/"
      - "semantic → 02_memory_lobes/06_governance/"
      - "tickets_audit → DIR-DS-001-tickets/    # GAP CONFIRMADO"
      - "governance_rules → 02_memory_lobes/06_governance/"
    one_liner_preview: |
      $idx = Get-Content '01_neocortex_framework\.neocortex\lexico\NC-ULQ-TAG-INDEX.json' | ConvertFrom-Json
      $idx.domains.PSObject.Properties | ForEach-Object {
        $name = $_.Name; $path = $_.Value.path
        [PSCustomObject]@{Domain=$name; Path=$path; Exists=(Test-Path $path)}
      } | Format-Table -AutoSize
    deliverable: "Tabela no handoff: domain | path | exists | action"

  - id: T2
    title: "Varredura: identificar arquivos desgarrados (no disco, fora do SSOT)"
    priority: P0
    write_zone: "SCRIPTS → 01_neocortex_framework/32-scripts/"
    approach: |
      Arquivos desgarrados = arquivos .py/.yaml/.mdc/.md que existem no filesystem
      mas NÃO aparecem no NC-NAM-FR-001-naming-convention.md nem no LEXICO.
      Foco: pastas 08-tickets/, DIR-DS-002-audit-logs/, 02_memory_lobes/ — maior risco.
    script_outline: |
      # PowerShell rápido para detectar .yaml desgarrados em 08-tickets/:
      $ssot = Get-Content '01_neocortex_framework\23-docs\NC-NAM-FR-001-naming-convention.md' -Raw
      Get-ChildItem '08-tickets\' -Filter '*.yaml' | ForEach-Object {
        $inSSot = $ssot -match [regex]::Escape($_.Name)
        [PSCustomObject]@{File=$_.Name; InSSOT=$inSSot}
      } | Where-Object { -not $_.InSSOT }
    scope_priority:
      - "08-tickets/ → tickets não registrados no SSOT"
      - "02_memory_lobes/ → lobes não catalogados"
      - "01_neocortex_framework/32-scripts/ → scripts não catalogados"
      - "DIR-DS-000-agent-config/ → configs não catalogadas"
    deliverable: "Lista de arquivos desgarrados com ação recomendada (registrar/arquivar)"

  - id: T3
    title: "Corrigir gaps confirmados no LEXICO"
    priority: P1
    write_zone: "SCRIPTS → 01_neocortex_framework/32-scripts/ (via script gerador)"
    gaps_confirmed_before_audit:
      - gap: "#TICKETS → DIR-DS-001-tickets/ (NÃO EXISTE)"
        fix: "Atualizar tickets_audit.path para '08-tickets/'"
        note: "NC-ULQ-TAG-INDEX.json não está em @LOCKS — pode ser modificado"
    gaps_to_discover: "via T1 e T2"
    approach: |
      Após T1+T2: lista de gaps é definitiva.
      Correções em NC-ULQ-TAG-INDEX.json devem ser ATÔMICAS (uma por vez).
      Cada correção tem verificação: Test-Path + neocortex_memory lobe.search.
      Se NC-NAM-FR-001 precisa de correção → autorização T0 (LOCKED).
    validation:
      - "Após cada fix: Test-Path do path corrigido → True"
      - "neocortex_memory knowledge.search 'tickets' → resolve para '08-tickets/' correto"

  - id: T4
    title: "Criar NC-SCR-FR-XXX-lexico-validator.py (prevenção)"
    priority: P2
    write_zone: "SCRIPTS → 01_neocortex_framework/32-scripts/"
    note: |
      Script que valida NC-ULQ-TAG-INDEX.json + NC-LEXICO-LATEST.json
      contra o filesystem real. PASS/FAIL por domain.
      Número do script a ser definido após verificar último NC-SCR-FR-NNN existente.
    one_liner_behavior: |
      INPUT: NC-ULQ-TAG-INDEX.json
      PARA CADA domain.path: Test-Path → PASS ou FAIL
      OUTPUT: relatório PASS/FAIL + exit 0/1 (para Guardian Ciclo4)
    validation:
      - "python -m py_compile NC-SCR-FR-XXX-lexico-validator.py → PASS"
      - "python NC-SCR-FR-XXX-lexico-validator.py → FAIL (antes de fixes)"
      - "python NC-SCR-FR-XXX-lexico-validator.py → PASS (após T3)"

  - id: T5
    title: "Integrar lexico-validator no Guardian Ciclo4"
    priority: P2
    note: "Depende de T4. Mesmo padrão da integração do NC-SCR-FR-006 (NC-DS-267 T5)."

