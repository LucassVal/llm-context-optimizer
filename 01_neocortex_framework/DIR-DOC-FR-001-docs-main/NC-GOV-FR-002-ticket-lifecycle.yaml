# ─────────────────────────────────────────────────────────────────────────────
# CHECKLIST DE CONFORMIDADE (simplificado para machine-readable)
# ─────────────────────────────────────────────────────────────────────────────
compliance_checklist:
  new_ticket:
    - "naming_pattern: NC-DS-XXX-CODE-*.yaml"
    - "required_fields_present: id, title, task, entry_state, exit_state"
    - "required_field_protocolo_agente: bloco protocolo_agente presente"
    - "integrity_hash_calculated: SHA-256[:16] of id|write_zone|title"
    - "roadmap_ticket_referenced"
    - "write_zone_exists"
    - "active_locks_listed"
  dispatch:
    - "dispatch_yaml_exists: NC-DS-AGT-{ID}-dispatch-{tickets}.yaml em DIR-DS-001-tickets/"
    - "dispatch_yaml_valid: yaml.safe_load sem erros"
    - "dispatch_template_used: NC-TPL-FR-002-agent-dispatch.yaml"
    - "atomic_locks_listados_no_dispatch: campo atomic_locks_absolutos.files presente"
    - "write_zones_listadas_no_dispatch: campo write_zones_autorizadas presente"
    - "r21_presente: campo regra_zero_suposicoes com lei + como_retornar"
    - "checklist_r20_presente: campo checklist_r20_por_handoff com ruff_ok + py_compile_ok"
    - "entry_exit_state_presentes: campos entry_state e exit_state definidos"

  handoff:
    - "naming_pattern: NC-DS-XXX-handoff-<timestamp>.yaml"
    - "ticket_id_matches_original"
    - "status_reflects_reality"
    - "summary_describes_work"
    - "checklist_r20_complete"
    - "referenced_in_ticket_context"

  audit:
    - "orphans_identified_and_classified"
    - "handoffs_without_ticket_resolved"
    - "bootup_updated_with_real_fronts"
    - "report_generated"

