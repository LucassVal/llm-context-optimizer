  why_1: "Implementado com asyncio.sleep() em loop — modelo mais simples"
  why_2: "Sem sistema de eventos no momento da implementação"
  why_3: "EventBus (NC-SVC-FR-005) existe mas não está integrado ao PulseScheduler"
  why_4: "NC-LBE-CC-008 foi documentado mas nunca implementado como ticket"
  why_5: "PulseDaemon ficou como análise arquitetural sem execução"
  root_cause: "EventBus e PulseScheduler existem isolados — nunca foram wired juntos"
  corrective_action: |
    Adicionar ao PulseScheduler: register_hook(event_type, callback, ttl=None)
    Integrar EventBus para disparar tarefas on-event além de on-interval.
    Implementar TTLManager para expiração de sessões/tokens.
  preventive_action: "Adicionar ao CICLO-0: pulse.status deve mostrar hooks registrados"

