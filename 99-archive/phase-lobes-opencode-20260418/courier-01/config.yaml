# Configuração da instância courier-01
# Herança: NC-GOV-TPL-001-agent-courier.yaml (nível 1)
# Nível: 2 (instância concreta)

level: 2
inherits_from: NC-GOV-TPL-001-agent-courier.yaml
topology: agent
agent_role: courier
instance_name: courier-01

# Configurações concretas (sobrescrevem template)
configuration:
  max_concurrent_tasks: 2
  task_timeout_seconds: 180
  heartbeat_interval_seconds: 30
  max_retries: 5
  port: 11001
  host: localhost

# Permissões específicas da instância
permissions:
  allowed_tools: [search, index, task]
  forbidden_actions: [write, delete, modify, execute]
  allowed_resources: [ledger, cache]
  forbidden_resources: [security, encryption]

# Backend específico (pode ser diferente do template)
backend:
  type: ollama
  model: qwen2.5-coder:1.5b
  context_window: 4096
  max_tokens: 1024
  temperature: 0.2
  endpoint: http://localhost:11434

# Tags da instância
tags:
  - instance: courier-01
  - environment: development
  - version: 1.0.0
  - deployment: local
  - monitoring: enabled
  - isolation: strict

# Valores específicos para regras de validação
validation_rules:
  - name: courier_naming
    pattern: "^courier-\\d+$"
    value: courier-01
    
  - name: port_range
    min: 11000
    max: 12000
    value: 11001

# Metadados da instância
metadata:
  created: 2026-04-14
  author: NeoCortex Governance
  version: 1.0.0
  description: "Instância concreta courier-01 do agente Courier"
  status: active
  last_updated: 2026-04-14
  parent_template: NC-GOV-TPL-001-agent-courier.yaml