context: "NC-SVC-FR-011 (TTLManager) existe mas não está conectado ao WAL prune.\n\
  O WAL pode crescer indefinidamente sem TTL automático.\nObjetivo: criar script de\
  \ manutenção que:\n  1. Usa TTLManager para identificar entradas WAL > N dias\n\
  \  2. Chama WALService.prune(days=N) para remover entradas antigas\n  3. Gera relatório\
  \ de quantas entradas foram removidas\n  4. Pode ser agendado pelo PulseScheduler\
  \ (NC-SVC-FR-012 / OPT-010)\n"
