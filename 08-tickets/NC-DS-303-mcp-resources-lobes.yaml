    priority: P0
    write_zone: "CORE → neocortex/mcp/tools/NC-SUPER-019-resources.py"
    steps:
      - |
        Criar arquivo com:
          @mcp.resource("lobe://{lobe_name}")
          async def get_lobe_resource(lobe_name: str) -> str:
              # Delegar para lobe.get interno
              from neocortex.memory import get_lobe_content
              return get_lobe_content(lobe_name)

          @mcp.resource("lobe://list")
          async def list_lobe_resources() -> str:
              # Retornar lista JSON dos 58 lobes
              from neocortex.memory import list_lobes
              return json.dumps(list_lobes())
