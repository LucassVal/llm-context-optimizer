  problem: |
    Os arquivos em neocortex/core/ (services, hooks, adapters, workers) e lobes/
    não foram sanitizados desde a última fase de refatoração. Encoding UTF-8
    inconsistente, alguns sem headers NC-, ruff com erros acumulados.

task:
  description: |
    ESCOPO: neocortex/core/ e 01_neocortex_framework/lobes/

    1. Encoding UTF-8:
       python -c "import codecs; ..." para verificar BOM/encoding em cada .py
       Remover BOM se presente. Garantir encoding UTF-8 sem BOM.

    2. Headers NC- (genealogy):
       Verificar quais arquivos em neocortex/core/ não têm block _genealogy
       Para os sem header: adicionar header mínimo com topology, parent_ssot, tags

    3. Ruff lint — neocortex/core/:
       python -m ruff check 01_neocortex_framework/neocortex/core/ --fix
       (usar --fix para auto-correções seguras)
       Verificar que 0 erros restam após --fix

    4. Ruff lint — lobes/ (arquivos .py se existirem):
       python -m ruff check 01_neocortex_framework/lobes/ --fix

    5. Verificar __init__.py de cada subpacote:
       neocortex/core/__init__.py, /adapters/__init__.py, /hooks/__init__.py,
       /services/__init__.py, /workers/__init__.py — garantem que subpacotes
       são importáveis

    6. py_compile em todos os .py do escopo → 0 erros de sintaxe

  acceptance_criteria:
    - "ruff check neocortex/core/: 0 erros (após --fix)"
    - "py_compile: 0 erros de sintaxe"
    - "0 BOM UTF-8 nos arquivos"
    - "Todos os __init__.py existem"

