three_w:
  who: "MCP server (NC-SUPER-006-memory) + todos os 58 lobes ativos"
  what: |
    Expor lobes como MCP Resources com URI scheme lobe://<lobe_name>.
    Clientes MCP (Claude Code, OpenCode) poderiam subscrever e ler lobes
    diretamente via protocolo MCP sem chamar lobe.get() como tool.
    NC-LBE-INT-006 (spec oficial): Resources são uma primitiva core do MCP.
  why: |
    Atualmente lobes são acessíveis APENAS via tool call (lobe.get).
    MCP Resources permitem: listagem (resources/list), leitura (resources/read),
    e subscrição (resources/subscribe para notificação de mudança).
    Clientes externos que seguem a spec MCP esperam Resources — não apenas Tools.
    Reduz overhead: ler um lobe não precisa de tool call completo.

