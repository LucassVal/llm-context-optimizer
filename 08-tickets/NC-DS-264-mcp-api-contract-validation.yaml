# ── KISS — 3 Correções Cirúrgicas (P0/P1/P2) ────────────────────────────────
kiss_corrections:
  - priority: P0
    title: "Falso Positivo — propagar result.success: false para success: false"
    where: "NC-SUPER-004-state.py L114-122 (regression.baseline) + NC-SUPER-AKL (akl.export)"
    effort: "1 linha por action afetada"
    pattern: |
      # ANTES (falso positivo):
      return {"success": True, "result": {"success": False, "error": "..."}}
      # DEPOIS (fidelidade):
      if not result.get("success"):
          return {"success": False, "error": result.get("error"), "action": action}
    validation:
      - ruff
      - py_compile

  - priority: P1
    title: "session.start — persistir session_id no cortex.json"
    where: "NC-SUPER-004-state.py (action session.start)"
    effort: "5 linhas"
    note: |
      Verificar primeiro se server.py:74 já gera UUID session (R21).
      Se sim, apenas ler e retornar o UUID existente.
      Se não, persistir em .neocortex/cortex.json como evento de sessão.
    validation:
      - ruff
      - py_compile

  - priority: P2
    title: "Criar NC-CFG-T0-001-agent-policy.yaml"
    where: "DIR-DS-000-agent-config/"
    effort: "1 arquivo YAML"
    note: "AgentPolicyEnforcer (NC-CORE-FR-101) já existe e funciona. Falta apenas o arquivo de policy."
    template: |
      agent:
        role: T0
        tier: T0
        allowed_tools: ["*"]
        forbidden_actions: ["delete_all", "drop_database", "rm_rf"]
        token_budget:
          max_tokens_per_task: 8192
          max_tokens_session: 100000
    validation:
      - yaml_safe_load

