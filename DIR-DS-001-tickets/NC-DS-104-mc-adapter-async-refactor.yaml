ticket_id: "NC-DS-104"
status: "OPEN"
priority: "HIGH"
title: "Refatorar NC-ADP-FR-001: substituir requests+time.sleep por threading Fire-and-Forget"
created_at: "2026-04-16T11:00:00-03:00"
created_by: "T0-Claude-Code"
agent: "AGENTE-B"
sprint: "FASE-1-MCP-MC"

context:
  gap: "G07"
  origin: "NC-DS-050 VAL-001 pendente — adapter usa requests síncrono e time.sleep()"
  problem: |
    NC-ADP-FR-001-mission-control.py usa a biblioteca `requests` com chamadas
    síncronas e time.sleep() no heartbeat loop. Isso bloqueia a thread principal
    do servidor MCP durante qualquer operação de rede com o Mission Control.
    Risco de Thread Starvation se MC estiver lento ou offline.

task:
  description: |
    Refatorar NC-ADP-FR-001-mission-control.py:

    ETAPA 1 — STEP-0 (obrigatório antes de qualquer mudança):
    1. python -m py_compile NC-ADP-FR-001-mission-control.py → confirmar OK
    2. python -m ruff check NC-ADP-FR-001-mission-control.py → resolver 100% lints

    ETAPA 2 — Refatoração:
    3. Substituir `import requests` por `urllib.request` (stdlib, sem dependência extra)
       OU manter requests mas garantir timeout curto (max 3s) + try/except completo
    4. Substituir time.sleep() no heartbeat por threading.Event.wait() com timeout
       (permite shutdown limpo via event.set())
    5. Todas as chamadas HTTP em try/except com fallback gracioso — nunca propagar exceção
    6. Circuit breaker: após 5 falhas consecutivas, parar de tentar por 60s
       (já existe na classe — verificar se está funcional)
    7. Método report() deve ser Fire-and-Forget: chamar em daemon thread separada
       para não bloquear o caller
    8. Zero print() — garantir que todos os logs usam self._logger ou logger

    ETAPA 3 — Validação:
    9. python -m ruff check NC-ADP-FR-001-mission-control.py → 0 erros
    10. python -m py_compile → OK

  acceptance_criteria:
    - "Ruff: 0 erros"
    - "Sem time.sleep() no fluxo principal"
    - "report() é Fire-and-Forget (não bloqueia caller)"
    - "Circuit breaker funcional: 5 falhas → 60s pause"
    - "Timeout máximo 3s por requisição HTTP"
    - "Zero print()"

