  why_3: "Nenhuma auditoria contra spec oficial foi realizada antes"
  why_4: "58 lobes como Tools seria 58 endpoints de tool — Resources é o padrão correto"
  why_5: "Auditoria NC-DS-206 focou em compliance interno, não spec MCP"
  root_cause: "Resources MCP nunca foram projetados — todos os acessos são via Tool"
  corrective_action: "Registrar lobes como @mcp.resource com URI lobe://{name}"
  preventive_action: "Adicionar ao CICLO-0: verificar resources/list retorna lobes ativos"

