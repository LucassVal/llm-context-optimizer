      - "python -m pyright --version 2>$null || echo 'NAO_INSTALADO_VIA_PIP'"
    yaml_ls:
      - "where.exe yaml-language-server 2>$null || echo 'NAO_INSTALADO'"
    taplo:
      - "where.exe taplo 2>$null || echo 'NAO_INSTALADO'"
    marksman:
      - "where.exe marksman 2>$null || echo 'NAO_INSTALADO'"
