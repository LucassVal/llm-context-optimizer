task:
  description: "PARTE 1 — Criar NC-HK-FR-001-hook-registry.py\n\nImplementar HookRegistry:\
    \ sistema de hooks síncronos e assíncronos para extensão dos serviços.\n\nInterface\
    \ obrigatória:\n  class HookRegistry:\n      def register(self, event: str, fn:\
    \ Callable, priority: int = 0) -> None\n      def unregister(self, event: str,\
    \ fn: Callable) -> None\n      def trigger(self, event: str, *args, **kwargs)\
    \ -> list\n      async def trigger_async(self, event: str, *args, **kwargs) ->\
    \ list\n      def list_hooks(self, event: str = None) -> dict\n\nEventos pré-definidos\
    \ (constantes):\n  HOOK_BEFORE_TOOL_CALL   = \"before_tool_call\"\n  HOOK_AFTER_TOOL_CALL\
    \    = \"after_tool_call\"\n  HOOK_ON_ERROR           = \"on_error\"\n  HOOK_ON_SESSION_START\
    \   = \"on_session_start\"\n  HOOK_ON_SESSION_END     = \"on_session_end\"\n \
    \ HOOK_ON_CHECKPOINT      = \"on_checkpoint\"\n\nPARTE 2 — Criar NC-HK-FR-002-simple-hook.py\n\
    \nImplementar hooks pré-registrados úteis (plug-and-play):\n  LoggingHook    →\
    \ log estruturado de cada tool_call\n  TimingHook     → mede latência de cada\
    \ tool_call\n  RateLimitHook  → bloqueia agente se exceder N calls/min\n  AuditHook\
    \      → escreve linha em audit-log YAML por chamada\n\nCada hook deve ser registrável\
    \ com:\n  registry = HookRegistry()\n  registry.register(HOOK_BEFORE_TOOL_CALL,\
    \ LoggingHook().on_before)\n\nArquivos a criar:\n  - 01_neocortex_framework/neocortex/core/hooks/NC-HK-FR-001-hook-registry.py\n\
    \  - 01_neocortex_framework/neocortex/core/hooks/NC-HK-FR-002-simple-hook.py\n\
    \  - 01_neocortex_framework/neocortex/core/hooks/__init__.py (exportar HookRegistry\
    \ + hooks)\n\nSTEP-0 obrigatório antes de escrever:\n  python -c \"import asyncio;\
    \ print('asyncio OK')\"\n  python -c \"from typing import Callable; print('typing\
    \ OK')\"\n"
