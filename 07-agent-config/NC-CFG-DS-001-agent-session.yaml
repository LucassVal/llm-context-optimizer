# NC-CFG-DS-001-agent-session.yaml
# Gerado: 2026-04-30 | NC-DS-173
# Merge de: NC-CFG-DS-001-agent-policy.yaml + NC-CFG-DS-002-session-contract.yaml
# SSOT unico para comportamento do agente T1 DeepSeek

agent:
  id: deepseek-t1
  role: executor
  tier: T1
  model: deepseek-v4-flash
  base_url: "https://api.deepseek.com"
  lobe: NC-LBE-DS-001-deepseek-agent.mdc
  sandbox_port: 8766

permissions:
  read:
    - "01_neocortex_framework/neocortex/mcp/tools/**"
    - "01_neocortex_framework/DIR-DOC-FR-001-docs-main/**"
    - "DIR-DS-001-tickets/**"
  write:
    - "01_neocortex_framework/neocortex/mcp/tools/NC-TOOL-FR-0[2-3][0-9]-*.py"
    - "01_neocortex_framework/DIR-DOC-FR-001-docs-main/NC-NAM-FR-001-naming-convention.md"
    - "DIR-DS-002-audit-logs/**"
  forbidden:
    - "**/server.py"
    - "**/sub_server.py"
    - "**/neocortex_config.yaml"
    - "**/NC-TODO-FR-001-project-roadmap-consolidated.md"

limits:
  max_tokens_per_phase: 4000
  max_validation_rounds: 5
  escalate_after_failures: 3
  max_files_per_ticket: 3

session:
  policy_file: "01_neocortex_framework/DIR-DOC-FR-001-docs-main/NC-CFG-DS-001-agent-policy.yaml"
  instructions_file: "NC-PROMPT-DS-001-deepseek-subordinate.md"
  lobe_file: "01_neocortex_framework/DIR-TMP-FR-001-templates-main/NC-LBE-DS-001-deepseek-agent.mdc"

boot_sequence:
  - file: "NC-PROMPT-DS-001-deepseek-subordinate.md"
    purpose: "Regras inviolaveis + ciclo 6 fases + schema handoff"
  - file: ".agents/rules/NC-RULE-001-core-ssot.mdc"
    purpose: "R00 ULQ Boot + R01-R20 core rules"
  - file: "01_neocortex_framework/DIR-DOC-FR-001-docs-main/NC-SEC-FR-001-atomic-locks.yaml"
    purpose: "Lista de @LOCKS"

ticket_discovery:
  directory: "DIR-DS-001-tickets/"
  pattern: "NC-DS-[0-9]*.yaml"
  exclude: ["NC-DS-HANDOFF-TEMPLATE.yaml"]
  selection: "menor numero sem handoff correspondente em DIR-DS-002-audit-logs/"
  handoff_check:
    directory: "DIR-DS-002-audit-logs/"
    pending_status: "PENDING_REVIEW"
    rule: "SE houver PENDING_REVIEW -> NAO iniciar novo ticket"

stop_conditions:
  - trigger: "handoff YAML depositado com status=PENDING_REVIEW"
    action: "Parar. Aguardar aprovacao T0."
  - trigger: "risk_level=HIGH detectado na FASE 1"
    action: "Depositar handoff com status=ESCALATED. Parar."
  - trigger: "3 falhas de validacao (self-refine esgotado)"
    action: "Depositar handoff com status=ESCALATED. Parar."
  - trigger: "PENDING_REVIEW encontrado no boot"
    action: "Reportar bloqueio e parar."
  - trigger: "Nenhum ticket em aberto encontrado"
    action: "Reportar sprint concluido e parar."

handoff:
  output_dir: "DIR-DS-002-audit-logs/"
  template: "DIR-DS-001-tickets/NC-DS-HANDOFF-TEMPLATE.yaml"
  status_field: "status"
  pending_value: "PENDING_REVIEW"
  approved_by: "antigravity-t0"

escalation:
  trigger: "3 failed validation rounds OR risk_level=HIGH"
  escalate_to: "antigravity-t0"
  method: "Depositar handoff com status=ESCALATED em DIR-DS-002-audit-logs/"

prohibited:
  - "Executar mais de 1 ticket por sessao sem aprovacao T0"
  - "Continuar apos depositar handoff"
  - "Perguntar ao usuario durante a execucao"
  - "Modificar @LOCKS"
  - "Criar mais de 3 arquivos por ticket"
