  rule_2_transactional:
    description: "Operações críticas devem ser transacionais"
    validation: "All-or-nothing commit across systems"
    recovery: "Rollback completo em caso de falha"

  rule_3_checkpoint_coordination:
    description: "Checkpoints devem ser coordenados entre sistemas"
    validation: "Checkpoint timestamps must match"
    frequency: "A cada handoff ou mudança de estado significativa"

  rule_4_audit_trail:
    description: "Trilha de auditoria deve ser mantida em todos os sistemas"
    validation: "Audit logs must exist in memory, state, and ledger"
    retention: "7 dias mínimo"

