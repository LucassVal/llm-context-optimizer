task: |
  Implementar sistema de auto-pause quando uso de contexto excede 85% do budget disponível.
  
  Objetivos:
  1. Criar NC-SVC-FR-024-context-buddy.py que:
     - Monitora uso de tokens em tempo real via MetricsCollector
     - Calcula % do budget utilizado (input + output tokens)
     - Dispara alerta em 75% (warning)
     - Pausa automática em 85% (auto-pause)
     - Resume quando budget é liberado (compressão, cleanup)
  
  2. Integrar com:
     - MetricsCollector (NC-SVC-FR-006) para métricas
     - EventBus para notificações
     - ChannelNotifier para alertas visuais
     - SessionBuddy para gamificação
  
  3. Criar ferramenta MCP NC-TOOL-FR-046-context-budget.py com ações:
     - budget.status: mostrar uso atual e limites
     - budget.set_limit: configurar limite personalizado
     - budget.pause_override: pausa manual
     - budget.resume: retomar após pausa
  
  4. Implementar estratégias de redução automática:
     - Compressão via LexicoService
     - Limpeza de contexto antigo
     - Priorização de dados críticos

