implementation_summary:
  overview: |
    Implemented MetricsCollector as a singleton service for session-based metrics collection.
    The service records token usage and tool calls, provides session summaries and daily reports,
    and persists data to JSON files in a dedicated metrics directory.
  design_decisions:
    - Used singleton pattern to ensure a single collector instance across the framework.
    - Created dataclasses TokenUsage and ToolCall for structured record keeping.
    - Metrics directory defaults to project_root / "NC-MET-FR-001-metrics" (consistent with naming conventions).
    - JSON persistence uses daily files (metrics-YYYY-MM-DD.json) to avoid unbounded growth.
    - Session data is kept in memory until explicitly reset or exported.
    - Daily report aggregates data from the daily JSON file, estimating sessions by hour groups.
  dependencies:
    - Python standard library (json, time, datetime, pathlib, typing, dataclasses)
    - neocortex.config.get_config() for project root detection
  compliance:
    - Follows existing service patterns (see NC-SVC-FR-001-logging-service.py).
    - No modifications to forbidden zones.
    - No external dependencies introduced.

code_overview:
  file_structure: |
    NC-SVC-FR-006-metrics-collector.py
      ├── Imports
      ├── Dataclasses (TokenUsage, ToolCall)
      ├── MetricsCollector class (singleton)
      │   ├── __new__, __init__
      │   ├── _metrics_dir property
      │   ├── record_token_usage()
      │   ├── record_tool_call()
      │   ├── get_session_summary()
      │   ├── get_daily_report()
      │   ├── reset_session()
      │   ├── _persist_daily_metrics()
      │   └── export_session()
      └── get_metrics_collector() convenience function

  key_methods:
    - record_token_usage:
        parameters: model (str), input_tokens (int), output_tokens (int), cost_usd (float)
        action: Creates TokenUsage record, appends to session list, triggers persistence.
    - record_tool_call:
        parameters: tool_name (str), duration_ms (int), success (bool)
        action: Creates ToolCall record, appends to session list, triggers persistence.
    - get_session_summary:
        returns: Dict with total_tokens, total_cost_usd, tool_calls, avg_duration_ms, session_duration_sec.
    - get_daily_report:
        parameters: target_date (optional)
        returns: Dict with date, sessions, top_tools, cost_breakdown, total_tokens, total_cost_usd.
    - reset_session:
        action: Clears in‑memory session records and restarts session timer.
    - _persist_daily_metrics:
        action: Appends current session records to the daily JSON file (metrics-{date}.json).
    - export_session:
        action: Exports current session data to a standalone JSON file.

  persistence_strategy:
    - Daily JSON files: metrics-{YYYY-MM-DD}.json
    - Directory: project_root / "NC-MET-FR-001-metrics"
    - File structure:
        {
          "token_usage": [
            {
              "model": "gpt-4",
              "input_tokens": 100,
              "output_tokens": 50,
              "cost_usd": 0.006,
              "timestamp": "2026-04-12T18:30:00"
            }
          ],
          "tool_calls": [
            {
              "tool_name": "tool_x",
              "duration_ms": 120,
              "success": true,
              "timestamp": "2026-04-12T18:30:05"
            }
          ]
        }
    - Session data is appended to the daily file on each record_* call (could be batched in a production setting).

usage_examples:
  basic_usage: |
    from neocortex.core.services.NC_SVC_FR_006_metrics_collector import get_metrics_collector

    collector = get_metrics_collector()

    # Record token usage
    collector.record_token_usage(
        model="gpt-4",
        input_tokens=1500,
        output_tokens=800,
        cost_usd=0.012
    )

    # Record tool call
    collector.record_tool_call(
        tool_name="NC-TOOL-FR-001",
        duration_ms=250,
        success=True
    )

    # Get session summary
    summary = collector.get_session_summary()
    print(summary)
    # {
    #   "total_tokens": 2300,
    #   "total_input_tokens": 1500,
    #   "total_output_tokens": 800,
    #   "total_cost_usd": 0.012,
    #   "tool_calls": 1,
    #   "avg_duration_ms": 250.0,
    #   "session_duration_sec": 5.2,
    #   "timestamp": "2026-04-12T18:30:10"
    # }

    # Get daily report
    report = collector.get_daily_report()
    print(report["top_tools"])

    # Reset session
    collector.reset_session()

    # Export session to file
    exported_path = collector.export_session()

  integration_with_existing_services: |
    The metrics collector can be integrated into:
    - LLM call wrappers to record token usage automatically.
    - Tool‑execution middleware to record tool calls and durations.
    - Scheduled jobs to generate daily reports.
    - Health‑check endpoints to expose session metrics.

testing_guidelines:
  manual_tests:
    - Instantiate collector via get_metrics_collector(), verify singleton behavior.
    - Call record_token_usage and verify data appears in session summary.
    - Call record_tool_call and verify session summary updates.
    - Call reset_session and confirm session data is cleared.
    - Check that daily JSON file is created in NC-MET-FR-001-metrics/.
    - Verify get_daily_report returns correct aggregates for today.
    - Test export_session creates a valid JSON file.
  automated_tests:
    - Unit tests should mock get_config() to use a temporary directory.
    - Test edge cases: zero tokens, negative cost (should not happen), duplicate records.
    - Test date handling in get_daily_report with past/future dates.
    - Verify persistence survives singleton re‑initialization.
  integration_tests:
    - Use the collector in a real tool call flow and verify metrics are recorded.
    - Simulate multiple sessions and verify daily aggregation.

potential_improvements:
  - Batch persistence to reduce I/O (e.g., persist every N records or on a timer).
  - Add session IDs to distinguish concurrent sessions.
  - Add configuration options for metrics directory via get_config().
  - Support for multiple backends (e.g., DuckDB via existing MetricsStore).
  - Real‑time streaming of metrics to a dashboard.
  - Compression of old daily files.
  - Metrics retention policy (delete files older than X days).
  - Thread‑safety for concurrent record_* calls.
  - Async variants of record methods.

risks_and_mitigations:
  - Risk: High‑frequency recording may cause excessive I/O.
    Mitigation: Implement batching; daily file is appended only when new records arrive.
  - Risk: Large daily files could grow unbounded.
    Mitigation: Implement rotation or switch to a database backend.
  - Risk: Singleton may cause issues in multi‑process deployments.
    Mitigation: Document that each process will have its own instance; consider a shared backend.
  - Risk: JSON files may become corrupted.
    Mitigation: Use atomic writes (write to temp file then rename) or add checksums.

