task: |
  1. Criar 01_neocortex_framework/neocortex/mcp/elicitation.py (~300 linhas)
     a. Implementar ElicitationManager class:
        - request_confirmation(action: str, details: dict, schema: dict = None) → bool
        - request_input(prompt: str, schema: dict) → dict
        - Pre-built schemas: T0_CONFIRM_SCHEMA, LOBE_SELECT_SCHEMA, COST_APPROVAL_SCHEMA
        - Timeout handling (default 120s, configurável)
        - Safe default: deny on timeout
     b. Implementar t0_confirm(action_description: str, risk_level: str) → bool:
        - HIGH risk (PROD write, @LOCKS touch): schema requer reason + confirm
        - MEDIUM risk (file create): schema requer confirm
        - LOW risk (read-only): auto-approve (sem elicitation)
     c. Auditar código existente por stdout prompts:
        - grep por "input(" e "print(.*T0.*approve" em todo o framework
        - Listar cada ocorrência para migração
     d. Usar logger = logging.getLogger(__name__) — NUNCA print()

  2. Criar 01_neocortex_framework/neocortex/mcp/logging.py (~250 linhas)
     a. Implementar MCPLogHandler(logging.Handler):
        - emit(record: LogRecord) → session.send_notification("notifications/message", ...)
        - Mapear Python log levels → RFC 5424: DEBUG→debug, INFO→info, WARNING→warning, ERROR→error, CRITICAL→critical
        - Formatar data como string estruturada (evitar objetos complexos)
     b. Implementar LogLevelManager:
        - set_level(level: str) → ajusta nível mínimo
        - get_level() → nível atual
        - Suportar logging/setLevel JSON-RPC method
     c. Wirear no initialize:
        - Adicionar MCPLogHandler ao root logger
        - Configurar logging.basicConfig para stderr (sempre ativo)
        - Registrar handler para logging/setLevel
     d. NUNCA escrever em stdout

  3. Integrar em server.py:
     a. Inicializar ElicitationManager e MCPLogHandler durante create_mcp_server()
     b. Registrar handlers para elicitation/create e logging/setLevel
     c. Configurar logging dual (stderr + notifications/message)
     d. NÃO modificar sub_server.py (R04)

  4. Migrar stdout prompts existentes:
     a. Listar todas as ocorrências de input()/print() para confirmação
     b. Substituir por elicitation_manager.t0_confirm()
     c. Testar cada ponto de migração

  5. VALIDAÇÃO:
