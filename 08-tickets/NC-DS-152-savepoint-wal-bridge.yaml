context: "NC-SVC-FR-016 (WALService) e NC-SVC-FR-003 (SavePointStub) existem mas não\
  \ estão\nconectados entre si. Quando um SavePoint é criado, ele NÃO é registrado\
  \ no WAL.\nObjetivo: criar um script de wiring que conecte os dois:\n  - Ao criar\
  \ um savepoint → WALService registra entrada (severity: NORMAL)\n  - Ao restaurar\
  \ um savepoint → WALService registra entrada (severity: HIGH)\n  - Ao listar savepoints\
  \ → retorna lista do WAL filtrada por type=savepoint\nCriar também um script de\
  \ teste que valida o fluxo completo.\n"
