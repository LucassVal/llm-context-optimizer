  \ lexico.manage: gerenciar átomos do dicionário\n\n4. Integrar com:\n   - ContextBuddy\
  \ para redução automática de contexto\n   - SessionMemoryWriter para compressão\
  \ de memória\n   - Knowledge Graph para enriquecimento semântico\n"
