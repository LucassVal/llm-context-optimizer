  - py_compile
  - yaml_safe_load   # se .yaml
  - "<PREENCHER>"

# ─── CHECKLIST PRÉ-HANDOFF ──────────────────────────────────────────
pre_handoff_checklist:
  - "python -m py_compile <ARQUIVO>.py → PASS"
  - "python -m ruff check <ARQUIVO>.py --select F,E9 → 0 erros"
  - "Nenhum @LOCK violado (server.py, sub_server.py, neocortex_config.yaml)"
  - "shared_kernel.paths_verified = true (todos os Test-Path passaram)"
  - "shared_kernel.lexico_validated = true (todos NC-IDs no LEXICO)"
  - "SSOT atualizado com changelog (R24)"

# ─── DELIVERABLES ───────────────────────────────────────────────────
