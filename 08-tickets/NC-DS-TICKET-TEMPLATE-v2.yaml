# ═══════════════════════════════════════════════════════════════════
# SHARED KERNEL CROSS-REFERENCE (OBRIGATÓRIO)
# Todo ticket deve cruzar referências com o núcleo semântico.
# ═══════════════════════════════════════════════════════════════════
shared_kernel:
  ulq_symbols:        # Símbolos @/$/%/# usados no ticket — verificar via ULQ-TAG-INDEX
    - "<@SSOT | @BOOT | @ROADMAP | @LOCKS | #GOV | #TICKETS | ...>"
  nc_ids_referenced:   # NC-IDs mencionados — verificar existem no LEXICO v4.6
    - "<NC-CORE-FR-XXX | NC-SUPER-XXX | NC-HK-FR-XXX | ...>"
  lexico_validated: false   # R21: executar python xref_check.py antes de marcar true
  paths_verified: false     # R21: Test-Path em cada path referenciado

# ═══════════════════════════════════════════════════════════════════
# WORKING DIRECTORY (OBRIGATÓRIO)
# ═══════════════════════════════════════════════════════════════════
working_directory: "C:\\Users\\Lucas Valério\\Desktop\\TURBOQUANT_V42"
framework_subdir: "01_neocortex_framework"

# ─── 3W (OBRIGATÓRIO) ──────────────────────────────────────────────
three_w:
  who: "<QUEM: agente, sistema, módulo afetado>"
  what: "<O QUÊ: descrição concreta da mudança, arquivos, linhas>"
  why: "<POR QUÊ: problema que resolve, gap que fecha, regra que implementa>"

# ─── RCA — 5 PORQUÊS (OBRIGATÓRIO) ─────────────────────────────────
rca:
  symptom: "<SINTOMA: o que está quebrado ou ausente>"
  why_1: "<porquê nível 1>"
  why_2: "<porquê nível 2>"
  why_3: "<porquê nível 3>"
  why_4: "<porquê nível 4>"
  why_5: "<porquê nível 5 — CAUSA RAIZ>"
  root_cause: "<CAUSA RAIZ em uma frase>"
  corrective_action: "<O QUE FAZER para corrigir>"
  preventive_action: "<O QUE FAZER para evitar recorrência>"

# ─── SWOT (OBRIGATÓRIO para ações estruturais) ─────────────────────
swot:
  strengths:
    - "<S: o que o sistema já faz bem aqui>"
  weaknesses:
    - "<W: limitações expostas, código ausente, hooks não wired>"
  opportunities:
    - "<O: caminhos abertos, melhorias possíveis>"
  threats:
    - "<T: riscos de quebra, dependências, breaking changes>"

# ─── KISS (OBRIGATÓRIO) ────────────────────────────────────────────
kiss:
  approach: "<CAMINHO MAIS SIMPLES: 1 frase>"
  lines_changed: "<estimativa de linhas>"
  risk: "<Baixo|Médio|Alto> — <justificativa>"
  no_new_engines: true    # Se true: usa código existente, zero engines novas
  no_refactor_adjacent: true  # KARPATHY: não refatorar código adjacente não quebrado

# ─── STEP 0 — R21 (OBRIGATÓRIO) ────────────────────────────────────
step_0:
  r21_verifications:
    - "Test-Path <arquivo> → confirmar existe"
    - "python -m py_compile <arquivo> → PASS"
    - "python xref_check.py → 0 GAPs no Shared Kernel"
    - "<PREENCHER: verificações específicas>"
  atomic_locks:
    - "01_neocortex_framework/neocortex/mcp/server.py → NUNCA MODIFICAR"
    - "01_neocortex_framework/neocortex/mcp/sub_server.py → NUNCA MODIFICAR"
    - "01_neocortex_framework/neocortex_config.yaml → NUNCA MODIFICAR"

# ─── TAREFAS ────────────────────────────────────────────────────────
tasks:
  - id: T1
    title: "<PREENCHER>"
    priority: <P0|P1|P2>
    write_zone: "<PROD|TEST|SCRIPTS|DOCS> → <path>"
    steps:
      - "<PREENCHER>"
    validation:
      - "python -m py_compile → PASS"
      - "ruff check → 0 erros"

# ─── IMPLEMENTATION NOTES ───────────────────────────────────────────
implementation_notes: |
  Regras INVIOLÁVEIS:
  - R09: NUNCA 'import NC-TOOL-FR-XXX'. Usar importlib.util.spec_from_file_location()
  - R10: NUNCA hardcode paths. Usar Path(__file__) ou @LEXICO
  - R11: NUNCA print() em produção. Usar logger = logging.getLogger(__name__)
  - R21: VERIFICAR ambiente real antes de afirmar. Dúvida → ESCALATED
  - R23: EXTEND, DON'T CREATE. Não duplicar tools/ações existentes.
  - R05: NUNCA DELETAR. Mover para 99-archive/.
  <PREENCHER: notas específicas>

# ─── ACCEPTANCE CRITERIA ────────────────────────────────────────────
