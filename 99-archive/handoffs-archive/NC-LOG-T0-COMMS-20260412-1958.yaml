  PROBLEMAS OPERACIONAIS IDENTIFICADOS (19:58):
  
  1. **Concorrência extrema**: ≥6 workers ativos para 2 tasks teoricamente AVAILABLE
  2. **File lock soft falha**: queue.lock ajuda mas não elimina race conditions
  3. **Inconsistências de estado**:
     - NC-DS-024: completed_at="2026-04-12T18:57:31" mas status: AVAILABLE (deveria ser DONE)
     - NC-DS-025: completed_at="2026-04-12T18:53:59" mas status: AVAILABLE (deveria ser DONE)
     - NC-DS-016: status: ACTIVE mas completed_at preenchido (inconsistente)
  4. **Protocolo de claim deficiente**:
     - Janela de 5s entre claim e verificação → race conditions
     - Múltiplos workers podem ler mesmo AVAILABLE simultaneamente
  5. **Formato inconsistentes**: claimed_by mistura timestamps e worker IDs

root_cause_analysis: |
  ANÁLISE DE CAUSA RAÍZ:
  
  - **Arquitetura atual**: YAML central + file lock soft
  - **Problema fundamental**: Coordenação distribuída via arquivo compartilhado sem atomicidade real
  - **Com 10 workers**: Probabilidade de colisão aumenta exponencialmente
  - **Solução atual (lock soft)**: Reduz mas não elimina janelas de race condition
  
  **Efeitos observados**:
  1. Workers gastam tempo em backoff exponencial (3s, 6s, 12s...)
  2. Múltiplas tentativas de claim falham
  3. Workers ficam ociosos enquanto tasks estão "disponíveis"
  4. Overhead de I/O no arquivo YAML

