implementation_notes: |
  PADRÃO DEFINITIVO (adicionar ao CLAUDE.md após NC-DS-300):

  SQLite WAL = padrão para TODO armazenamento persistente:
    conn = sqlite3.connect(path)
    conn.execute("PRAGMA journal_mode=WAL")   # multi-reader sem bloqueio
    conn.execute("PRAGMA synchronous=NORMAL") # seguro com WAL, +performance

  DuckDB = SOMENTE analytics task-scoped:
    conn = duckdb.connect(":memory:")  # nunca arquivo
    result = conn.execute(query).fetchall()
    conn.close()  # sempre fechar imediatamente

  RocksDB (Meta) = avaliar apenas se WAL não for suficiente para KV de alta
  frequência. YAGNI até ter profiling que prove necessidade (R131 PREMATURE).

  NUNCA:
    - duckdb.connect("arquivo.db") — lock exclusivo
    - sqlite3.connect() sem PRAGMA WAL — bloqueia em concorrência
    - Conexão persistente DuckDB em serviço daemon

