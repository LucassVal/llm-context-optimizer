# NC-DS-HANDOFF-TEMPLATE.yaml
# Template de correspondência T1→T0
# Gerado pelo DeepSeek ao final da FASE 5 (LOG)
# Depositado em: DIR-DS-002-audit-logs/NC-DS-{NUM}-handoff-{timestamp}.yaml
# STATUS POSSÍVEIS: PENDING_REVIEW | APPROVED | REJECTED | ESCALATED

status: PENDING_REVIEW       # T0 altera para APPROVED ou REJECTED após validação
ticket_id: NC-DS-XXX
roadmap_ticket: FR-0XX
submitted_at: "YYYY-MM-DDTHH:MM:SS"
submitted_by: deepseek-v4-flash
review_by: antigravity-t0
reviewed_at: null             # T0 preenche ao revisar

summary:
  files_created: []
  files_modified: []
  lines_added: 0
  lines_removed: 0
  validation_rounds: 1
  barriers_passed: []
  locks_violated: []          # DEVE estar vazio para APROVAÇÃO
  cost_usd: 0.0
  overall: SUCCESS             # SUCCESS | FAILED | ESCALATED

diff_path: "DIR-DS-002-audit-logs/NC-DS-XXX-diff.txt"  # diff completo separado

# Checklist para T0 (preencher na revisão)
t0_review:
  compile_ok: null             # python -m py_compile em todos os .py do diff
  naming_ok: null              # grep NC- nos arquivos criados
  ssot_updated: null           # NC-NAM-FR-001 tem entrada nova
  locks_clean: null            # nenhum @LOCKS tocado
  roadmap_done: null           # %DONE atualizado no @ROADMAP

# Se REJECTED, preencher motivo e criar novo ticket
rejection:
  reason: null
  next_ticket: null            # NC-DS-{NUM+1} para correção
