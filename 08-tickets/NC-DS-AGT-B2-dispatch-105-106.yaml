tarefas:
  ticket_1:
    id: NC-DS-105
    titulo: Audit Hook → Feed em tempo real no Mission Control
    arquivo_ticket: DIR-DS-001-tickets/NC-DS-105-audit-hook-mc-feed.yaml
    inicio:
    - Ler ticket NC-DS-105 completo
    - Ler NC-TOOL-FR-037-hooks.py para entender HookRegistry.emit()
    - Ler NC-ADP-FR-001-mission-control.py para entender send_event()
    meio:
    - Criar hook NC-HK-FR-003 que captura eventos de audit e envia ao MC
    - Registrar via HookRegistry — não hardcode, não import direto
    - Zero print() — logger apenas
    - 'Activity feed: cada evento gera POST ao MC com action + payload'
    validacao_obrigatoria:
    - cmd: python -m py_compile <arquivo_criado>
      esperado: Sem erros de sintaxe
    - cmd: python -m ruff check <arquivo_criado>
      esperado: 0 erros
    - Testar com --dry-run se suportado
    fim:
    - 'Gerar handoff: NC-DS-105-handoff-{YYYYMMDDTHHMMSS}.yaml'
    - 'Incluir: nome do hook registrado, evento de teste executado'
  ticket_2:
    id: NC-DS-106
    titulo: Launcher Unificado + Webhook endpoint
    arquivo_ticket: DIR-DS-001-tickets/NC-DS-106-hud-launchers-webhooks.yaml
    inicio:
    - Ler ticket NC-DS-106 completo (PARTE A e PARTE B)
    - Verificar se NC-SCR-FR-106-launcher.py já existe em scripts/
    - Verificar se NC-TOOL-FR-037-hooks.py tem action webhook.receive
    meio_parte_a_launcher:
    - Criar NC-SCR-FR-106-launcher.py
    - Verificar MC :3000 online via socket (não Test-NetConnection — é Python)
    - 'Se offline: subprocess.Popen([''pnpm'',''dev''], cwd=MC_DIR) em thread separada'
    - Aguardar MC online max 30s, poll 2s
    - Chamar NC-SCR-FR-103-mc-startup-hook.py como subprocess após MC UP
    - 'Flags: --dry-run obrigatório'
    meio_parte_b_webhook:
    - Adicionar action 'webhook.receive' em NC-TOOL-FR-037-hooks.py
    - Recebe payload {action, data} via tool call MCP
    - Roteia para HookRegistry.emit(action, data)
    - 'Retorna {status: ''ok'', event_id: uuid}'
    validacao_obrigatoria:
    - cmd: python -m py_compile 01_neocortex_framework/scripts/NC-SCR-FR-106-launcher.py
      esperado: Sem erros
    - cmd: python -m ruff check 01_neocortex_framework/scripts/NC-SCR-FR-106-launcher.py
      esperado: 0 erros
    - cmd: python -m py_compile 01_neocortex_framework/neocortex/mcp/tools/NC-TOOL-FR-037-hooks.py
      esperado: Sem erros
    - cmd: python -m ruff check 01_neocortex_framework/neocortex/mcp/tools/NC-TOOL-FR-037-hooks.py
      esperado: 0 erros
    - cmd: python 01_neocortex_framework/scripts/NC-SCR-FR-106-launcher.py --dry-run
      esperado: Executa sem exceção, reporta o que faria
    fim:
    - 'Gerar handoff: NC-DS-106-handoff-{YYYYMMDDTHHMMSS}.yaml'
    - 'Descrever: launcher testado com --dry-run, webhook action registrada'
checklist_r20_por_handoff:
  naming_convention: Todos os arquivos criados seguem NC-<TIPO>-<SIGLA>-<NUM>
  no_print_statements: Zero print() nos arquivos criados/modificados
  ssot_updated: Se criou artefato novo — informar T0 para NC-NAM-FR-001
  no_locked_files_modified: 'locks_violated: [] obrigatório para APPROVED'
  handoff_yaml_complete: Todos os campos do template preenchidos
  ruff_ok: ruff check 0 erros nos arquivos do diff
  py_compile_ok: py_compile sem erros em todos os .py criados/modificados
protocolo_falha:
  instrucao: 'Se falhar ou ficar bloqueado:

    1. NÃO silenciar o erro

    2. Gerar handoff com status: FAILED ou ESCALATED

    3. summary: (a) o que foi feito, (b) onde falhou, (c) erro exato

    4. Retornar ao T0

    '
