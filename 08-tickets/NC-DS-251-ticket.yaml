     a. Implementar prompt_registry: dict[str, PromptDefinition] com name → (description, arguments, handler)
     b. Registrar 10+ Prompts cobrindo todas as skills e SOPs do NeoCortex
     c. Cada prompt deve retornar messages array [{role, content}] com system prompt + user template
     d. Usar logger = logging.getLogger(__name__) — NUNCA print()
     e. Carregar templates de DIR-DOC-FR-001-docs-main/ via LEXICO path resolver

  2. Integrar em server.py (via @mcp.prompt ou register_prompt)
     a. Importar prompt_registry de prompts.py
     b. Registrar todos os Prompts no servidor FastMCP
     c. NÃO modificar sub_server.py (R04)

  3. VALIDAÇÃO: ruff + mypy + py_compile + bandit em prompts.py
     Testar com MCP Inspector: prompts/list, prompts/get com argumentos

