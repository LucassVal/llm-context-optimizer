task: '**OBJETIVO**: Executar o protocolo completo de validação do adaptador Mission
  Control (Rule 021 - Zero Suposições) e implementar melhorias arquiteturais voltadas
  para ambientes distribuídos de IA e comunicação MCP.


  **ETAPA 1: STEP-0 EXAUSTIVO (Obrigatório)**:

  1. Executar `python -m py_compile 01_neocortex_framework/neocortex/core/adapters/NC-ADP-FR-001-mission-control.py`.

  2. Executar `python -m ruff check 01_neocortex_framework/neocortex/core/adapters/NC-ADP-FR-001-mission-control.py`
  e resolver 100% dos lints.

  3. Validar tipagem com `mypy` (se disponível) ou revisar manualmente Type Hints
  estritos.

  4. Levantar dependências do adaptador (ex: httpx, websockets) e atestar se estão
  no `requirements.txt` via `python -c "import httpx; import websockets"`.


  **ETAPA 2: REVISÃO DE MODULARIDADE E ARQUITETURA DDD (As-Is vs To-Be)**:

  - **Refatoração Anti-Corruption Layer (ACL)**: O adaptador não deve apenas fazer
  fetch, ele precisa escutar *Domain Events* do Core e traduzi-los de forma isolada,
  protegendo o modelo central (DDD) de vazamentos da API externa.

  - **Implementação do Padrão "Worker/Child" (Separação de Preocupações)**: Eliminar
  imediatamente a biblioteca síncrona `requests` e `time.sleep()`. Implementar o adaptador
  rodando em um Message Queue assíncrono interno (Actor Model/Event Loop desacoplado)
  ou via `aiohttp` Fire-and-Forget, garantindo risco ZERO de *Thread Starvation* ou
  engarrafamento do loop principal.

  - **Inversão de Dependências (SOLID)**: Adotar injeção de dependências para o cliente
  HTTP subjacente. A IA nunca deve depender da implementação de rede, mas de um contrato/interface
  genérica gerenciado fora do Core.

  - **Circuit Breaker Avançado & Fail-Fast**: Evoluir de um block binário para a transição
  completa (CLOSED -> OPEN -> HALF-OPEN), emitindo eventos de erro reais via `HookRegistry`.

  - **Fallback Caching (Zero-Data-Loss)**: Quando offline ou sob Rate Limit (Backpressure
  HTTP 429), embandeirar métricas em um log `.wal` temporário/DB local e repassar
  (replay) em background assim que a porta 3000 retornar ao ar.


  **ETAPA 3: APROVAÇÃO (Fim de Sessão)**:

  - Commit no SSOT `NC-TODO-DS-001`.

  - Handoff Logging yaml na raiz de evidências comprovando o `exit code 0` de todas
  as ferramentas de validação.

