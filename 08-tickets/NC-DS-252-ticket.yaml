     a. Implementar OAuth2Server class com todos os 6 passos do fluxo
     b. PRM endpoint: /.well-known/oauth-protected-resource (RFC 9728)
     c. AS Discovery: /.well-known/oauth-authorization-server (RFC 8414)
     d. DCR endpoint: POST /oauth/register com validação e rate-limit
     e. Authorization endpoint: GET/POST /oauth/authorize com consent form T0
     f. Token endpoint: POST /oauth/token com PKCE validation
     g. Token introspection: POST /oauth/introspect (RFC 7662)
     h. Auth middleware: validate_bearer_token() aplicado em todas as rotas MCP
     i. Usar PyJWT + cryptography — NUNCA implementar crypto do zero
     j. Usar logger = logging.getLogger(__name__) — NUNCA print()
     k. NUNCA logar tokens, client_secrets ou credenciais

  2. Modificar server.py para integração:
     a. Adicionar auth middleware condicional (stdio = bypass, http = enforce)
     b. Configurar rotas OAuth no FastMCP/Starlette app
     c. NÃO modificar sub_server.py (R04)
     d. Adicionar configuração em neocortex_config.yaml:
        - mcp.auth.enabled (bool)
        - mcp.auth.issuer_url
        - mcp.auth.token_expiry_seconds
        - mcp.auth.allowed_scopes

  3. VALIDAÇÃO DE SEGURANÇA:
     - ruff + mypy + py_compile + bandit (com security rules) em auth.py
     - Testar fluxo completo com MCP Inspector + cliente OAuth de teste
     - Verificar: 401 sem token, 403 com token inválido, 200 com token válido
     - Verificar: DCR rate-limit, PKCE enforcement, token expiry

