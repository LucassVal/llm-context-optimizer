# ─── CONTEXTO ──────────────────────────────────────────────────────────────
context: |
  NC-SVC-FR-011 (TTLManager) existe mas não está conectado ao WAL prune.
  O WAL pode crescer indefinidamente sem TTL automático.
  Objetivo: criar script de manutenção que:
    1. Usa TTLManager para identificar entradas WAL > N dias
    2. Chama WALService.prune(days=N) para remover entradas antigas
    3. Gera relatório de quantas entradas foram removidas
    4. Pode ser agendado pelo PulseScheduler (NC-SVC-FR-012 / OPT-010)

# ─── STEP 0 OBRIGATÓRIO ────────────────────────────────────────────────────
step_0:
  - "Ler NC-SEC-FR-001-atomic-locks.yaml PRIMEIRO"
  - "Ler DIR-DS-001-tickets/NC-DS-HANDOFF-TEMPLATE.yaml"
  - "python --version → confirmar Python disponível"
  - "Verificar: ls neocortex/core/services/ | grep 'SVC-FR-011\\|SVC-FR-016\\|SVC-FR-012'"
  - "Ler NC-SVC-FR-011 → entender TTLManager API (ttl_check, set_ttl, list_expired)"
  - "Ler NC-SVC-FR-016 → entender WALService.prune(days) API"
  - "PARAR se qualquer um desses arquivos não existir → ESCALATED"

atomic_locks_inviolaveis:
  - "neocortex/mcp/server.py → NUNCA modificar"
  - "neocortex/mcp/sub_server.py → NUNCA modificar"
  - "NC-SVC-FR-011, NC-SVC-FR-016: NÃO modificar — apenas importar"

# ─── TAREFA ─────────────────────────────────────────────────────────────────
task: |
  1. Criar scripts/NC-SCR-FR-148-wal-ttl-pruner.py
     Script de manutenção autônomo:
       - Aceita argumento CLI: --days N (padrão 30)
       - Carrega WALService via importlib
       - Chama wal.prune(days=N) → obtém count de entradas removidas
       - Carrega TTLManager via importlib
       - Registra execução no TTLManager: key="wal.prune", last_run=datetime.now()
       - Salva relatório JSON em DIR-DS-002-audit-logs/NC-RPT-153-wal-prune-{DATE}.json
       - Logger INFO: "WAL pruned: {count} entries removed (>{N} days)"
       - Exit 0 em sucesso, Exit 1 em erro

  2. Criar 05_examples/NC-TEST-153-ttl-wal-prune.py
     Teste de integração:
       - Executa NC-SCR-FR-148 via subprocess
       - Verifica exit code = 0
       - Verifica que NC-RPT-153-*.json foi criado
       - Verifica que JSON tem campos: entries_removed, days_threshold, timestamp
       - Imprime PASS/FAIL para cada check

implementation_notes: |
  - logger = logging.getLogger(__name__) — R11
  - get_config() para cortex_path — R10
  - importlib.util para arquivos com hífens — R09
  - argparse para --days CLI arg
  - NUNCA print() — apenas logger
  - DIR-DS-002-audit-logs/ é zona de ESCRITA válida para relatórios

pre_handoff_checklist:
