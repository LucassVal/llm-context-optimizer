      - id: "R28"
        name: "Normas para Handoffs entre Tiers"
        description: "Handoffs entre tiers devem documentar contexto, estado e expectativas"
        severity: "high"
        enforcement_mechanism: "Handoff files obrigatórios para transferências T0→T1"
        validation_method: "Verificar completude de arquivos de handoff"
