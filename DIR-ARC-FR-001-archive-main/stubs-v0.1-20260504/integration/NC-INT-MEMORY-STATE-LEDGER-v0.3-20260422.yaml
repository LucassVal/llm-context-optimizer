integration_config:
  name: "Memory-State-Ledger Integration System"
  version: "v0.3"
  rule_implemented: "R25"
  scope: "Sincronização entre memory, state e ledger"
  frequency: "Checkpoints a cada handoff"
  trigger: "Handoff creation, checkpoint save, state change"

architecture:
  data_flow: "Memory → State → Ledger"
  consistency_model: "Transacional com rollback"
  synchronization: "Checkpoints coordenados"
  recovery: "Rollback coordenado em caso de falha"

components:
  memory_system:
    tools:
      - "neocortex_memory.cortex.get/set"
      - "neocortex_memory.lobe.get/activate"
      - "neocortex_memory.knowledge.search/store"
      - "neocortex_memory_auto.turn.record"
    responsibilities:
      - "Armazenamento de conhecimento de longo prazo"
      - "Categorização semântica (lobes)"
      - "Busca e recuperação de informação"
      - "Registro automático de interações"

  state_system:
    tools:
      - "neocortex_state.checkpoint.get/set"
      - "neocortex_state.savepoint.create/rollback"
      - "neocortex_state.session.heartbeat/status"
      - "neocortex_state.ledger.read/update"
    responsibilities:
      - "Estado da sessão atual"
      - "Checkpoints e savepoints"
      - "Recuperação de estado"
      - "Persistência transacional"

  ledger_system:
    tools:
      - "neocortex_ledger.ledger.read/update"
      - "neocortex_ledger.ledger.stats"
      - "neocortex_ledger.agent.register/identity"
    responsibilities:
      - "Registro imutável de interações"
      - "Identidade de agentes"
      - "Métricas e estatísticas"
      - "Auditoria transacional"

integration_workflows:
  workflow_1_handoff_synchronization:
    trigger: "neocortex_governance.handoff.create"
    steps:
      - "State: Criar checkpoint do estado atual"
      - "Memory: Registrar handoff no knowledge base"
      - "Ledger: Registrar criação de handoff"
      - "Validar: Verificar sincronização entre sistemas"
    output: "Handoff registrado em todos os sistemas"

  workflow_2_compliance_audit:
    trigger: "neocortex_governance.cf.audit"
    steps:
      - "Memory: Buscar histórico de auditorias"
      - "State: Verificar estado atual de compliance"
      - "Ledger: Registrar nova auditoria"
      - "Integrar: Consolidar dados dos três sistemas"
    output: "Relatório de compliance integrado"

  workflow_3_state_recovery:
    trigger: "System failure or manual recovery"
    steps:
      - "State: Identificar último checkpoint válido"
      - "Memory: Restaurar conhecimento do período"
      - "Ledger: Verificar integridade transacional"
      - "Sincronizar: Aplicar rollback coordenado"
    output: "Sistema restaurado com consistência"

  workflow_4_agent_identity_flow:
    trigger: "Agent spawn or task assignment"
    steps:
      - "Ledger: Registrar identidade do agente"
      - "State: Atualizar estado da sessão"
      - "Memory: Armazenar perfil do agente"
      - "Sincronizar: Manter consistência entre sistemas"
    output: "Agente registrado e rastreável"

synchronization_rules:
  rule_1_consistency:
