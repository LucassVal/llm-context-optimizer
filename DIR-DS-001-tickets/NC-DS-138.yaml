task: |
  Implementar NC-HK-FR-004 conversation hook para captura automática de turns de conversação.
  
  Objetivos:
  1. Criar NC-HK-FR-004-conversation-hook.py que:
     - Registra hook "on_response" no HookRegistry
     - Captura automaticamente cada turn user→ai
     - Chama SessionMemoryWriter.turn.record() com dados estruturados
     - Aplica compressão via LexicoService se configurado
     - Gera hot summaries periódicos (session.hot)
  
  2. Integrar com:
     - HookRegistry (NC-HK-FR-001) para registro
     - SessionMemoryWriter (NC-SVC-FR-021) para persistência
     - LexicoService (NC-SVC-FR-020) para compressão
     - EventBus para notificações
  
  3. Implementar features:
     - Configuração via neocortex_config.yaml (enable/disable, compression level)
     - Filtros por tipo de conversação (excluir certos patterns)
     - Rate limiting para evitar overload
     - Fallback para modo manual se serviço indisponível
  
  4. Criar ferramenta MCP para gerenciamento:
     - Integrar com NC-TOOL-FR-044-memory-auto.py
     - Expor configurações via tool actions
     - Mostrar estatísticas de captura

