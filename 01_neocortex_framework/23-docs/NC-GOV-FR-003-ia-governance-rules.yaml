# ─────────────────────────────────────────────────────────────────────────────
# 20 REGRAS DE GOVERNANÇA DE IA (categorizadas)
# ─────────────────────────────────────────────────────────────────────────────

rules:
  # CATEGORIA 1: FUNDACAO E ESTRUTURA
  foundation_and_structure:
    description: "Regras fundamentais para estrutura e organizacao do sistema"
    rules:
      - id: "R01"
        name: "Inventario de Ativos de IA"
        description: "Manter um catalogo completo e atualizado de todos os modelos, ferramentas, agentes e fontes de dados utilizados"
        severity: "critical"
        enforcement_mechanism: "artifact_catalog.json + genealogy_graph.json"
        validation_method: "Cross-check com mapeamento de ambiente"
        status: "partial"
        compliance_note: "genealogy_graph.json faltando - compliance impact: -10%"
        artifacts:
          - "artifact_catalog.json"
          - "mcp_tools_inventory.json"
          - "genealogy_graph.json"

      - id: "R02"
        name: "Politica Formalizada"
        description: "As politicas de governanca devem ser escritas, versionadas e acessiveis como codigo ou documentos SSOT"
        severity: "critical"
        enforcement_mechanism: "SSOT documents + version control"
        validation_method: "Verificar existencia e hash dos arquivos .md/.yaml"
        status: "implemented"
        artifacts:
          - "NC-NAM-FR-001-naming-convention.md"
          - "NC-SEC-FR-001-atomic-locks.yaml"
          - "NC-CFG-FR-002-rules-policy.yaml"
          - "NC-GOV-FR-003-ia-governance-rules.yaml"

      - id: "R03"
        name: "Estrutura de Diretorios Padronizada"
        description: "A estrutura de diretorios deve seguir um padrao definido e documentado"
        severity: "critical"
        enforcement_mechanism: "NC-NAM-FR-001 (secao de diretorios) + PROJECT_MAP.md"
        validation_method: "Validar paths contra estrutura definida"
        status: "implemented"
        artifacts:
          - "NC-NAM-FR-001-naming-convention.md"
          - "PROJECT_MAP.md"

      - id: "R04"
        name: "Nomenclatura Padronizada"
        description: "Todos os arquivos devem seguir uma convencao de nomenclatura rigida (NC-<TIPO>-<SIGLA>-<NUM>-<desc>.ext)"
        severity: "critical"
        enforcement_mechanism: "R01 do boot manifesto + SecurityService + Automated Auditor + MCP Health Check"
        validation_method: "Regex pattern matching em criacao de arquivos + auditoria semanal + MCP health check (ssot.audit)"
        status: "implemented_with_continuous_audit"
        compliance_status: "MONITORING_ACTIVE"
        compliance_score: "58.4%"
        last_audit: "2026-04-22"
        audit_findings: "180/461 arquivos não NC- (41.6% failure rate) - 7 arquivos críticos renomeados hoje"
        pattern: "^NC-[A-Z]+-[A-Z]+-[0-9]{3}-.+\\..+"
        mcp_integration: "NC-SUPER-013-health.py (ssot.audit action)"
        audit_frequency: "Ciclo 4 (semanal) + on-demand via MCP"
        exceptions:
          - "NC-CASC-REPORT-YYYYMMDD-HHMMSS.md (relatórios automáticos)"
          - "NC-LEXICO-YYYYMMDD-HHMMSS.json (cache léxico)"
          - "NC-LEXICO-LATEST.json (cache léxico)"
        remediation_plan: "NC-SCR-FR-120-batch-rename-fix.py"
        artifacts:
          - "NC-NAM-FR-001-naming-convention.md"
          - "NC-BOOT-FR-001-system-manifest.md (R01)"
          - "NC-AUDIT-FR-001-governance-ssot-audit-20260421.yaml"

      - id: "R05"
        name: "Segregação de Ambientes"
        description: "Manter ambientes separados para desenvolvimento, teste (espelho) e produção (original)"
        severity: "high"
        enforcement_mechanism: "Ambiente original vs. espelho + renaming_plan.yaml"
        validation_method: "Detecção de ambiente + validação de caminhos"
        status: "implemented"
        environments:
          - name: "original"
            path: "01_neocortex_framework/"
            purpose: "Produção"
          - name: "mirror"
            path: "01_neocortex_framework_RENAMED/"
            purpose: "Teste/Validação"
        artifacts:
          - "renaming_plan_v2_dedup.yaml"
          - "NC-SCR-FR-080-governance-auditor.py"

  # CATEGORIA 2: CONTROLE DE ACESSO E IDENTIDADE
  access_control_and_identity:
    description: "Regras para controle de acesso, identidade de agentes e isolamento"
    rules:
      - id: "R06"
        name: "Identidade para Agentes"
        description: "Cada agente (T0, Courier, Engineer) deve ter uma identidade unica e verificavel"
        severity: "high"
        enforcement_mechanism: "agent_id + role registrados no $LDG e handoffs YAML"
        validation_method: "Verificar presence de agent_id em handoffs"
        status: "partial"
        compliance_note: "34/111 handoffs com agent='UNKNOWN' - compliance impact: -15%"
        artifacts:
          - "DIR-DS-002-audit-logs/NC-DS-*-handoff-*.yaml"
          - "neocortex_config.yaml (agent profiles)"

      - id: "R07"
        name: "Privilégio Mínimo (PoLP)"
        description: "Agentes devem ter apenas as permissões estritamente necessárias para sua função"
        severity: "high"
        enforcement_mechanism: "allowed_tools + forbidden_actions no agent-policy-template.yaml"
        validation_method: "Validar tool calls contra policy do agente"
        status: "implemented"
        artifacts:
          - "NC-CFG-FR-001-agent-policy-template.yaml"
          - "SecurityService.validate_access()"

      - id: "R08"
        name: "Atomic Locks (Path-Based)"
        description: "Arquivos críticos (SSOT, configurações) devem ser protegidos contra modificação por agentes"
        severity: "critical"
        enforcement_mechanism: "NC-SEC-FR-001-atomic-locks.yaml + LockGuard"
        validation_method: "SecurityService bloqueia escrita em paths protegidos"
        status: "implemented"
        artifacts:
          - "NC-SEC-FR-001-atomic-locks.yaml"
          - "neocortex.core.security_service.SecurityService"
          - "LockGuard"

      - id: "R09"
        name: "Segregação de Zonas de Escrita"
        description: "Agentes de diferentes domínios (ex: Courier vs. Engineer) não podem escrever nos mesmos diretórios"
        severity: "high"
        enforcement_mechanism: "write_zones no agent-policy-template.yaml"
        validation_method: "Validar path de escrita contra zona permitida"
        status: "implemented"
        artifacts:
          - "NC-CFG-FR-002-rules-policy.yaml (write_zones)"
          - "agent-policy-template.yaml"

  # 🔵 CATEGORIA 3: RASTREABILIDADE E AUDITORIA
  traceability_and_audit:
    description: "Regras para rastreabilidade, auditoria e versionamento"
    rules:
      - id: "R10"
        name: "Trilha de Auditoria Imutável"
        description: "Todas as ações dos agentes devem ser registradas em um log à prova de adulteração"
        severity: "critical"
        enforcement_mechanism: "Audit Trail (via LedgerService e handoffs YAML)"
        validation_method: "Verificar integridade de handoffs (hash chain)"
        status: "partial"
        artifacts:
          - "LedgerService"
          - "DIR-DS-002-audit-logs/"
          - "SAVE-004 + FR-026 (WAL futuro)"

      - id: "R11"
        name: "Versionamento de Artefatos"
        description: "Todos os artefatos de governança devem ser versionados (Git) e conter hashes de integridade"
        severity: "high"
        enforcement_mechanism: "Dupla Mordaça: YAMLs de governança com hash MD5/SHA256"
        validation_method: "Verificar campo hash em meta de YAMLs de governança"
        status: "implemented"
        artifacts:
          - "NC-SEC-FR-001-atomic-locks.yaml (hash: ATOMIC-LOCKS-v1.0)"
          - "NC-CFG-FR-002-rules-policy.yaml (hash: RULES-YAML-v2)"
          - "NC-GOV-FR-003-ia-governance-rules.yaml (hash: IA-GOVERNANCE-RULES-v1.0)"

      - id: "R12"
        name: "Handoffs Formais"
        description: "Toda tarefa delegada a um agente deve ser documentada em um handoff YAML"
        severity: "critical"
        enforcement_mechanism: "Formato NC-DS-*-handoff-*.yaml em DIR-DS-002-audit-logs/"
        validation_method: "Validar estrutura YAML e referência a ticket"
        status: "partial"
        compliance_note: "50/111 handoffs incompletos, 77.0% coverage - compliance impact: -20%"
        artifacts:
          - "NC-HANDOFF-TEMPLATE.yaml"
          - "DIR-DS-002-audit-logs/"
          - "NC-GOV-FR-002-ticket-lifecycle.md"

      - id: "R13"
        name: "Checkpoints e Save Points"
        description: "O estado do sistema deve ser salvo periodicamente e antes de operações críticas"
        severity: "high"
        enforcement_mechanism: "PulseScheduler (checkpoints) + SAVE-002 (Save Points)"
        validation_method: "Verificar existência de checkpoints recentes"
        status: "partial"
        artifacts:
          - "PulseScheduler"
          - "SAVE-002 (Save Point Service - pendente)"
          - "neocortex_checkpoint tool"

  # 🟣 CATEGORIA 4: EXECUÇÃO E ORQUESTRAÇÃO
  execution_and_orchestration:
    description: "Regras para execução segura, limites e resiliência"
    rules:
      - id: "R14"
        name: "STEP 0 (Validação Pré-Ação)"
        description: "Antes de qualquer ação, o agente deve validar a tarefa contra o Regression Buffer e as políticas"
        severity: "critical"
        enforcement_mechanism: "mentor_step_0() + neocortex_regression.check"
        validation_method: "Execução obrigatória antes de tool calls"
        status: "implemented"
        artifacts:
          - "mentor_step_0()"
          - "neocortex_regression.check"
          - "NC-TOOL-FR-012-regression.py"

      - id: "R15"
        name: "STEP -1 (Save Point)"
        description: "Antes de ações de escrita, um snapshot do estado deve ser capturado para possível rollback"
        severity: "high"
        enforcement_mechanism: "SAVE-002 (Save Point Service)"
        validation_method: "Snapshot diff antes/após escrita"
        status: "pending"
        artifacts:
          - "SAVE-002 (pendente)"
          - "NC-TODO-FR-001 (ticket)"

      - id: "R16"
        name: "Circuit Breaker"
        description: "Se um agente falhar repetidamente, ele deve ser suspenso para evitar loops de falha"
        severity: "high"
        enforcement_mechanism: "SEC-403 (Circuit Breaker por Agente)"
        validation_method: "Monitorar falhas consecutivas"
        status: "pending"
        artifacts:
          - "SEC-403 (pendente)"
          - "NC-TODO-FR-001 (ticket)"

      - id: "R17"
        name: "Rate Limiting por Ferramenta"
        description: "Limitar a frequência de chamadas a ferramentas críticas ou caras (ex: APIs de LLM)"
        severity: "high"
        enforcement_mechanism: "SEC-403 (Rate limiting no guardian)"
        validation_method: "Contador de chamadas por tool/agente"
        status: "pending"
        artifacts:
          - "SEC-403 (pendente)"
          - "NC-TODO-FR-001 (ticket)"

  # 🟢 CATEGORIA 5: CICLO DE VIDA E MELHORIA CONTÍNUA
  # 🔴 CATEGORIA 6: PROTOCOLO DE AGENTE (adicionada 2026-04-16)
  agent_protocol:
    description: "Regras de comportamento obrigatório para agentes T1 durante execução de tarefas"
    rules:
      - id: "R21"
        name: "Zero Suposições — Parar e Retornar ao T0"
        description: |
          Em caso de QUALQUER dúvida, ambiguidade ou bloqueio, o agente DEVE parar imediatamente
          e retornar ao T0 com: (1) o que foi feito até agora, (2) a dúvida exata,
          (3) as opções que o agente vê. T0 decide. O agente NÃO assume, NÃO advinha, NÃO improvisa.
        severity: "critical"
        enforcement_mechanism: "protocolo_agente block em cada ticket YAML"
        validation_method: "Verificar campo regra_duvida em tickets DIR-DS-001-tickets/"
        status: "implemented"
        quando_parar:
          - "Arquivo mencionado no ticket não encontrado"
          - "API/estrutura do serviço diferente do descrito"
          - "Mudança necessária toca arquivo @LOCKS"
          - "Dois caminhos possíveis e sem critério claro de escolha"
          - "Script referenciado não existe"
          - "Template de artefato não encontrado em NC-TPL-FR-001"
        artifacts:
          - "DIR-DS-001-tickets/*.yaml (campo protocolo_agente.regra_duvida)"
          - "NC-TPL-FR-001-template-central-index.yaml"

      - id: "R22"
        name: "Template Central Obrigatório"
        description: |
          Todo agente DEVE consultar NC-TPL-FR-001-template-central-index.yaml antes de criar
          qualquer artefato novo. NÃO criar do zero quando template existir.
          Se o tipo de artefato não estiver no índice → aplicar R21 (parar, retornar ao T0).
        severity: "high"
        enforcement_mechanism: "step_0_obrigatorio em cada ticket YAML aponta para DIR-TMP-FR-001"
        validation_method: "Verificar se novos artefatos seguem estrutura dos templates correspondentes"
        status: "implemented"
        artifacts:
          - "01_neocortex_framework/DIR-TMP-FR-001-templates-main/NC-TPL-FR-001-template-central-index.yaml"
          - "DIR-DS-001-tickets/*.yaml (campo protocolo_agente.step_0_obrigatorio)"

      - id: "R24"
        name: "Dispatch YAML Obrigatório para Qualquer Despacho a Agente T1"
        description: |
          ANTES de despachar qualquer agente T1 (horizontal, vertical, sprint, hotfix),
          o T0 DEVE criar um dispatch YAML completo usando NC-TPL-FR-002-agent-dispatch.yaml.
          O dispatch deve conter: identidade do agente, passo_0_leitura_obrigatoria,
          regra_zero_suposicoes (R21), atomic_locks_absolutos, write_zones_autorizadas,
          tarefas com início/meio/fim, validação obrigatória (py_compile + ruff),
          checklist_r20_por_handoff, e protocolo_falha.
          Despacho sem dispatch YAML = VIOLAÇÃO DE GOVERNANÇA.
        severity: "critical"
        enforcement_mechanism: "NC-GOV-FR-002-ticket-lifecycle.yaml (STAGE-02 dispatch_yaml_rule)"
        validation_method: "Verificar existência de NC-DS-AGT-*-dispatch-*.yaml para cada agent assignment"
        status: "implemented"
        template: "01_neocortex_framework/DIR-TMP-FR-001-templates-main/NC-TPL-FR-002-agent-dispatch.yaml"
        artifacts:
          - "DIR-DS-001-tickets/NC-DS-AGT-*-dispatch-*.yaml"
          - "NC-TPL-FR-002-agent-dispatch.yaml"
          - "NC-GOV-FR-002-ticket-lifecycle.yaml (STAGE-02)"

      - id: "R23"
        name: "Handoff Obrigatório por Ticket"
        description: |
          Todo agente DEVE gerar handoff YAML ao concluir CADA ticket — sem exceção.
          Usar template: DIR-DS-001-tickets/NC-DS-HANDOFF-TEMPLATE.yaml
          Destino: DIR-DS-002-audit-logs/NC-DS-{ID}-handoff-{YYYYMMDDTHHMMSS}.yaml
          Se falhar: gerar handoff com status FAILED ou ESCALATED — nunca silenciar erro.
        severity: "critical"
        enforcement_mechanism: "handoff_obrigatorio block em cada ticket YAML"
        validation_method: "Ciclo 1 verifica tickets sem handoff correspondente (bloqueante)"
        status: "partial"
        compliance_note: "22.1% tickets sem handoff (33/149) - compliance impact: -25%"
        artifacts:
          - "DIR-DS-001-tickets/NC-DS-HANDOFF-TEMPLATE.yaml"
          - "DIR-DS-002-audit-logs/"
          - "NC-WF-001-workspace-routine.md (CICLO 1 — verificação bloqueante)"

  lifecycle_and_continuous_improvement:
    description: "Regras para ciclo de vida, rotinas e manutenção"
    rules:
      - id: "R18"
        name: "Ciclo de Vida de Tickets"
        description: "Toda tarefa deve ser registrada como ticket e seguir um fluxo formal (criação → execução → fechamento)"
        severity: "high"
        enforcement_mechanism: "NC-GOV-FR-002-ticket-lifecycle.md + diretório DIR-DS-001-tickets/"
