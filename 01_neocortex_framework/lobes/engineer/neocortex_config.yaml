# Engineer-specific configuration
llm:
  provider: ollama
  model: qwen2.5-coder:3b-instruct
  base_url: "http://localhost:11434"
  temperature: 0.7
  max_tokens: 4096

# Agent-specific settings (if supported)
agent:
  role: engineer
  auto_start: false
  idle_timeout: 300  # 5 minutes

# Security: allowed tools (if needed)
security:
  allowed_tools:
    - neocortex_lobes.create
    - neocortex_lobes.update
    - neocortex_kg.add_entity
    - neocortex_consolidation.summarize
    - neocortex_task.execute