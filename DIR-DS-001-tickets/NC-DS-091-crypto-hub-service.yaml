task:
  description: "Criar NC-SVC-FR-017-crypto-hub.py em:\n  01_neocortex_framework/neocortex/core/services/\n\
    \nO serviço deve:\n\n1. Carregamento de chave\n   - Lê NEOCORTEX_MASTER_KEY do\
    \ ambiente (os.environ)\n   - Se ausente: emite warning + usa modo \"hash-only\"\
    \ (sem encrypt/decrypt)\n   - Deriva chave Fernet via PBKDF2HMAC(SHA256, salt=project_id,\
    \ iterations=100_000)\n   - Nunca imprime/loga a chave derivada\n\n2. encrypt(plaintext:\
    \ str) -> str\n   - Retorna token Fernet: base64url(version + ts + iv + ciphertext\
    \ + hmac)\n   - WAL-logged: registra operação SEM o plaintext/ciphertext (só file_path\
    \ + sha256(ciphertext))\n\n3. decrypt(token: str) -> str\n   - Valida HMAC antes\
    \ de decriptar\n   - WAL-logged: registra attempt + outcome (success/fail)\n\n\
    4. rotate_key(new_master_key: str) -> RotateResult\n   - Re-encripta todos os\
    \ tokens registrados com nova chave\n   - WAL-logged como session única\n\n5.\
    \ scan_config(config_path: str | Path) -> ScanResult\n   - Detecta valores marcados\
    \ com tag !secret no YAML\n   - Retorna lista de campos que precisam ser encriptados\n\
    \n6. CLI:\n   NEOCORTEX_MASTER_KEY=xxx python NC-SVC-FR-017-crypto-hub.py encrypt\
    \ \"valor\"\n   NEOCORTEX_MASTER_KEY=xxx python NC-SVC-FR-017-crypto-hub.py decrypt\
    \ \"token\"\n   NEOCORTEX_MASTER_KEY=xxx python NC-SVC-FR-017-crypto-hub.py scan-config\
    \ <path>\n   NEOCORTEX_MASTER_KEY=xxx python NC-SVC-FR-017-crypto-hub.py rotate-key\n\
    \nDependência: cryptography (Fernet) — adicionar ao requirements.txt\nLinha a\
    \ adicionar: cryptography>=42.0.0  # AES-128-CBC + HMAC via Fernet\n\nIntegração\
    \ WAL: via import_pattern idêntico ao NC-DS-089 (parents[2])\n"
  integration_note: 'NÃO modificar security_service.py ainda — isso é escopo do NC-DS-093.

    Este ticket cria APENAS o serviço isolado e testa via CLI.

    '
