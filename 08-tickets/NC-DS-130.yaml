task: "Implementar sistema de Lobe Cards automatizados para visualização e gerenciamento\
  \ de lobes de memória.\n\nObjetivos:\n1. Criar NC-SCR-FR-115-lobe-cards.py que:\n\
  \   - Analisa automaticamente diretório 02_memory_lobes/\n   - Gera cards visuais\
  \ (Markdown + HTML) para cada lobe\n   - Inclui metadata: tamanho, última atualização,\
  \ tags, categorias\n   - Cria índice navegável de todos os lobes\n\n2. Integrar\
  \ com:\n   - Knowledge Graph para relacionamentos entre lobes\n   - LexicoService\
  \ para compressão de descrições\n   - SemanticCataloger para categorização automática\n\
  \   - MetricsStore para estatísticas de uso\n\n3. Criar ferramenta MCP NC-TOOL-FR-048-lobe-cards.py\
  \ com ações:\n   - lobe_cards.generate: gerar cards para lobes específicos\n   -\
  \ lobe_cards.refresh: atualizar cards existentes\n   - lobe_cards.export: exportar\
  \ como HTML/PDF\n   - lobe_cards.stats: mostrar estatísticas de lobes\n\n4. Implementar\
  \ features:\n   - Busca full-text em conteúdo dos lobes\n   - Visualização de relacionamentos\
  \ (grafo)\n   - Filtros por categoria, tags, data\n   - Integração com Mission Control\
  \ para dashboard\n"
