description: |
  GAP IDENTIFICADO: O servidor MCP não implementa as primitivas utilitárias definidas 
  na spec: progress tracking, ping keepalive, e cancellation. Sem essas primitivas, 
  tools long-running deixam o client sem feedback, conexões podem ser encerradas por 
  timeout, e requests em andamento não podem ser cancelados.

  A spec MCP (NC-LBE-INT-006 §1.4) define essas como "Utility Primitives".

  ESCOPO:

  1. PROGRESS TRACKING (tools >5s):
     - Protocolo: servidor envia notifications/progress durante execução longa
     - Formato da notification:
       ```json
       {
         "method": "notifications/progress",
         "params": {
           "progressToken": "unique-request-token",
           "progress": 45,        // valor numérico
           "total": 100,          // opcional, para barras de progresso
           "message": "Processing lobe 5/12..."  // opcional
         }
       }
       ```
     - Tool decorator que automaticamente adiciona progress tracking:
       ```python
       @mcp.tool()
       @with_progress(total_steps=100, threshold_seconds=5.0)
       async def long_running_tool(...):
           for i in range(100):
               await process_step(i)
               await report_progress(i + 1)  # automático via decorator
       ```
     - Progress token: client envia `_meta.progressToken` no request params
     - Servidor usa esse token para enviar notifications/progress
     - Se client não envia progressToken → tool executa sem progress (compatibilidade)

  2. TOOLS QUE PRECISAM DE PROGRESS:
     | Tool | Duração Estimada | Total Steps |
     |------|-----------------|-------------|
     | nc_audit (full) | 30-120s | 3 layers × N files |
     | nc_populate_lobes | 10-60s | N lobes to populate |
     | nc_boot_sync | 15-45s | catalog + tickets + manifest |
     | nc_validate (full pipeline) | 10-30s | ruff + mypy + pyright + bandit + yaml + json |
     | nc_governance_audit (full) | 60-180s | all 13 governance rules |
     | nc_archive (batch) | 5-30s | N files to archive |
     | nc_regression_check (full) | 10-60s | check all past failures |

  3. PING KEEPALIVE:
     - Protocolo: client envia `{"method": "ping"}` → servidor responde `{}`
     - Implementar handler para ping method
     - Manter contador de pings recebidos (métrica de health)
     - Timeout detection: se nenhum ping em 300s → log warning
     - Útil para Streamable HTTP connections que podem ser encerradas por proxy/firewall
     - stdio transport: ping menos crítico (conexão local), mas ainda suportado
     - Registrar ping latency como métrica

  4. CANCELLATION ($/cancelRequest):
     - Protocolo: client envia `{"method": "$/cancelRequest", "params": {"requestId": 42}}`
     - Servidor tenta cancelar request em andamento (best-effort)
     - Implementação:
       a. CancellationTokenRegistry: dict[request_id, asyncio.Event]
       b. Tool que suporta cancellation verifica periodicamente: `await check_cancelled(request_id)`
       c. Se cancelado: tool faz cleanup e retorna erro com isError: true + mensagem "Cancelled by client"
       d. Se tool não suporta cancellation: ignora (best-effort por spec)
     - Tools que DEVEM suportar cancellation:
       - nc_audit (longo, cancelável entre layers)
       - nc_populate_lobes (cancelável entre lobes)
       - nc_governance_audit (cancelável entre rules)
       - nc_archive (cancelável entre files)
     - Padrão de implementação:
       ```python
       async def cancellable_tool(request_id: str, ...):
           token = cancellation_registry.register(request_id)
           for step in steps:
               if token.is_cancelled():
                   return mcp_error("Cancelled by client", "Re-run when ready")
               await do_work(step)
           cancellation_registry.unregister(request_id)
       ```

  5. MÉTRICAS DE UTILIDADE:
     - Progress events enviados (counter)
     - Pings recebidos (counter) + P99 latency (histogram)
     - Cancellations recebidas (counter) + taxa de sucesso (ratio)
     - Tools que completaram com progress vs sem progress (ratio)
     - Expor métricas via notifications/message (logging capability)

  PADRÃO DE REFERÊNCIA: NC-LBE-INT-006-mcp-specification.mdc §1.4 (Utility Primitives — 
  Progress, Ping, Cancellation), §17.2 (Gap #4: Progress tracking, Gap #10: Ping keepalive).

  IMPACTO: UX muito melhor para tools long-running (progress bar no client). Conexões 
  mais robustas (ping keepalive). Usuários podem cancelar operações longas sem reiniciar 
  o servidor.

