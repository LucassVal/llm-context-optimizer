task:
  description: |
    Para CADA script abaixo, adicionar integração WAL:

    1. NC-SCR-FR-066-bootup-sync.py (bootup-sync)
       - Importar WALService
       - Antes de abrir NC-BOOT-FR-001-system-manifest.md para escrita:
           wal = WALService()
           session_id = f"ciclo3-bootup-sync-{datetime.now().strftime('%Y%m%dT%H%M%S')}"
           with wal.transaction(session_id, "NC-SCR-FR-066", ticket_id) as txn:
               before = txn.before_write(manifest_path)
               # ... lógica existente ...
               txn.after_write(manifest_path, before)

    2. NC-SCR-FR-064-artifact-catalog.py (artifact-catalog)
       - Mesma estrutura: logar criação/modificação do artifact_catalog.json

    3. NC-SCR-FR-009-sanitize-all-yamls.py (sanitize)
       - Logar cada YAML modificado na sessão WAL
       - Um único wal.transaction() por execução do script

    Após cada integração:
       python -m py_compile <script> && echo OK
       python <script> --dry-run ou verificar que WAL.stats() incrementa

    Gerar handoff APPROVED.

