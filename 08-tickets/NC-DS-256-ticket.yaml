task: |
  1. Criar utility 01_neocortex_framework/neocortex/mcp/errors.py (~200 linhas)
     a. Implementar mcp_error(message: str, suggestion: str = None) → dict:
        Retorna {"content": [{"type": "text", "text": formatted_message}], "isError": True}
     b. Implementar mcp_success(data: any) → dict:
        Retorna {"content": [{"type": "text", "text": formatted_data}], "isError": False}
     c. Implementar format_error_message(error_type, message, suggestion, context):
        Template: "Error ({error_type}): {message}. Suggestion: {suggestion}. Context: {context}"
     d. Usar logger = logging.getLogger(__name__) — NUNCA print()

  2. Migrar CADA tool (20+ tools) — lista completa:
     a. Auditar todas as tools em 01_neocortex_framework/neocortex/tools/
     b. Para cada tool, substituir return {"success": False, ...} → return mcp_error(...)
     c. Para cada tool, substituir return {"success": True, ...} → return mcp_success(...)
     d. Garantir que input validation errors usam isError: true (SEP-1303)
     e. Adicionar sugestões acionáveis em cada mensagem de erro
     f. NUNCA expor stack traces em production responses
     g. Manter logging.error() para debugging interno

  3. VALIDAÇÃO:
     - ruff + mypy + py_compile + bandit em TODAS as tools modificadas
     - Testar cada tool com MCP Inspector: verificar isError: true em erros
     - Testar: tool chamada sem args obrigatórios → isError: true com sugestão
     - Testar: tool chamada corretamente → isError: false com resultado
     - Verificar: nenhum {"success": false} residual no código

