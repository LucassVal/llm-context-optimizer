task:
  description: "Criar NC-TOOL-FR-037-hooks.py — MCP tool que expõe o HookRegistry\
    \ como ferramenta chamável.\n\nAções a implementar:\n  hook.register   → registra\
    \ fn em um evento (event, fn_path, priority=0)\n                    como fn_path\
    \ não é serializável via MCP, registrar hooks pré-fabricados\n               \
    \     por nome: \"logging\", \"timing\", \"ratelimit\", \"audit\"\n  hook.unregister\
    \ → remove hook de um evento por nome\n  hook.trigger    → trigera manualmente\
    \ um evento (event, payload=dict)\n  hook.list       → lista todos os eventos\
    \ e hooks registrados\n  hook.stats      → retorna estatísticas de timing por\
    \ tool (via TimingHook)\n\nImportação dos hooks (R09 — usar importlib.util):\n\
    \  Importar HookRegistry de neocortex/core/hooks/NC-HK-FR-001-hook-registry.py\n\
    \  Importar hooks de neocortex/core/hooks/NC-HK-FR-002-simple-hook.py\n\nSingleton:\
    \ o HookRegistry deve ser um singleton — usar _registry global no módulo.\nNa\
    \ inicialização, registrar LoggingHook e TimingHook automaticamente.\n\nPadrão:\
    \ seguir EXATAMENTE estrutura de NC-TOOL-FR-029-health.py\nMínimo: 100 linhas\n"
