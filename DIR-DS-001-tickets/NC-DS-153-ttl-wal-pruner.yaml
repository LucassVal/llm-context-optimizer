  - "python -m py_compile 05_examples/NC-TEST-153-ttl-wal-prune.py → PASS"
  - "python -m ruff check scripts/NC-SCR-FR-148-wal-ttl-pruner.py --select F,E9 → 0"
  - "python -m ruff check 05_examples/NC-TEST-153-ttl-wal-prune.py --select F,E9 → 0"
  - "python scripts/NC-SCR-FR-148-wal-ttl-pruner.py --days 30 → exit 0"
  - "python 05_examples/NC-TEST-153-ttl-wal-prune.py → PASS em todos os checks"
  - "git diff --name-only HEAD | grep -E 'server\\.py|sub_server\\.py' → VAZIO"

