research_context: "Pixel Agents é uma extensão VS Code open-source que visualiza agentes\
  \ IA como\npersonagens pixel-art em um escritório virtual.\nGitHub: https://github.com/pablodelucca/pixel-agents\n\
  VS Code Marketplace: pablodelucca.pixel-agents\nRepositório clonado localmente em:\n\
  \  DIR-RES-CC-001-claude-leak-workzone\\external-refs\\pixel-agents\\\n\nFUNCIONALIDADES\
  \ CONFIRMADAS:\n- 1 agente = 1 personagem pixel-art único no escritório\n- Live\
  \ activity tracking: typing (escrevendo código), reading (buscando arquivos),\n\
  \  waiting (aguarda input), running (executando comandos)\n- Office Layout Editor:\
  \ editor de escritório com floors, walls, furniture\n- Speech bubbles: indica quando\
  \ agente aguarda/precisa de permissão\n- Sound notifications: chime quando agente\
  \ termina seu turno\n- Sub-agent visualization: Task tool spawna personagens filhos\
  \ ligados ao pai\n- Persistent layouts: salvo entre sessões VS Code\n- External\
  \ asset directories: furniture packs customizados\n- 6 personagens (baseados em\
  \ JIK-A-4 Metro City pack)\n- COMO FUNCIONA: lê arquivos JSONL transcript do Claude\
  \ Code (~/.claude/projects/)\n  parseando em tempo real para animar personagens\n\
  - NÃO modifica o Claude Code — é observador passivo\n- Stack: TypeScript, VS Code\
  \ Extension API, esbuild\n\nLIMITAÇÃO CRÍTICA para NeoCortex:\n- Hoje suporta APENAS\
  \ Claude Code (lê JSONL de ~/.claude/projects/)\n- DeepSeek/OpenCode gera logs em\
  \ formato diferente\n- BRIDGE NECESSÁRIA: converter logs OpenCode → JSONL compatível\
  \ Claude Code\n\nINTEGRAÇÃO COM NEOCORTEX (contexto T0):\n- Criar NC-SCR-FR-016-opencode-jsonl-bridge.py:\n\
  \  lê logs dos agentes OpenCode e converte para JSONL que Pixel Agents entende\n\
  - Porta WebSocket: :8767 (onde Pixel Agents se conecta para receber eventos)\n-\
  \ DDD: Pixel Agents = Adaptador Primário (observador de eventos do domínio)\n- HookRegistry\
  \ (NC-HK-FR-001) pode emitir eventos → bridge → Pixel Agents\n- Adicionar aba \"\
  Pixel Agents\" no neocortex_hud.py com WebView\n"
