# ╔══════════════════════════════════════════════════════════════╗
# ║  MAPA 4: ROTINAS DE PENSAMENTO (70 Conceitos -> Acao IA)  ║
# ╚══════════════════════════════════════════════════════════════╝

thinking_routines:
  description: >
    Rotinas de raciocinio obrigatorias para o assistente IA.
    Baseadas nos 70 conceitos do Mapeamento Linear + regras NeoCortex.
    Toda resposta DEVE passar por estas rotinas na ordem.

  # ─── ROTINA 0: BOOT (antes de qualquer acao) ───
  routine_0_boot:
    name: "STEP 0 — Verificacao de Ambiente"
    concepts: [R21, R09]
    steps:
      - "python --version (verificar)"
      - "Test-Path arquivo_alvo (R21: nao supor que existe)"
      - "python -m ruff --version (verificar)"
      - "Carregar @ULQ (dicionario de simbolos)"
      - "Carregar @BOOT (manifesto do sistema)"
    gate: "FAIL se qualquer verificacao falhar"

  # ─── ROTINA 1: RECEBER (entender o pedido) ───
  routine_1_receive:
    name: "3W — What / Why / Where"
    concepts: [R42]
    steps:
      - "WHAT: O que o usuario esta pedindo exatamente?"
      - "WHY: Qual a evidencia? O que ja existe sobre isso?"
      - "WHERE: Onde se aplica no sistema? Qual dominio ULQ?"
    gate: "NAO avancar sem responder os 3 W's"

  # ─── ROTINA 2: PRIORIZAR ───
  routine_2_prioritize:
    name: "Eisenhower + Pareto"
    concepts: [R45, R46]
    decision_matrix: |
      URGENTE+IMPORTANTE -> Fazer agora (HIGH)
      IMPORTANTE+NAO_URG -> Agendar (MEDIUM)
      URGENTE+NAO_IMPORT -> Delegar (COURIER/ENGINEER)
      NAO_URG+NAO_IMPORT -> Eliminar ou LOW
    pareto_check: "20% das causas = 80% dos problemas? Focar nos 20%."

  # ─── ROTINA 3: INVESTIGAR (se algo parece errado) ───
  routine_3_investigate:
    name: "5 Porques (RCA)"
    concepts: [R41]
    steps:
      - "Por que X aconteceu? -> Y"
      - "Por que Y? -> Z"
      - "Por que Z? -> W"
      - "Por que W? -> V"
      - "Por que V? -> CAUSA RAIZ"
    gate: "NAO parar antes de chegar a causa raiz"

  # ─── ROTINA 4: PLANEJAR (antes de codificar) ───
  routine_4_plan:
    name: "KISS + DRY + Fail-Fast"
    concepts: [R53, R50, R51]
    kiss_check: "Minha solucao tem < 2500 caracteres? Se nao, esta complexa demais."
    dry_check: "Este codigo/arquivo ja existe em outro lugar? DRY: nao duplicar."
    failfast_check: "Validar inputs ANTES de processar. Rejeitar invalidos imediatamente."
    idempotency_check: "Se rodar 2x, o resultado e o mesmo? Sem efeitos colaterais duplicados."

  # ─── ROTINA 5: EXECUTAR ───
  routine_5_execute:
    name: "PDCA + Kaizen"
    concepts: [R48, R52]
    steps:
      - "Plan: O que vou fazer?"
      - "Do: Executar"
      - "Check: Ruff passou? Compilou? Teste rodou?"
      - "Act: Se falhou, corrigir. Se passou, registrar no Kaizen."
    kaizen: "Micro-melhoria registrada? O que aprendi?"

  # ─── ROTINA 6: VERIFICAR ───
  routine_6_verify:
    name: "Pipeline de Verificacao por Tipo"
    concepts: [R124, R112, R113, R114, R115]
    matrix:
      py: "ruff -> ruff format -> mypy -> py_compile -> bandit -> secret scan"
      yaml: "yaml.safe_load -> naming -> secret scan"
      mdc: "frontmatter YAML -> NC-READ-HASH -> naming"
    gate: "FAIL-FAST: qualquer erro BLOQUEIA"

  # ─── ROTINA 7: ENTREGAR ───
  routine_7_deliver:
    name: "Handoff + 3W + SSOT Header"
    concepts: [R12, R42, R117]
    steps:
      - "Gerar handoff YAML em DIR-DS-002-audit-logs/"
      - "3W no summary: What foi feito? Why (evidencia)? Where (dominio ULQ)?"
      - "Atualizar @SSOT se criou/modificou arquivos"
      - "Marcar %DONE no @ROADMAP"
      - "Emitir SSOT Header"
    gate: "NAO encerrar sem handoff"

  # ─── ROTINA 8: REFLETIR (pos-acao) ───
  routine_8_reflect:
    name: "OKRs + ROI + BSC"
    concepts: [R47, R57, R54]
    okr_check: "Essa acao avancou algum Objective? Qual Key Result foi impactado?"
    roi_check: "O custo (tokens/tempo) justificou o resultado?"
    bsc_check: "Impacto em: Custo? Usuario? Processo? Aprendizado?"

  # ─── ORDEM DE EXECUCAO DAS ROTINAS ───
  execution_order:
    always: ["R0_BOOT", "R1_3W"]
    on_receive: ["R0_BOOT", "R1_3W", "R2_EISENHOWER"]
    on_investigate: ["R0_BOOT", "R1_3W", "R3_RCA"]
    on_plan: ["R0_BOOT", "R1_3W", "R4_KISS_DRY"]
    on_execute: ["R0_BOOT", "R5_PDCA", "R6_VERIFY"]
    on_deliver: ["R7_HANDOFF", "R8_OKR_ROI"]
    on_error: ["R0_BOOT", "R3_RCA", "R5_PDCA"]

