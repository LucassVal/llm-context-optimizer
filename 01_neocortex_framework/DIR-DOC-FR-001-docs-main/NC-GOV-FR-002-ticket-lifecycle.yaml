# ─────────────────────────────────────────────────────────────────────────────
# ESTÁGIOS DO CICLO DE VIDA
# ─────────────────────────────────────────────────────────────────────────────
lifecycle_stages:
  creation:
    id: "STAGE-01"
    description: "Identificar necessidade e criar ticket YAML"
    required_fields:
      - "id"
      - "title"
      - "task"
      - "entry_state"
      - "exit_state"
      - "integrity_hash"
    validation_script: "NC-SCR-FR-006-ticket-validator.py"
    success_criteria: "Ticket criado com integrity_hash válido"

  opening:
    id: "STAGE-02"
    description: "Colocar ticket em estado pronto para execução"
    actions:
      - "add_to_queue: NC-CFG-DS-004-task-queue.yaml"
      - "assign_to_agent"
      - "update_bootup_section_9_if_critical"
      - "CREATE_DISPATCH_YAML_OBRIGATORIO"  # ← R24 — ver dispatch_protocol abaixo
    validation: "Ticket aparece na fila (se aplicável)"
    dispatch_yaml_rule: |
      OBRIGATÓRIO antes de despachar qualquer agente T1:
      Criar NC-DS-AGT-{ID}-dispatch-{tickets}.yaml em DIR-DS-001-tickets/
      usando template NC-TPL-FR-002-agent-dispatch.yaml.
      Sem dispatch YAML = despacho inválido (R24).

  verification:
    id: "STAGE-03"
    description: "Validar pré-condições (entry_state) antes de executar"
    checks:
      - "files_exist: todos os arquivos listados existem"
      - "files_must_not_exist: nenhum arquivo proibido existe"
      - "active_locks: locks atômicos intactos"
    validation_script: "NC-SCR-FR-006-ticket-validator.py"
    block_if_fail: true

  execution:
    id: "STAGE-04"
    description: "Realizar trabalho descrito no ticket"
    actions:
      - "follow_task_description"
      - "respect_barriers"
      - "update_ssot_if_creates_renames"
      - "run_lint_typecheck"
    success_criteria: "exit_state alcançado"

  closure:
    id: "STAGE-05"
    description: "Gerar handoff como evidência de conclusão"
    required_artifacts:
      - "handoff_yaml: DIR-DS-002-audit-logs/NC-DS-*-handoff-*.yaml"
    required_fields:
      - "ticket_id"
      - "status"
      - "timestamp"
      - "summary"
      - "checklist_r20"
    status_options:
      - "APPROVED"
      - "PARTIALLY_COMPLETED"
      - "FAILED"
      - "CANCELLED"

# ─────────────────────────────────────────────────────────────────────────────
# CLASSIFICAÇÃO DE TICKETS ÓRFÃOS
# ─────────────────────────────────────────────────────────────────────────────
orphan_classification:
  template:
    criterion: "Contém 'Ticket de Exemplo' ou 'Copie e adapte'"
    action: "keep_as_reference"
    rename_suggestion: "TEMPLATE-*.yaml"

  placeholder:
    criterion: "task.description vazio ou 'TODO'/'TBD'"
    action: "complete_or_archive"
    max_age_days: 30

  active:
    criterion: "Possui integrity_hash e task definida"
    action: "create_handoff_or_mark_cancelled"
    priority: "high"

  incomplete:
    criterion: "Falta campos obrigatórios ou estrutura inválida"
    action: "fix_or_delete"
    max_age_days: 7

# ─────────────────────────────────────────────────────────────────────────────
# PROTOCOLO DE AUDITORIA (CICLO 4)
# ─────────────────────────────────────────────────────────────────────────────
audit_protocol:
  frequency: "weekly"
  scripts:
    - "audit_tickets.py"
    - "classify_tickets.py"
    - "NC-SCR-FR-066-bootup-sync.py"
  outputs:
    - "DIR-DS-002-audit-logs/ticket_audit_report.md"
    - "DIR-DS-002-audit-logs/ticket_classification_report.md"
    - "DIR-DS-002-audit-logs/active_orphaned_tickets.md"
  actions:
    - "identify_orphans"
    - "classify_orphans"
    - "resolve_orphans"
    - "update_bootup"

# ─────────────────────────────────────────────────────────────────────────────
# INTEGRAÇÃO COM BOOTUP
# ─────────────────────────────────────────────────────────────────────────────
bootup_integration:
  section_6_frentes_ativas:
    rule: "Apenas tickets com handoff APPROVED nos últimos 7 dias"
    update_script: "NC-SCR-FR-066-bootup-sync.py"
    frequency: "end_of_cycle_3"

  section_9_tickets_criticos:
    rule: "Tickets bloqueantes pré-MCP (SAVE-005, ORCH-301, ORCH-302)"
    update_manual: true

