task: '**OBJETIVO**: Construir um Knowledge Graph vetorial para o projeto NeoCortex
  usando LanceDB como motor de vetorização e ChromaDB para embeddings. Implementar
  pipeline robusto de indexação semântica dos arquivos do projeto (.py, .md, .json,
  .yaml, .yml) com extração de metadados YAML frontmatter e chunking otimizado.


  **CONQUISTAS**:

  1. Correção completa do VectorEngine (LanceDBVectorEngine, RAGVectorEngine)

  2. Implementação do Knowledge Graph Builder com pipeline batch otimizado

  3. Indexação de 258 arquivos → 14.772 chunks vetoriais

  4. Resolução de múltiplos problemas técnicos críticos

  5. Testes de validação e diagnóstico executados com sucesso


  **PROBLEMAS IDENTIFICADOS E RESOLVIDOS** (R21 - Zero Suposições):

  - Problema de serialização JSON no LanceDB: Metadados precisam ser serializados
  como strings JSON e desserializados na leitura

  - Função json_extract requer CAST: No LanceDB, a função `json_extract` exige `CAST(metadata
  AS BLOB)` para trabalhar com strings

  - Frontmatter parsing inconsistente: Alguns arquivos retornam strings em vez de
  dicionários do parser YAML

  - Embedding ChromaDB retorna ndarray: A função de embedding do Chroma retorna `numpy.ndarray`
  que precisa ser convertido para `list[float]`

  - Tabela LanceDB pode ser None: Inicialização assíncrona pode deixar `self._table`
  como None, requerendo método `_ensure_table()`

  - Índice IVF_PQ falha para tabelas pequenas: LanceDB lança warning quando tenta
  criar índice em tabelas com poucos vetores


  **AJUSTES APLICADOS**:

  - Adicionado método `_ensure_table()` para inicialização robusta do LanceDB

  - Corrigida serialização/desserialização JSON de metadados (json.dumps/json.loads)

  - Implementado `CAST(metadata AS BLOB)` nas queries com json_extract

  - Validação de frontmatter YAML (garantir dict, não string)

  - Conversão automática ndarray→list[float] para embeddings ChromaDB

  - Pipeline de embedding otimizado com processamento em lotes (batch_size=20)

  - Tratamento de warning IVF_PQ para tabelas pequenas

  - Logs de progresso detalhados durante indexação

  - Respeito à Zona de Quarentena (ignorar diretórios legados)


  **IMPACTO**: Knowledge Graph vetorial operacional, permitindo buscas semânticas
  em toda a base de código NeoCortex.


  **EVIDÊNCIAS**: Handoff correspondente em `DIR-DS-002-audit-logs/NC-DS-064-handoff-knowledge-graph-consolidated.yaml`.

  '
