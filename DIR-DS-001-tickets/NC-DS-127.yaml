task: |
  Implementar sistema de lineage de dados (proveniência de contexto) para rastrear origem e transformações de dados no NeoCortex.
  
  Objetivos:
  1. Criar NC-SVC-FR-023-lineage-service.py que registra:
     - Origem de dados (arquivo, API, tool call)
     - Transformações aplicadas (compressão, extração, conversão)
     - Agente responsável e timestamp
     - Hash de integridade do dado
  
  2. Integrar com HookRegistry para capturar automaticamente:
     - PreToolUse: registrar origem
     - PostToolUse: registrar transformação
     - ToolError: registrar falha
  
  3. Criar ferramenta MCP NC-TOOL-FR-045-lineage.py com ações:
     - lineage.trace: rastrear proveniência de um dado
     - lineage.export: exportar lineage como grafo
     - lineage.validate: validar integridade da cadeia
  
  4. Integrar com MetricsStore para análise de qualidade de dados

