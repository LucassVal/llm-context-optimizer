tasks:
  - id: T1
    title: "Criar NC-SVC-FR-022-confidence-review.py"
    priority: P0
    write_zone: "CORE → neocortex/core/services/NC-SVC-FR-022-confidence-review.py"
    steps:
      - |
        Criar ConfidenceReviewService com 5 validadores:
          V1: naming_check — arquivo tem prefix NC-? (R01) → peso 20
          V2: py_compile — arquivo compila? → peso 25
          V3: ruff_check — 0 erros ruff? → peso 20
          V4: locks_check — nenhum @LOCK modificado? → peso 25
          V5: ssot_updated — changelog referenciado? → peso 10
        Score = soma dos pesos dos validadores que passaram (0-100)
        >80: auto-aprovado | 50-80: manual | <50: rejeitado
      - "py_compile → PASS, ruff → 0 erros"
    validation:
      - "py_compile → PASS, ruff → 0 erros"
      - "Testar com handoff válido → score >80"

  - id: T2
    title: "Criar NC-CFG-FR-002-feature-flags.py + .nc/feature-flags.yaml"
    priority: P1
    write_zone: "CORE → neocortex/config/ | CONFIG → .nc/feature-flags.yaml"
    steps:
      - |
        Criar FeatureFlagService:
          flags carregados de .nc/feature-flags.yaml
          cache TTL=3600s
          is_enabled(flag: str) → bool
          refresh(flag: str) → força reload
      - |
        Criar .nc/feature-flags.yaml:
          persistent_worker: false
          confidence_review: true
          channel_notifications: false
          pulsedaemon_event_driven: false
          mcp_resources: false
      - "py_compile → PASS, ruff → 0 erros"
    validation:
      - "FeatureFlagService.is_enabled('confidence_review') → True"
      - "py_compile → PASS"

  - id: T3
    title: "Wire ConfidenceReviewService no pipeline de handoff"
    priority: P1
    write_zone: "CORE → neocortex/mcp/tools/NC-SUPER-005-governance.py (action handoff.create)"
    steps:
      - "No action handoff.create: chamar ConfidenceReviewService.score(handoff)"
      - "Adicionar score ao output: {'score': 85, 'decision': 'auto_approved'}"
      - "Se score <50: retornar erro 'Handoff rejeitado (score: X)'"
    validation:
      - "handoff.create com handoff válido retorna score >0"
      - "py_compile NC-SUPER-005 → PASS"

