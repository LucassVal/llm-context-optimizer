task: |
  Implementar serviço base LEXICO-001 (NC-SVC-FR-020 LexicoService) para compressão semântica de contexto.
  
  Objetivos:
  1. Criar NC-SVC-FR-020-lexico-service.py com:
     - Dicionário de ~200 átomos semânticos (versão reduzida para bootstrap)
     - Operações CRUD para gerenciamento de átomos
     - Busca por similaridade semântica
     - Persistência em JSON com versionamento
     - Integração com EventBus para notificações
  
  2. Implementar funcionalidades de compressão:
     - Substituição de frases por átomos (#ARCH → architecture)
     - Expansão de átomos para texto original
     - Cálculo de economia de tokens (50-90% target)
     - Cache de compressões frequentes
  
  3. Criar ferramenta MCP NC-TOOL-FR-049-lexico.py com ações:
     - lexico.compress: comprimir texto usando dicionário
     - lexico.expand: expandir texto comprimido
     - lexico.stats: mostrar estatísticas de compressão
     - lexico.manage: gerenciar átomos do dicionário
  
  4. Integrar com:
     - ContextBuddy para redução automática de contexto
     - SessionMemoryWriter para compressão de memória
     - Knowledge Graph para enriquecimento semântico

