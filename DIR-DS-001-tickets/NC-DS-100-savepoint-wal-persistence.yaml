    1. Ler NC-SVC-FR-003-savepoint-stub.py — entender SavePoint + SavePointService
    2. Ler NC-SVC-FR-016-wal-service.py — entender API: log_event(), query_events()
    3. Modificar NC-SVC-FR-003:
       a. SavePointService.create() → além de in-memory, chamar wal.log_event(
            event_type='savepoint_create', data=savepoint.to_dict())
       b. SavePointService.list_active() → merge memória + wal.query_events(
            event_type='savepoint_create', since=now-ttl)
       c. SavePointService.rollback(id) → wal.log_event(event_type='savepoint_rollback')
       d. SavePointService.discard(id) → wal.log_event(event_type='savepoint_discard')
    4. NC-SVC-FR-016 carregado via importlib.util (R09)
    5. Fallback gracioso: se WAL indisponível, continuar com in-memory + logger.warning
    6. py_compile NC-SVC-FR-003-savepoint-stub.py sem erros após alteração

