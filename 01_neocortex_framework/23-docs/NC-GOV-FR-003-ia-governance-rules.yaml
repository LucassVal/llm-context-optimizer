      - id: "R27"
        name: "Processo de Evolução Constitucional"
        description: "Evolução constitucional deve seguir processo formal com pre-check e aprovação"
        severity: "high"
        enforcement_mechanism: "cf.pre_check obrigatório para emendas constitucionais"
        validation_method: "Verificar uso de cf.pre_check para emendas"
        status: "new_active"
        implementation_date: "2026-04-22"
        artifacts:
