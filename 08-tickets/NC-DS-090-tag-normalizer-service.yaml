context:
  origin: Diagnóstico sessão 2026-04-16
  problem: 'Símbolos ubíquos (@, $, %) estão sendo usados em lobos .mdc, YAMLs e

    templates sem qualquer validação contra o dicionário SSOT (NC-DOC-FR-001).

    Grep confirmou: 8 arquivos de lobe usam @/$/% sem validação.

    NC-SCR-FR-009 e NC-SCR-FR-011 são sanitizadores pontuais — não há pipeline

    universal de normalização.

    '
  gap: Nenhum mecanismo valida se símbolos ubíquos são canônicos.
task:
  description: "Criar NC-SVC-FR-018-tag-normalizer.py em:\n  01_neocortex_framework/neocortex/core/services/\n\
    \nO serviço deve:\n1. Carregar NC-DOC-FR-001-ubiquitous-language-dictionary.md\
    \ como SSOT\n   - Extrair todas as entradas da tabela @, $, % em memória\n   -\
    \ Formato: dict {simbolo: {expande_para, caminho_real}}\n\n2. scan(path: str |\
    \ Path, recursive=False) -> ScanResult\n   - Localiza todos os padrões @[A-Z]+,\
    \ $[A-Z_]+, %[A-Z_]+ no arquivo/dir\n   - Retorna: {found: [...], invalid: [...],\
    \ unknown: [...]}\n   - \"invalid\" = símbolo existe no dict mas casing errado\n\
    \   - \"unknown\" = símbolo não existe no dict\n\n3. normalize(path: str | Path)\
    \ -> NormalizeResult\n   - Corrige casing de tags em frontmatter YAML (_genealogy.tags)\n\
    \   - Regra: tags em minúsculas, sem espaços\n   - Retorna: {changed: int, diff:\
    \ [...]}\n   - WAL-logged via NC-SVC-FR-016\n\n4. validate_lobe(path: str | Path)\
    \ -> ValidationResult\n   - Verifica campos obrigatórios de frontmatter .mdc:\
    \ name, description, type\n   - Verifica que todos os símbolos ubíquos no corpo\
    \ existem em NC-DOC-FR-001\n   - Retorna: {valid: bool, violations: [...]}\n\n\
    5. CLI:\n   python NC-SVC-FR-018-tag-normalizer.py scan <path> [--recursive]\n\
    \   python NC-SVC-FR-018-tag-normalizer.py fix <path> [--dry-run]\n   python NC-SVC-FR-018-tag-normalizer.py\
    \ validate <path>\n   python NC-SVC-FR-018-tag-normalizer.py stats\n\nDependências:\
    \ stdlib apenas (re, pathlib, yaml/json, hashlib)\nIntegração WAL: via import_pattern\
    \ idêntico ao NC-DS-089\n"
  import_pattern_wal: 'import importlib.util

    from pathlib import Path


    _wal_path = Path(__file__).resolve().parents[2] / "core/services/NC-SVC-FR-016-wal-service.py"

    _spec = importlib.util.spec_from_file_location("wal_service", _wal_path)

    _mod = importlib.util.module_from_spec(_spec)

    _spec.loader.exec_module(_mod)

    WALService = _mod.WALService

    '
  ssot_path: "# NC-DOC-FR-001 está em:\n_dict_path = Path(__file__).resolve().parents[3]\
    \ / \\\n    \"DIR-DOC-FR-001-docs-main/NC-DOC-FR-001-ubiquitous-language-dictionary.md\"\
    \n"
  verification: 'python -m py_compile NC-SVC-FR-018-tag-normalizer.py && echo OK

    python NC-SVC-FR-018-tag-normalizer.py scan 01_neocortex_framework/lobes/ --recursive

    # Deve reportar os 8 arquivos com símbolos ubíquos

    python NC-SVC-FR-018-tag-normalizer.py stats

    '
  instrucoes_handoff: 'Salvar em: DIR-DS-002-audit-logs/NC-DS-090-handoff-YYYYMMDDTHHMMSS.yaml

    '
  checklist_r20:
    naming_convention: true
    no_print_statements: true
    ssot_updated: true
    no_locked_files_modified: true
    handoff_yaml_complete: true
