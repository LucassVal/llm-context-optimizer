context:
  gap: "G02"
  origin: "NC-SVC-FR-014-dry-run-preview.py existe (SAVE-005) mas não intercepta writes"
  problem: |
    O middleware de dry-run foi implementado como serviço isolado mas nunca foi
    integrado no pipeline de tools. Operações de escrita ocorrem sem preview/validação.
    NC-TOOL-FR-034-dry-run.py existe mas não chama NC-SVC-FR-014 antes de writes.

task:
  description: |
    1. Ler NC-SVC-FR-014-dry-run-preview.py e entender API: preview(), risk_level
    2. Ler NC-TOOL-FR-034-dry-run.py — identificar onde integrar o middleware
    3. Integrar NC-SVC-FR-014 em NC-TOOL-FR-034:
       - Antes de qualquer write op: chamar preview(path, content)
       - Se risk == 'high': bloquear e retornar erro com diff
       - Se risk == 'medium': logar aviso via logger (não print)
       - Se risk == 'low': prosseguir normalmente
    4. Garantir que NC-SVC-FR-014 é carregado via importlib.util (R09)
    5. Adicionar log WAL via NC-SVC-FR-016 para operações bloqueadas
    6. Testar com arquivo mock: write op de risco alto deve ser bloqueada

  acceptance_criteria:
    - "NC-TOOL-FR-034 chama DryRunPreview antes de writes"
    - "Operação de risco 'high' é bloqueada com mensagem de erro + diff"
    - "Zero print() — usar logger"
    - "WAL registra bloqueios"
    - "py_compile NC-TOOL-FR-034-dry-run.py sem erros"

