# WHAT: Substituir o workaround atual de stdout para confirmação T0 por elicitation MCP nativo + logging via protocolo
# WHY: O stdout hack atual é frágil, não-conforme com spec MCP, e quebra clients que usam stdio como canal JSON-RPC
# WHERE: 01_neocortex_framework/neocortex/mcp/elicitation.py + neocortex/mcp/logging.py (novos módulos)

ticket_id: NC-DS-257
title: "MCP Elicitation + Logging — Implementar elicitation/create (confirmação T0 nativa, substituir stdout hack) + logging/setLevel + notifications/message"
status: DONE
