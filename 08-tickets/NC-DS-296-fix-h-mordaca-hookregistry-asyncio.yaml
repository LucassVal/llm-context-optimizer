three_w:
  who: "HookRegistry (NC-HK-FR-001) + neocortex_security (NC-SUPER-008) + MCP server startup"
  what: |
    Corrigir o conflito asyncio que impede a inicialização do HookRegistry.
    Erro atual: health_check retorna hook_registry: ERROR — 'This event loop is already running'.
    A mordaça H (Gateway.validate_action — 17 checks instantâneos) está OFFLINE.
    Regras R05 e R06 sem fallback C — gap de contenção ativo.
  why: |
    A mordaça H é a única camada de enforcement instantâneo (pré-execução) das 133 regras.
    Com H offline, R05 (NUNCA Deletar) e R06 (Write Zones) têm apenas S e U como contenção —
    nenhuma delas opera em tempo real. Risco de escrita destrutiva não bloqueada.

rca:
  symptom: "health_check retorna hook_registry: ERROR 'This event loop is already running'"
  why_1: "O MCP server roda dentro de um event loop asyncio (FastMCP stdio transport)"
  why_2: "O código de inicialização do HookRegistry ou do hook.register chama asyncio.run() dentro do loop ativo"
  why_3: "asyncio.run() cria um novo event loop, mas não pode rodar dentro de um loop já existente"
  why_4: "NC-HK-FR-001 foi projetado para inicialização síncrona, sem adaptação para contexto asyncio"
  why_5: "A integração do HookRegistry no MCP server nunca passou por teste de inicialização em contexto async"
  root_cause: "asyncio.run() chamado dentro de coroutine ativa — incompatibilidade de contexto de execução"
  corrective_action: |
    Localizar o ponto de inicialização do HookRegistry no MCP server.
    Substituir asyncio.run(init_hooks()) por await init_hooks() (se async) ou
    mover a inicialização para o bloco síncrono de startup (antes do loop iniciar).
    Alternativa KISS: usar asyncio.get_event_loop().run_until_complete() apenas se fora de coroutine.
  preventive_action: |
    Adicionar ao health_check um teste ativo do hook_registry (já previsto em NC-DS-259 / R127 MURPHY).
    Documentar no NC-HK-FR-001 que a inicialização DEVE ocorrer no startup síncrono do server.

swot:
  strengths:
    - "HookRegistry usa threading.Lock + ThreadPoolExecutor — compatível com asyncio se inicializado corretamente"
    - "neocortex_security hook.list/hook.register funcionam — a infra existe"
    - "Mordaça C (PulseScheduler 300s) ainda ativa como fallback"
  weaknesses:
    - "H mordaça OFFLINE — 17 checks instantâneos não executam"
    - "R05 e R06 sem contenção em tempo real"
    - "Zero hooks registrados no sistema atual"
  opportunities:
    - "Fix simples — mover 1-3 linhas de código de lugar"
    - "Após fix, registrar hooks para R01, R04, R05, R06 imediatamente"
  threats:
    - "Enquanto H offline, agente pode sobrescrever @LOCKS sem bloqueio imediato"
    - "Erro silencioso — health_check degraded mas MCP continua servindo"

kiss:
  approach: "Mover inicialização do HookRegistry para fora do event loop asyncio — mudança de 1-5 linhas"
  lines_changed: "5-15 linhas no arquivo de startup do MCP"
