task: |
  Implementar sistema de Lobe Cards automatizados para visualização e gerenciamento de lobes de memória.
  
  Objetivos:
  1. Criar NC-SCR-FR-115-lobe-cards.py que:
     - Analisa automaticamente diretório 02_memory_lobes/
     - Gera cards visuais (Markdown + HTML) para cada lobe
     - Inclui metadata: tamanho, última atualização, tags, categorias
     - Cria índice navegável de todos os lobes
  
  2. Integrar com:
     - Knowledge Graph para relacionamentos entre lobes
     - LexicoService para compressão de descrições
     - SemanticCataloger para categorização automática
     - MetricsStore para estatísticas de uso
  
  3. Criar ferramenta MCP NC-TOOL-FR-048-lobe-cards.py com ações:
     - lobe_cards.generate: gerar cards para lobes específicos
     - lobe_cards.refresh: atualizar cards existentes
     - lobe_cards.export: exportar como HTML/PDF
     - lobe_cards.stats: mostrar estatísticas de lobes
  
  4. Implementar features:
     - Busca full-text em conteúdo dos lobes
     - Visualização de relacionamentos (grafo)
     - Filtros por categoria, tags, data
     - Integração com Mission Control para dashboard

