research_context: |
  Pixel Agents é uma extensão VS Code open-source que visualiza agentes IA como
  personagens pixel-art em um escritório virtual.
  GitHub: https://github.com/pablodelucca/pixel-agents
  VS Code Marketplace: pablodelucca.pixel-agents
  Repositório clonado localmente em:
    DIR-RES-CC-001-claude-leak-workzone\external-refs\pixel-agents\

  FUNCIONALIDADES CONFIRMADAS:
  - 1 agente = 1 personagem pixel-art único no escritório
  - Live activity tracking: typing (escrevendo código), reading (buscando arquivos),
    waiting (aguarda input), running (executando comandos)
  - Office Layout Editor: editor de escritório com floors, walls, furniture
  - Speech bubbles: indica quando agente aguarda/precisa de permissão
  - Sound notifications: chime quando agente termina seu turno
  - Sub-agent visualization: Task tool spawna personagens filhos ligados ao pai
  - Persistent layouts: salvo entre sessões VS Code
  - External asset directories: furniture packs customizados
  - 6 personagens (baseados em JIK-A-4 Metro City pack)
  - COMO FUNCIONA: lê arquivos JSONL transcript do Claude Code (~/.claude/projects/)
    parseando em tempo real para animar personagens
  - NÃO modifica o Claude Code — é observador passivo
  - Stack: TypeScript, VS Code Extension API, esbuild

  LIMITAÇÃO CRÍTICA para NeoCortex:
  - Hoje suporta APENAS Claude Code (lê JSONL de ~/.claude/projects/)
  - DeepSeek/OpenCode gera logs em formato diferente
  - BRIDGE NECESSÁRIA: converter logs OpenCode → JSONL compatível Claude Code

  INTEGRAÇÃO COM NEOCORTEX (contexto T0):
  - Criar NC-SCR-FR-016-opencode-jsonl-bridge.py:
    lê logs dos agentes OpenCode e converte para JSONL que Pixel Agents entende
  - Porta WebSocket: :8767 (onde Pixel Agents se conecta para receber eventos)
  - DDD: Pixel Agents = Adaptador Primário (observador de eventos do domínio)
  - HookRegistry (NC-HK-FR-001) pode emitir eventos → bridge → Pixel Agents
  - Adicionar aba "Pixel Agents" no neocortex_hud.py com WebView

