model_list:
  # ── Tier STF/STJ: Raciocínio profundo ──
  # ── Tier STF/STJ: Raciocínio profundo ──
  - model_name: deepseek-v4-pro
    litellm_params:
      model: deepseek/deepseek-v4-pro
      api_key: sk-a8efbc7d94ac4636ae2c1aae55a4916e

  # ── Tier TJ: Orquestração técnica (+ fallback do v4-pro) ──
  - model_name: deepseek-v4-flash
    litellm_params:
      model: deepseek/deepseek-v4-flash
      api_key: sk-a8efbc7d94ac4636ae2c1aae55a4916e

  # ── Tier Fórum: Worker braçal 24/7 (RTX 3050 CUDA :11434) ──
  - model_name: qwen-1.5b
    litellm_params:
      model: ollama/qwen2.5-coder:1.5b-instruct
      api_base: http://localhost:11434

  # ── Tier TJ local: Técnico offline (RTX 3050 4GB via Ollama :11434) ──
  - model_name: qwen-3b
    litellm_params:
      model: ollama/qwen2.5-coder:3b-instruct
      api_base: http://localhost:11434

  # ── Fallback chain: se DeepSeek API cair → qwen-3b → qwen-1.5b ──
  - model_name: deepseek-v4-flash-with-fallback
    litellm_params:
      model: deepseek/deepseek-v4-flash
      api_key: sk-a8efbc7d94ac4636ae2c1aae55a4916e
    model_info:
      fallbacks: ["qwen-3b", "qwen-1.5b"]

router_settings:
  routing_strategy: simple-shuffle  # load balance entre workers do mesmo tier
  num_retries: 2
  timeout: 60
  fallbacks:
    - deepseek-v4-pro: ["deepseek-v4-flash", "qwen-3b"]
    - deepseek-v4-flash: ["qwen-3b", "qwen-1.5b"]

general_settings:
  master_key: sk-my-master-key-123
  # Budget por dia (USD) — alerta quando atingir 80%
  max_budget: 5.0
  budget_duration: 1d
  # Logging para MetricsStore do NeoCortex
  store_model_in_db: false