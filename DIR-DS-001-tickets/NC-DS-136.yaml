task: |
  Implementar NC-SVC-FR-021 SessionMemoryWriter para registro automático de turns de conversação e geração de hot summaries.
  
  Objetivos:
  1. Criar NC-SVC-FR-021-session-memory-writer.py que:
     - Registra cada turn user→ai automaticamente (turn.record)
     - Gera hot summaries periódicos (session.hot)
     - Compressão via LexicoService para economia de tokens
     - Persistência em lobes com metadata estruturada
  
  2. Integrar com:
     - HookRegistry para captura automática (on_response)
     - LexicoService para compressão semântica
     - MetricsStore para estatísticas de uso
     - EventBus para notificações
  
  3. Criar ferramenta MCP NC-TOOL-FR-044-memory-auto.py com ações:
     - memory_auto.record: registrar turn manualmente
     - memory_auto.summarize: gerar hot summary
     - memory_auto.stats: mostrar estatísticas de memória
     - memory_auto.export: exportar memória da sessão
  
  4. Implementar features:
     - Limite de tamanho por sessão (TTL automático)
     - Categorização automática por tópico
     - Busca full-text em memórias
     - Integração com Knowledge Graph

