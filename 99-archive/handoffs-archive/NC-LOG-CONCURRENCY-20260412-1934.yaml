problems: |
  1. Conflitos de escrita no YAML central
     - Múltiplos workers lendo/escrevendo NC-CFG-DS-004-task-queue.yaml simultaneamente
     - Protocolo "atomic-ish" (claim via timestamp) falha sob alta concorrência
     - Erros "File has been modified since it was last read" frequentes
  
  2. Inconsistências de estado
     - NC-DS-016: status ACTIVE mas completed_at: "2026-04-12T18:34:46"
     - Vários campos claimed_by com formatos inconsistentes (timestamp vs worker-ID)
  
  3. Falta de atomicidade real
     - Janela de 5s entre claim e verificação é grande para N workers
     - Race conditions: worker A lê AVAILABLE, worker B também lê AVAILABLE, ambos tentam claim
  
  4. Dificuldade de debug
     - Sem logs centralizados de operações de fila
     - Não há rastreamento de quem modificou o YAML e quando

suggestions: |
  SUGESTÕES PARA MELHORIA DA FILA
  
  Opção 1: Banco de dados leve (recomendado)
  - Usar SQLite com tabela `tasks` (id, status, claimed_by, claimed_at, completed_at)
  - Transações ACID garantem atomicidade
  - Queries simples: `UPDATE tasks SET status='CLAIMED', claimed_by=? WHERE id=? AND status='AVAILABLE'`
  
  Opção 2: Locking por arquivo
  - Criar `DIR-DS-000-agent-config/queue.lock` com flock (file locking)
  - Worker obtém lock exclusivo antes de ler/escrever YAML
  - timeout curto (ex: 1s) para evitar deadlocks
  
  Opção 3: Fila distribuída (Redis)
  - Redis com operações atômicas (SETNX, LPOP)
  - Ideal para escala, mas adiciona dependência externa
  
  Opção 4: Melhorar protocolo atual
  - Reduzir janela de 5s para 1s
  - Adicionar versão/etag no YAML (hash do conteúdo)
  - Implementar retry exponencial com backoff
  - Validar consistência após cada escrita
  
  Opção 5: Sistema de tickets por worker
  - Cada worker tem seu próprio arquivo de estado (worker-{PORT}.yaml)
  - Coordenação via diretório `claims/` com arquivos efêmeros

