    priority: P0
    write_zone: "CORE → neocortex/infra/NC-INFRA-FR-001-metrics-store.py"
    steps:
      - "Remover MetricsBackend.DUCKDB como opção de arquivo (persistência)"
      - "Manter DuckDB apenas como analytics engine task-scoped:"
      - |
        Novo padrão DuckDB (apenas para queries pesadas, nunca persistente):
          def run_analytics(self, query: str) -> list:
              import duckdb
              conn = duckdb.connect(":memory:")  # task-scoped, nunca arquivo
              # carregar dados do SQLite para DuckDB :memory:
              conn.execute("INSTALL sqlite; LOAD sqlite;")
              conn.execute(f"ATTACH '{self.db_path}' AS src (TYPE SQLITE)")
              result = conn.execute(query).fetchall()
              conn.close()  # sempre fechar após tarefa
              return result
      - "Garantir que _init_duckdb() é removido — substituído por run_analytics()"
      - "Backend padrão: sempre SQLite com WAL (aplicar T1 aqui também)"
