# ============================================================================
# SUGESTÕES PARA MELHORIA DA QUEUE
# ============================================================================

recommendations:
  - priority: HIGH
    title: "Implementar atomic lock files"
    description: "Criar arquivo .lock com PID/timestamp exclusivo por task, em vez de confiar em write no YAML."
    benefit: "Elimina race conditions, mais robusto com múltiplos workers."

  - priority: HIGH
    title: "Adicionar cleanup automático"
    description: "Script periódico que: 1) Remove claimed_by de tasks AVAILABLE, 2) Expira claims >300s sem ACTIVE."
    benefit: "Mantém fila limpa e consistente."

  - priority: MEDIUM
    title: "Implementar backoff exponencial"
    description: "Workers aumentam intervalo entre retries após falhas consecutivas de claim."
    benefit: "Reduz contenção em picos de atividade."

  - priority: MEDIUM
    title: "Adicionar health check de workers"
    description: "Monitorar claimed_at vs tempo atual, alertar sobre workers inativos."
    benefit: "Detecção precoce de workers travados."

  - priority: LOW
    title: "Melhorar logging de transições"
    description: "Registrar todas as mudanças de status em log separado para auditoria."
    benefit: "Melhor debugging de problemas de concorrência."

# ============================================================================
# CONCLUSÃO
