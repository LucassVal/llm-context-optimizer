meta:
  version: "1.0"
  hash: "TICKET-LIFECYCLE-v1.0"
  description: "Ticket Lifecycle Protocol — machine-readable companion to NC-GOV-FR-002-ticket-lifecycle.md"
  md_file: "01_neocortex_framework/DIR-DOC-FR-001-docs-main/NC-GOV-FR-002-ticket-lifecycle.md"
