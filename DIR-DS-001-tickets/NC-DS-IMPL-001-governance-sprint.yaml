status: ABANDONED  # pre-standardization sprint plan, no longer relevant
meta:
  sprint: SPRINT-GOVERNANÇA
  bloco: A-MIDDLEWARE
  fase: P1 wire-up
  alvo_score: 62% → 75%
  duracao_estimada: 2 dias
tickets:
  G1_NC-DS-501:
    titulo: LockGuard middleware — intercepta write e checka @LOCKS
    esforco: 3h
    arquivos_alvo:
    - neocortex/core/NC-CORE-FR-125-tool-guard.py
    - neocortex/mcp/tools/NC-SUPER-004-state.py
    - neocortex/mcp/tools/NC-SUPER-001-governance.py
    - neocortex/mcp/tools/NC-SUPER-006-system.py
    dependencias:
    - NC-CORE-FR-014-lock-guard.py
    validacao: lock.check(server.py) → locked:true em write attempts
    rollback: remover chamada _guard.validate_write()
  G2_NC-DS-502:
    titulo: STEP 0 middleware — regression.check antes de tool call
    esforco: 2h
    arquivos_alvo:
    - neocortex/mcp/tools/NC-SUPER-004-state.py
    - neocortex/mcp/tools/NC-SUPER-001-governance.py
    - neocortex/mcp/tools/NC-SUPER-006-system.py
    dependencias:
    - NC-CORE-FR-123-regression-service.py
    validacao: regression.check → retorna warning se ação similar a erro passado
    rollback: remover chamada _guard.step_zero()
  G3_NC-DS-503:
    titulo: STEP -1 auto — savepoint.create antes de write
    esforco: 2h
    arquivos_alvo:
    - neocortex/mcp/tools/NC-SUPER-004-state.py
    - neocortex/mcp/tools/NC-SUPER-001-governance.py
    dependencias:
    - NC-CORE-FR-022-save-point-service.py
    validacao: savepoint criado automaticamente antes de checkpoint.set
    rollback: remover chamada _guard.savepoint_before_write()
  G4_NC-DS-504:
    titulo: STEP +1 auto — savepoint.rollback em failure
    esforco: 2h
    arquivos_alvo:
    - neocortex/mcp/tools/NC-SUPER-004-state.py
    dependencias:
    - G3 concluído
    validacao: rollback automático quando ação retorna success:false
    rollback: remover bloco try/except com rollback
  G5_NC-DS-505:
    titulo: R01 auto — naming.check no PreToolUse
    esforco: 1h
    arquivos_alvo:
    - neocortex/mcp/tools/NC-SUPER-001-governance.py
    dependencias:
    - NC-SUPER-001 naming.check existente
    validacao: naming.check executado em ticket.create, handoff.create
    rollback: remover chamada _guard.check_naming()
ritual_por_ticket:
- handoff.create ANTES de iniciar
- Implementar código
- ruff check --fix no arquivo modificado
- py_compile validation
- checkpoint.set após validação
- handoff.close com summary do que foi feito
- bootup.sync ao fim do bloco
audit_requirements:
- 'Cada arquivo modificado: hash SHA256 registrado'
- 'Cada ticket: handoff YAML em DIR-DS-002-audit-logs/'
- 'SSOT: atualizado com changelog [2026-04-27]'
- 'Regression buffer: novos erros registrados'
protocol:
  rca_applied: true
  three_w_applied: true
  kiss_check: <2500 chars per ticket description
  validation:
    py:
    - ruff check --fix
    - ruff format
    - ruff check
    - mypy --ignore-missing-imports
    - py_compile
    - bandit -q
    yaml:
    - yaml.safe_load
    - naming NC- check
    - secret scan
    mdc:
    - frontmatter YAML validate
    - NC-READ-HASH check
    - naming NC- check
    json:
    - json.loads parse
    - naming NC- check
    all:
    - '@LOCKS check'
    - Write Zone check
    - '@SSOT update'
    - Handoff YAML
    - 3W check
    - SSOT Header
  sandbox_required: true
  sandbox_steps:
  - 1. Copiar arquivo alvo para *-sandbox.py
  - 2. Fazer alteracoes no sandbox
  - 3. Validar sandbox (ruff+mypy+py_compile)
  - 4. Testar sandbox
  - 5. Aplicar no real (com backup)
  - 6. Rollback via backup se falhar
  handoff_required: true
  handoff_template: DIR-DS-001-tickets/NC-DS-HANDOFF-TEMPLATE.yaml
  handoff_dest: DIR-DS-002-audit-logs/
  handoff_format: NC-DS-{TICKET_ID}-handoff-{YYYYMMDDTHHMMSS}.yaml
  handoff_fields:
  - ticket_id
  - status
  - submitted_at
  - submitted_by
  - summary
  - files_created
  - files_modified
  - validation_rounds
  - barriers_passed
  - locks_violated
  - t0_review
  governance:
    eisenhower_applied: true
    mordaca_h: HOOK — bloqueia acao invalida ANTES de executar (FAIL-FAST)
    mordaca_c: CHECKPOINT — audita estado a cada 300s (PulseScheduler)
    mordaca_s: SCHEDULE — consolida no CICLO 4 semanal
    mordaca_u: USER — T0 aprova/rejeita via handoff review
    kaizen: Registrar micro-melhoria no @CHANGELOG apos conclusao
    roadmap: Marcar %DONE no @ROADMAP apos handoff aprovado
