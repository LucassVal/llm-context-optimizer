_meta:
  domain: system
  hash: auto-generated
  layer: root
  tags:
  - root
  - config
  - configuration
  type: CFG
repos:
- hooks:
  - args:
    - --fix
    - --exit-non-zero-on-fix
    exclude: DIR-ARC-FR-001-archive-main|05_examples|__pycache__
    id: ruff
  - exclude: DIR-ARC-FR-001-archive-main|05_examples|__pycache__
    id: ruff-format
  repo: https://github.com/astral-sh/ruff-pre-commit
  rev: v0.15.10
- hooks:
  - args:
    - -r
    - .
    - --severity-level
    - MEDIUM
    - --confidence-level
    - MEDIUM
    exclude: DIR-ARC-FR-001-archive-main|05_examples|scripts/|tests/
    id: bandit
  repo: https://github.com/PyCQA/bandit
  rev: 1.8.3
- hooks:
  - id: check-ast
  - id: check-yaml
  - id: check-merge-conflict
  - id: end-of-file-fixer
  - id: trailing-whitespace
  - id: debug-statements
  - args:
    - --branch
    - main
    id: no-commit-to-branch
  repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v5.0.0
