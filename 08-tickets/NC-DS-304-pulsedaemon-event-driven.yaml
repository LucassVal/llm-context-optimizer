three_w:
  who: "NC-CORE-FR-122/142 (PulseScheduler) + NC-SVC-FR-011 + HookRegistry (NC-HK-FR-001)"
  what: |
    PulseScheduler atual: loop com intervalos fixos (5min, 30min, etc.)
    NC-LBE-CC-008 (KAIROS/PulseDaemon) documenta o padrão event-driven:
      - Hooks registráveis por tipo de evento (idle, session_timeout, cache_miss, queue_non_empty)
      - TTLs configuráveis: SESSION_LEASE=18000s, HEARTBEAT=60s, TOKEN_REFRESH=300s
      - EXIT_CODE_PERMANENT=42 para erros irrecuperáveis
    Evoluir para PulseDaemon que combina intervalos + eventos.
  why: |
    Interval-fixo dispara tasks desnecessárias (context.pruning a cada 5min sem contexto mudado).
    Event-driven: task dispara quando há trabalho real (queue_non_empty, cache_miss, etc.)
    Economiza recursos + reage mais rápido a eventos críticos (session_timeout, heartbeat miss).

rca:
