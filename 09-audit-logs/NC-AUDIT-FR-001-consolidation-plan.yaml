phase2_unification:

  # ─── 3W ──────────────────────────────────────────────────────
  three_w:
    what: >
      O sistema NeoCortex opera com 5 pares de sistemas paralelos que fazem
      a mesma coisa por caminhos diferentes. 77 engines no disco vs 23 documentadas.
      Hooks MCP (9 registrados, sem executor) vs Gateway hardcoded (24 regras).
      Isso cria split-brain: corrigir um lado nao corrige o outro.
    why: >
      Evidencia: auditoria 3L revelou CAMADA 1(36.8%), CAMADA 2(87.6%), CAMADA 3(93.8%).
      Overlaps comprovados em audit(FR-149+FR-173), lock(FR-014+FR-125),
      compliance(FR-154+FR-161), semantic(6 engines FR-165 a 170), evolution(FR-130+131).
      5 indices de catalogo paralelos. 8 modulos carregam YAML independentemente.
      Gateway nao le hooks do MCP — sao dois SSOTs para a mesma funcao.
    where: >
      $FRONTAL (governanca): hooks, compliance, audit
      $CEREBELO (automacao): validacao, config loading
      $TEMPORAL (semantica): catalogos, indices
      ULQ CAMADA 0: resolver universal de paths e simbolos

  # ─── RCA 5 PORQUES ──────────────────────────────────────────
  rca:
    q1: { q: "Por que 5 sistemas paralelos?", a: "Cada um foi construido em fase diferente, sem unificacao posterior." }
    q2: { q: "Por que sem unificacao posterior?", a: "Foco em feature velocity, nao em arquitetura limpa. Documentado mas nao enforced." }
    q3: { q: "Por que documentado mas nao enforced?", a: "Nao havia pipeline de verificacao ativo no ato da criacao. Hooks MCP = 0. PulseScheduler crashado." }
    q4: { q: "Por que hooks = 0 e Pulse crashado?", a: "Hooks foram documentados (.mdc) mas nunca registrados no MCP. Pulse tinha bug de is_running nao implementado." }
    q5: { q: "Causa raiz?", a: "Build-first, enforce-later. Sem ULQ como resolver central, cada modulo criou seu proprio jeito de achar arquivos e validar. Solucao: ULQ como CAMADA 0 obrigatoria + unificacao dos 5 sistemas paralelos." }

  # ─── 5 FRENTES DE UNIFICACAO ────────────────────────────────
  fronts:
    front_1_hooks:
      title: "Unificar HOOKS: Gateway le MCP hook registry"
      current: "Gateway hardcoded (24 regras) + MCP registry (9 entradas, sem executor) = 2 SSOTs"
