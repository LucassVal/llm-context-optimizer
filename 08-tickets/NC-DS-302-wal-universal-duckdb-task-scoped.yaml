    priority: P1
    write_zone: "CORE → neocortex/infra/NC-INFRA-FR-002-wal-connect.py"
    steps:
      - |
        Criar helper de ~15 linhas:
          def wal_connect(db_path: str | Path, **kwargs) -> sqlite3.Connection:
              conn = sqlite3.connect(str(db_path), **kwargs)
              conn.execute("PRAGMA journal_mode=WAL")
              conn.execute("PRAGMA synchronous=NORMAL")
              conn.row_factory = sqlite3.Row
              return conn
