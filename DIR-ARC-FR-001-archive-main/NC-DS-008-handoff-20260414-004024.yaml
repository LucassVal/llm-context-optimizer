format_jsonl_discovered: |
  Pixel Agents consome JSONL no formato Claude Code com os seguintes tipos:
  
  - `type: "assistant"` → content array de blocos `tool_use` ou `text`
    • tool_use: {type:"tool_use", id:string, name:string, input:object}
    • text: {type:"text", text:string}
  
  - `type: "user"` → content array de blocos `tool_result` ou `text`
    • tool_result: {type:"tool_result", tool_use_id:string, content:string}
  
  - `type: "system"` → subtype: "turn_duration" (sinal confiável de término de turno)
  
  - `type: "progress"` → data.type: "agent_progress" (sub-agents), "bash_progress", "mcp_progress"
    • parentToolUseID referencia ferramenta pai (Task/Agent)
    • agent_progress contém transcript aninhado em data.message
  
  - `type: "queue-operation"` → operation: "enqueue" (finalização de agentes background)
    • content contém XML <tool-use-id>
  
  Campos `content` podem estar em `message.content` ou no root.
  Timestamps: "timestamp" field ISO 8601.
  Outros tipos ignorados: file-history-snapshot, queue-operation (outras operações).