# ─── 3W ─────────────────────────────────────────────────────────────
three_w:
  who: "SSOT NC-NAM-FR-001 + LEXICO NC-ULQ-TAG-INDEX.json + todos os tickets NC-DS-NNN"
  what: |
    Auditoria cruzada completa: verificar se cada path semântico no LEXICO/UBL
    (símbolos @, $, #) aponta para um path real que existe no filesystem.
    Identificar arquivos desgarrados (existem no disco mas não no SSOT).
    Identificar referências quebradas (existem no SSOT mas não no disco).
    Produzir relatório e plano de correção.
  why: |
    Gap confirmado em 2026-05-06 durante NC-DS-265/266/267:
    - #TICKETS no LEXICO aponta para 'DIR-DS-001-tickets/' — path NÃO EXISTE
    - Tickets reais estão em '08-tickets/' — não registrado no LEXICO
    - Suspeita de outros gaps similares: paths semânticos que resolvem para void
    - Consequência: agentes que confiam no LEXICO chegam a paths errados
    R21: NUNCA afirmar que o sistema está correto sem verificar cada resolução.

# ─── RCA (5 Porquês) ─────────────────────────────────────────────────
rca:
  symptom: "#TICKETS resolve para 'DIR-DS-001-tickets/' que não existe no filesystem"
  why_1: "LEXICO (NC-ULQ-TAG-INDEX.json) aponta tickets_audit.path = DIR-DS-001-tickets/"
  why_2: "Pasta real de tickets é '08-tickets/' — divergência entre LEXICO e filesystem"
  why_3: "Durante renomeação/reorganização de pastas, LEXICO não foi atualizado"
  why_4: "Não há CI que valide: para cada path no LEXICO → Test-Path → True"
  why_5: "Causa raiz: LEXICO é documento manual sem validação automática de existência"
  root_cause: |
    LEXICO evoluiu manualmente sem sincronização com o filesystem real.
    Resultado: paths semânticos que parecem válidos mas resolvem para void.
  corrective_action: |
    Rodar varredura automatizada (STEP 0) para mapear todos os gaps.
    Corrigir LEXICO para refletir o filesystem real.
    Criar NC-SCR-FR-XXX-lexico-validator.py para validação automática.
  preventive_action: |
    Guardian Ciclo4 executa lexico-validator.py semanalmente.
    Qualquer mudança de path no SSOT DEVE atualizar o LEXICO (R02).

