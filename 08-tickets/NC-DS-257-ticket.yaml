assignee: opencode
created: "2026-05-04"
description: |
  GAP IDENTIFICADO: O NeoCortex atualmente usa stdout/console prompts para pedir 
  confirmação do T0 (ex: "T0 must approve this action. Proceed? [y/N]"). Isso VIOLA 
  a regra fundamental do MCP: em transporte stdio, stdout É o canal JSON-RPC. 
  Qualquer output não-JSON-RPC corrompe o protocolo.

  A spec MCP define Elicitation como o mecanismo CORRETO para servidores pedirem 
  input estruturado do usuário (NC-LBE-INT-006 §3.1). Também define Logging como 
  mecanismo para servidores enviarem logs estruturados para clients (§2.3, §11.2).

  ESCOPE:

  1. ELICITATION/CREATE (substituir stdout hack):
     - Implementar handler para elicitation/create no servidor
     - Fluxo: Server → elicitation/create → Client → User (UI) → response → Server
     - Casos de uso NeoCortex:
       a. Confirmação T0 para ações destrutivas (archive, delete, overwrite)
       b. Confirmação T0 para modificações em @LOCKS (server.py, sub_server.py)
       c. Confirmação T0 para deploy em produção (write_zone PROD)
       d. Seleção de lobe alvo quando ambíguo
       e. Confirmação de custo estimado para operações caras (API calls)
     - Schema do elicitation deve incluir:
       - message: descrição da ação que requer confirmação
       - schema: JSON Schema com campos de confirmação (confirm: bool, reason: str opcional)
       - required: ["confirm"]
     - Timeout: se T0 não responder em 120s, ação é rejeitada (safe default = deny)

  2. MIGRAÇÃO DOS STDOUT PROMPTS:
     - Identificar TODOS os pontos no código que usam input()/print() para confirmação
     - Substituir cada um por elicitation/create
     - Exemplo de migração:
       ANTES:  print("T0 must approve. Proceed? [y/N]")
               response = input()
       DEPOIS: response = await session.send_elicitation(
                 message="T0 must approve this action.",
                 schema={"type": "object", "properties": {"confirm": {"type": "boolean"}}, "required": ["confirm"]}
               )
     - Garantir fallback: se client não suporta elicitation → escalar para T0 por outro canal

  3. LOGGING VIA PROTOCOLO:
     a. logging/setLevel — permitir client ajustar nível de log do servidor:
        - Níveis RFC 5424: debug, info, notice, warning, error, critical, alert, emergency
        - Client envia: {"method": "logging/setLevel", "params": {"level": "info"}}
        - Servidor ajusta nível mínimo de log transmitido
     
     b. notifications/message — servidor envia logs estruturados para client:
        - Formato: {"method": "notifications/message", "params": {"level": "warning", "data": "message", "logger": "neocortex.mcp"}}
        - Wirear com o sistema de logging Python existente (logging.Logger)
        - Handler customizado que intercepta log records → notifications/message
        - Respeitar nível configurado via logging/setLevel
     
     c. DUAL OUTPUT:
        - stderr: SEMPRE (para debugging local, Inspector, Claude Desktop logs)
        - notifications/message: quando client conectado e suporta logging capability
        - NUNCA stdout (viola protocolo stdio)

  4. IMPLEMENTAÇÃO DO LOGGING HANDLER:
     - Criar MCPLogHandler(logging.Handler) que:
       a. Intercepta LogRecord
       b. Converte para notifications/message JSON-RPC
       c. Envia via session.send_notification()
       d. Respeita level filter configurado pelo client
     - Adicionar handler ao root logger do NeoCortex durante initialize
     - Remover handler no shutdown

  PADRÃO DE REFERÊNCIA: NC-LBE-INT-006-mcp-specification.mdc §3.1 (Elicitation — 
  server requests structured user input), §2.3 (Logging — stderr + notifications/message), 
  §11.2 (Logging Implementation), §17.2 (Gap #5: Elicitation para confirmação T0, 
  Gap #3: Logging via notifications/message).

  IMPACTO: Elimina o stdout hack que corrompe o protocolo. Conformidade total com spec 
  MCP. Logs estruturados permitem debugging remoto. Confirmação T0 via protocolo 
  padrão funciona em qualquer client MCP.

